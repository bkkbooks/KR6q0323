body:
  text: 慶元府瑞巖山開善崇慶禪寺語錄侍者彌紹道亨宗壽編威淳五年三月初三日入院指三門云池開古鏡奩山聳青螺髻急著眼來看不得作境會覿體全彰解脫門驟步入云一踏牢關百雜碎佛殿你面黃我面黑是馬是驢各隨業力驀劄相牽入草窠插香云鼻頭香臭不爭多土地堂舉香云者一通還會麼護法護人頭頭撞著曾在靈山授記來切不得忘却祖堂十二瑞峰前一火白拈賊佛面夜叉心是何等相識燒香燒香供養使自知非剪月初無陷虎機方丈拈丈云瘦藤枝烏律卒卓云入草尋人空中畫云揣空出骨不是心不是佛不是物𩗺下云貶向無生國法座入微塵含法界頂𩕳機驟步云看脚下須彌燈王冰消瓦解府帖虬龍一滴涎鳳凰五色髓撲撲噴清香穿却衲僧鼻通身是徧身是回互無門一場矩氣送與堂司明揭示府疏摛錦綉文判虗空筆騰萬丈光入三分石矜誇自己雄才訐露它人惡跡座元路見不平對眾分明剖析山門疏杓柄短長鍋兒大小家醜無端花擘了狼籍不小慚惶不少藏主師兄平跋則个江湖疏逼人上樹拔却梯推人入井覆却桶江湖用此惡心腸誰云契義金蘭重怪語顛言開眼說夢索語蛇頭揩痒虎口拔牙𢬵得性命始是作家有麼問答不錄提綱入門欵無改換芝峰一一從公斷事涉春緣何妨花判不分照用春山蕨竪菴主麤拳打破疑團古洞桃瞎靈雲正眼江鷰歸時蒿自發矛盾相攻鷓鴣啼處百花香離微不犯出水蓮花已遲八刻合喫幾藤條輥毬柳絮略露一機當甚破漆碗不得犯苗稼戴嵩牛臥綠楊陰且喜息戰爭韓幹馬嘶芳草岸自餘岩花似錦磵水如藍點污法身罪難逃逭斷則斷了也且道責情三十棒教誰下手良久拍床云盡法無民且行一半舉韓文公問大顛弟子公務事繁佛法省要處乞師一言大顛良久云會麼公云不會三平侍者云相公先以定動後以智公有省乃云和尚門風高峻弟子於侍者得入路拈云韓文公儒林丹鳳學海蒼龍飛必冲天行必澤物因甚出大顛網羅不得向侍者得入路可謂不遊三級浪爭見禹門高更聽一頌讀盡燈窓萬卷書經論勛業付洪儒古今鼎鼐調羮手幼學誰人不順朱為郡王上堂國有世臣伊周是則神政氷清忠謨鯁直存方寸地子孫耕黍稷非馨深種德美則美矣舉主丈這爭如何卓一下巨闢十三華藏界藏身無迹海騰波月半上堂留兩班并謝專使副寺浴主寮元萬疊青山一溪寒水花禁冷葉紅草滴虗嵐翠無位真人祇者是不離當處當湛然左右逢原無二體覰之瞎雙眸即之雲萬里祇如堅持漢節賤賣生姜妙悟水因重光佛日還有者箇時節麼待芝峰點頭即向汝道上堂特為大卿侍郎萬壑喬松九枝靈草瑞氣久鍾清聲遠播才大今為宗庿梁國香世產芝房寶別露風規尋僧論道十二峰高勢莫齊到頂方知天下小上堂回諸山禮歸并謝新舊直歲入院恰一月業識忙忙走踏斷碧溪雲覧遍羣峰透拈得鼻孔失却口歷歷醒醒翻成不唧𠺕杜䳌聲切苦催歸盡把家私剖且道露柱懷胎畢竟是男是女以拂子擊禪床一下瞥轉玄樞活路行驢前馬後壽崇節滿散上堂樛木垂陰關雎詠德萱樹北堂星昭南極春陽姁嘔育黎元大地誰人不感恩乾會節上堂再世唐堯更生虞舜統御金輪永膺天命林泉何以報生成一縷檀烟萬佛名佛生日上堂淨飯王宮積惡多從天降謫个妖魔指天指地胡揮揎無柰通身穢汙何以手作澆湯勢瑞岩無柄杓惡水劈頭澆特石須頑也合消上堂謝首座秉拂都寺幹齋新舊殿主并雪崖滅禪相訪跛脚阿師弄蹄驢子一字關徒費分疎栗棘蓬恣情吞吐凌滅祖師禪函蓋乾坤句孤危不立自孤危萬仞雪崖丰骨露十二峰前斫額望汝何故洞山佛無光無你捫摸處無你栖泊處上堂結夏已十日了寒山子作麼生村詩吟落韻竹管貯殘羮結夏已十日了水牯牛作麼生愛從荒草去不向坦途行精神𨺗頓頭角崢嶸卓主丈好把一阬埋瘞却千峰雲靜月華明端午上堂并謝靈叟苦澀菖蒲茶膠粘青蒻粽嗅著鼻頭辛咬得牙關腫佛病祖病蠲除妖星怪星驚悚善才採藥颺在壁根天師書符抗藏衣籠和盤掇出宴佳賓山鳥山花欣然錦綉鋪陳笙簧品弄以手搖拽云囉囉招囉囉送莫怪空疎伏惟珍重上堂半晴半雨釀成梅溽無位真人口生白醭玄談發囦默之雷妙應答傳聲之谷花簇簇錦簇簇聽不足玩不足拍膝一下云啞六六依前三十六上堂一二三四五六七數目分明誰委悉李淳風與袁天綱推盡先天筭不出筭得出昨日五月盡今朝六月一請監収上堂諸莊収斂幾樣心腸憂風憂雨憂旱憂荒舉起拂子刈禾鎌雖云快利要用處不犯鋒鋩䇿勳汗血別甑炊香飯裏有沙如咬著方知禾熟不臨場上堂天地不仁人心招感田稼如雲一風消散農家血泪流肝腸斷惟有林間衲子有亦不知無亦不管圓蒲擁雪衾綴鉢盛香飯放憨一飽萬緣空冷笑傍人忙似鑽灼然如是萬兩黃金也合消其或未然拍禪床一下切莫怪閻家打筭周國夫人忌陞座拶倒涅槃城月上女藏身無影迹掀翻生死海安提遮斫額望鄉關自餘臺山路驀直去平田路甚處去當時摩竭令幾喪目前機是定非正定出得出不得總是好肉剜瘡鬼門貼卦於本參事中了無交涉殊不知臥雪庭前輪王位下有一烈女丈夫不離五障立證法身遊戲萬緣即登覺海靈光不昧萬古徽猷心佛眾生三輪普現正恁麼時且道承誰恩力以拂擊禪床云妙處欲言言不及月移花影上闌干頌善護菩提樹有年金枝玉葉蔭兒孫大功難紀人間世千佛名書補處尊上堂謝新舊首座都寺藏主副寺典座維那拈主丈云祖師提持𭣟瞎人天眼目栗蓬吞吐塞斷佛祖咽喉大藏教流出自己胷襟桶箍聲破蕩鬼家活計今日吃什麼菜高價賣生姜義出豐年古今一致紫芝岩下用舍行藏二俱得妙且道眾力扶持畢竟建立誰家宗旨卓丈云三要玄門百雜碎飽和蘿樂昇平八月旦上堂衲僧家無本據暑退凉生任情去住折主丈挑撥紅塵堆裏人破草鞋踏斷枯木巖前路無佛處急赴過有佛處不得住揑聚大千無寸土業風吹上十二峰來徐徐向伊道提鞋去謝監寺副寺木禪西堂圭藏主上堂截流機分涇渭清濁淺深窮源倒底三脚驢子弄蹄行踏過何曾沼著水芝峰家醜外揚也是碓坊洿米低聲低聲墻壁有耳何故座滿江南客何須唱鷓鴣上堂拈丈主丈子四十八年撥草瞻風參尋知識有一句子緊緊囊藏不務速說三世諸佛說不到一大藏教該不著今日遇太白友舉似諸人去也卓一下太白松行二十里瑞巖山作十二峰逢人不得錯舉石窗和尚忌拈香形名未兆見全身遲八刻孤迥寥寥徹骨貧誰信道借伴有時隨類去看脚下可怜伎倆不如人知即得者四重欵案已被芝峰結斷了也只如渡水寧不濕脚還疑著也無插香云優曇火裡開嗅著無香氣九月一上堂寒空書鴈破壁吟螿井梧翻葉巖桂飄香無位真人橫拖倒拽無地埋藏舉世生盲人不識分拏摸象恣猖狂拍膝去徒勞香至子歷魏與遊梁啞鵲石何曾解放光重九上堂并謝修塘監収修厨屋諸庫掌財劄得脚跟牢不怕風濤險大田多稼如雲只要及時収斂歸來香積國經行喜見飛簷翔唇吻議賞元勳高低有分舉拂子且道者一分是誰合得我王庫內難承領蹔寄東籬賞菊人退畊遺書至上堂鳳宿龍巢宸車苔輾歬不搆村後不迭店疑殺天下人自疑猶未免瞥轉一機星馳電捲飛來峰刮地風寒冷泉水滔天浪袞死句飜成活句傳大冶精金經百鍊良久云啞退畊師兄能事云周一死何憾月半上堂拈主丈主丈子黑𥻘皴韜藏頭角枯槁身心剛被業風飄皷忙忙入草尋人奔馳鳥道卓一下簸弄驢唇湖海聽聞齊掩耳只宜藏拙古巖陰上堂萬疊青山一溪流水幽鳥綿蠻烟蘿鏁翠瑞巖活計無多徒掛傍人唇齒徹骨貧窮熏天富貴一陣西風丹桂香良久云二三子吾無隱乎爾上堂開爐并謝莊主㽵上喫油糍鬼精魂罷休拈弄鴈影沉寒水窮伎倆何用施呈雖云博飯㘽田何似歸堂向火靜悄悄煖烘烘不勞共話無賓主衲被蒙頭萬境空喝死水何曾有活龍上堂滄溟深未必深須彌險未必險衲僧家險崖機不可挨深密心不可察拈丈主丈子忍俊不禁以丈作探水勢試與探惻看深無半寸作登陟勢平如鏡面浩大雷聲全無雨點靠主丈只好深雲龜六藏佛眼迷踪尋不見尋得見瑞巖點一盃茶徐徐向伊道日暮窮途家鄉尚遠上堂拈丈沒絃琴卓一下有遺音調高流水聲振緇林碧眼黃頭爭品弄無端花擘祖師心瑞巖素非妙手效顰彈一曲看橫按丈作撫勢叮當叮當絕聽子期迷節奏靠丈和雲高掛古松陰上堂四十年打成一片癩馬繫枯樁老僧使得十二時病牛耕爛葑直趍堂奧坐致太平堯舜之君猶有化在拈丈主丈子爛遊湖海綿歷間關到者裏一點氣甦不得你這一隊皮下無血漢來此挨肩並足討什麼盌拽主丈下坐以大眾一時趕散上堂荊棘林大火聚峭壁深阬無栖泊處直饒伊瞥轉一機轉得身通得步瑞巖未敢輕相許何故鳳栖不在梧桐樹上堂書載五雲綉添一線剝盡羣陰天心復見拈拂子惟有龜毛拂今古無遷變松根石上笑談空擊床切忌隨他語脉轉禮都寺水陸陞座大智洞明十方虗徹玄樞妙轉千聖迷踪直饒透箐眼明截流機峻須知更有向上一路在拂擊床這裡見得徹去方知東山五祖老凍膿與元禮首座我不會你自會得好我不如你眼眼相照如鏡對鏡了無痕瑕到這裡無心可修無願可酬無難可禳無恩可報但見皇風成一片不知何處是封疆雖然衲僧門下十萬八千何故老僧笑指猿啼處更有靈踪在上方頌太阿久瘞豐城劒纔過張華便發光積世冤讎都掃却蟄龍銀匣襲珍藏上堂謝首座看拂都寺齋扭碎東山鼻孔牽斷佛眼耳輪一等施呈毒手腕頭力重千鈞飫饕法味飽聽圓音漢室威儀重復見紫芝香散碧巖春郡王忌大道虗曠逈絕言詮一性混融不分凡聖仁者見之謂之仁智者見之為之智百姓日用而不知故君子之道鮮矣所以勞佗癡聖人擔雪共填井或棄金輪位或見宰官身繼千佛之芳猷布百王之聖化千差合轍萬派朝宗正恁麼時且道我故奉化郡王諡清敏受靈山記穹護法城致君澤民建昇平業功圓果滿轉位回機即今向什麼處成佛不生兜率陀天上定在蓮花世界中頌忠清千古燦奎文盖世功名富貴生旌佩擁雲何處去毗蘆樓閣欵經行上堂謝元翁首座相訪簸弄乾坤靈蛇在掌露刃含霜阿誰近傍殲厥渠魁未得時蟄龍護匣牢収抗還他道地劒州與太阿無兩樣携來剪月亭前共聚五湖禪流拭目縱觀連聲稱賞佛成道上堂半夜逾城六年栖雪餓得腸枯凍得骨折那更見明星兩眼添重屑後代兒孫苦證羊一年一度爭饒舌拍膝一下正法眼藏宜乎向這瞎驢邊滅上堂天巧剪瑤花漏洩真消息拈主丈撩撥木上座勇發千鈞方戲伸老臂扶插氵之危層活弄圓機幻上方之香積不勞斂念立奏全功卓一下擊碎玄門談不二又卓喚回殘夢聽疎鐘元正上堂正月一是新年家家慶賀處處喧闐拈丈惟有主丈子不隨時變松根穩坐石上安眠驀地放憨歌一曲卓一下囉囉哩囉囉哩囉且道與東山瓦皷歌是同是別木人聽不足靠主丈瘦立綠蘿烟正月半上堂謝直歲侍者浴主寮元一點心燈寒光燦爛今古長明幾人著眼諸方老凍膿燒畬種粟三呼三應妙悟水因眉間挂劒雖然列焰分輝當暗中有明當明中有暗舉拂子而今拈出普請看打圓相見麼出格元宵何妨賞翫百丈和尚忌拈香獨坐大雄峰臨機多弄險遭虎口殺活不分脫狐身真假難辨那堪創立清規平地深深坑壍結成不共戴天讎插香燒炷楓香解釋休上堂謝惠知客恭侍者自雪峰雪点來人從雪峰來接得乳峰信報道古磵寒泉湧出千丈飛雪推倒妙高臺掀翻烏石嶺松山土主冷地翻身隱潭龍王夢中驚醒郎忙抖擻精神念一道離怖畏真言南無三滿多沒䭾喃唵部齡唵齒齡吽吽急急如律令三世諸佛立地聽梵語華言難改正二月初五上堂謝范都監相訪家在蓬萊霓裾粲霞步虗聲有節觀徼念無差護劒蒼虬鳴寶匣聽琴瘦鶴倚庭花丹成九轉符掃群邪不負東林蓮社約乘軺來訪竺僊家虎溪分未得欵喫趙州茶上堂謝修渤塗莊垹監寺開藏主傳維那祖父田園積年荒廢農不務畊漁專討利徹底掀翻自有人去盡殘蘆并敗葦鴈過長空影沉寒水字字聲聲說大義且道一大藏教還該著麼待桶箍𪹼時却向汝道上堂九十日春今欲過人生能見幾韶光秦源方被桃花誤隋岸還看柳絮狂拈丈主丈子知不遷義緘封不密卓一下滿口嚼冰霜千言萬語無人會擲下又逐流鶯過短墻四月一上堂拈拂子長鬚翁久不見壁角深藏心灰百煉將期休影息陰豈謂明明弄險拂點云點出夜叉心畫一畫擘開菩薩面醜惡既乖張佛手難遮掩贏得春山哭杜䳌鮮血染花枝聲聲怨上堂赤日燒空旱苗槁死車水農夫汗血如雨深思三條椽下七尺單前飽飯憨眠嫌佛不做灼然如是消萬兩黃金如糞土其或未然黃蘗作驢鞦後頭純是苦解夏上堂兼謝監収秋暘肆酷秋暑炎蒸不容鵝護雪難保蠟人氷一夏噇眠虗過了秋風拈弄刈禾鎌有權有用無黨無偏幾箇祖師頭割了立教凶歲變豐年上堂謝董居士相訪秋陽肆酷劃地奔雷洗滌袢襟喜而不寐懿德山王贈之以偈大旱逢甘雨他鄉遇故知攧崖泉漱玉甞稻雪翻匙咿嗚咿誰知艱棘際復見太平時拈丈主丈子暗中聞得手之舞之足之蹈之暑退凉生前路活擲下化龍一躍出天池贏得龐公笑展眉開爐上堂謝諸莊監収歸并客至僧鉢一粒飯農家一滴血戰爭収拾歸知費幾牙頰明璣杵白別甑炊香伴客地爐燒榾柮無賓主話商量雖然切忌增金以黃閏十月旦上堂謝客至雨後谿聲寒弄玉風前木葉碎飄金見聞互用非聲色花劈威音古佛心見成家樂管宴佳賓莫謂瑞巖岑寂甚一回拈出一回新穹窿劒門和尚訃音至上堂辭世頌珍重元無世可辭臨行書偈自塗糊木人歌罷石人舞擊碎驪龍頷下珠打破劒門關未死先辭世書偈自塗糊白把驪珠碎口欵細供通自首原其罪木人歌舞石人悲聲遏行雲鴈序分影落千峰外上堂謝雙嶼王居士弘藏主一口吸盡西江水猶在半途一氣轉得一大藏教尚存法執瑞巖口門窄除二時齋粥外容一窖不得若吞三世佛恐作礙膺若留元字脚恐成疣贅今日大開普示諸人去也乃開口見麼見麼臭氣熏人爭掩鼻此時肝膽向誰傾顧視云聻上堂舉外道問佛不問有言不問無言黃金包褁爛泥團世尊良久誰知冷灰裡九轉透瓶香外道云世尊大慈大悲開我迷雲令我得入束手墮懸崖阿難問世尊云外道有何所見便言得入削玉求瑕世尊云如世良馬鞭影而行直饒描得似費了幾丹青拈云截鶴續鳧移嶽盈壑黃面老人不免掛人唇吻只如不加藥餌不用針刀活必死於膏肓又且如何明辨若也辨得良馬窺鞭已遲八刻若也未辨東土阿師不如西天外道頌萬里澄江練淨時水天一色冷含輝漁翁認得烟村路柳綫穿魚帶月歸上堂謝後堂首座藏主秉拂都管冬齋兜率天宮初說夢修多羅藏又談空一人人飽純陀味不與尋常至節同娟娟蘿月瑟瑟松風四壁生涯貧徹骨敵君王富樂無窮上堂舉大耳三藏得他心通朝見唐肅宗宗令國師驗之藏見國師便拜側立于前國師云聞三藏得他心通是否藏云不敢國師云且道老師即今在什麼處藏云一國之師在西川看競渡第二又問且道老僧即今在什麼處藏云在天津橋上看弄胡孫第三度又問三藏無語國師叱云者野狐精他心通在什麼處拈云大耳三藏不道謂無他心通可惜龍頭蛇尾若是通身是眼第三度問老僧在什麼處只向他道一國之師在鬼窟裏作活計若著得此語直饒國師不高竪降旗未免舉手加額頌萬金包褁爛泥團不惜當場撮弄看敗闕遭人窺覰了末梢依舊被渠瞞上堂舉曹溪六祖大師到廣州法性寺聞二僧論風幡拈云新州賣柴漢黃梅席上竊得衣盂夜半三更郎忙驚走洎見風幡便言心動也是作賊人心虗雖然如是風幡未動何處求心白雲盡處見青山行人更在青山外頌煙雨濛濛望眼迷蘭舟小泊𦘕橋西兒童不識春流漲却恠橋還柳樹低上堂蔓草繫羅裙山雲籠蓆帽皷舞賀元正石女呵呵笑喚作新年頭佛法賺度人不少不喚作新年頭佛法賺度人不少元宵上堂一點心燈靈明炳煥去古來今清光無間不同萬斛金蓮惑亂癡人賞翫今朝上元節拈出普請看拂子打圓相見麼擬議尋思空華翳眼上堂舉馬大師馳書到徑山國一開書見一圓相遂於圓相中著一點封回國師聞云欽師猶被馬師惑拈云大小國師三緘不密錯斷諸方名言瑞巖要問欽師被惑則固是且道馬大師還被惑麼待渠擬議只向道惑了也教者老漢知道螳螂方怒臂黃已爭擒頌𤺊撲場中作斷交拳來趯去不相饒誰知用盡平生力却傍被人奪錦標上堂謝客相訪舉南泉歸宗麻谷三人同去參禮國師至中路南泉𦘕一圓相歸宗於圓相中坐麻谷作女人拜泉云恁麼則不去也於是相喚而回拈云家貧猶自可路貧愁殺人頌上林春色正繁華公子聯鑣去賞花貪弄玉盃泥樣醉笙歌藂裡簇歸家上堂謝雪竇義都寺加定寧藏主并客舉慈明和尚一日故人至上堂云颯颯凉風景同人訪寂寥煑茶山下水鼎燒洞中樵慈明和尚可謂大開東閤宴樂佳賓芝峰茆舍挂珠簾勉強效顰管顧諸人去也雲外客幽奇尋盟到紫芝看花思錦鏡對月話峨眉道味濃於醴鄉情熟似糜倚松陪一笑貧樂浩無涯上堂謝都管殿主年老住山有些巴鼻楊歧破屋得老手扶持投子油瓶賴作家提起三世諸佛踢出芒草鞋尖五蘊魔軍竄入藕絲竅裏樂以忘憂喜而不𥧌直饒忍餓去挑箍諸禪德東隣殺牛不如西隣之禴祭上堂不滯平常心不畏險崖句飽飯恣酣眠嫌佛不肯做業風吹到十二峰前背却法堂著草鞋去且喚回來與一盃茶徐徐向伊道善為道路上堂舉無著往五臺禮文殊路逢一老人無著云莫便是文殊麼老人云豈有二文殊無著禮拜起老人不見拈云可笑無著賊在面前不能捉得空自閉門呌屈有甚共語處當時待他道豈有二文殊劈面便唾老人雖有衝天之謀管取入地三尺頌遠望蓬萊去學仙途中忽遇李先生還丹一粒吞還吐回首空山獨自行舉麻谷問臨濟大悲千手眼那个是正眼濟云大悲千手眼作麼生是正眼速道速道谷拽濟下禪床便坐濟云不審谷擬議濟便喝拽谷下禪床却坐谷休去拈云臨濟麻谷如屯百萬大軍對壘相似皂旗閃爍雪刃縱橫凜然有不可犯之勢洎乎兩將挑戰却以瓦礫相攻子細看來當甚小兒戲劇頌大悲正眼露堂堂百步當搖閃電光被掣風顛醫瞎了暗中拖拽下禪床佛誕辰上堂嶺上雲磨松偃蹇巖前瀑漱石琮琤瞿曇面目全彰露誰道今朝始誕生跛雲門棒休放拍盲一杓香湯三拜著聽渠千古惡名行結夏上堂一春連雨民心憂懼妻子號飢米無糴處珍重活衲僧福德聚衲被蒙頭無思無慮九旬禁足鈍鳥栖蘆三月安居蟄虫坏戶翻轉銕面皮嫌佛不肯做酌然如此消萬兩金如寸土其或未然黃蘗作驢鞦後頭純是苦上堂謝首座藏主前宵剪月亭邊曲奏高山流水雖云獅子筋絃品弄必資妙指不落宮商人聳耳嘉州大像增百倍精神荊溪老龍添十分活意正音將謂絕無聞誰料鄭聲亂雅中有此清彈爾乃合掌云慚愧慚愧無文和尚訃音至上堂雷轟薦福天秘無文印字義既難明心傳誰得正東湖瀉恨浪滔天驚𢞕瑞巖殘夢醒拍禪床猛拍闌干呌天不應哭不成兮笑不成野花泪泪濕千峰影上堂舉大集會上勑天下獰惡鬼神付囑護持正法不知禍起蕭墻內虗等防胡萬里城若有一人不到令四天門下飛熱銕輪追之抑逼人作麼中有一魔王云待一切眾生成佛竟我方發菩提心只恐不是王寬裁蓆㡌別處戴拈云黃面老子布漫天銕網貴圖打鳳羅龍只者魔王也不易得既解裂網而出惜乎羽力不全重遭縛殺當時若道寧可永劫沉淪不從諸聖求解脫非惟象頭檀特枯木重榮亦使什迦老人退身三步舍九月旦上堂三月休征修文偃武治格太平生靈鼓舞無端塞馬嘶風又欲揚塵簸土密運機籌肅行師旅塞北安南一戰収生死冤魔都掃去重賞元勳凱歌聲撼芝峰路雖然不知誰是傍觀孫武子上堂謝育王藏主九月授衣天芝峰無可授破衲擁寒雲對客慵開口一大藏教頓漸偏圓如何分剖鴈字書空義炳然見得分明金屑重重翳眼睛上堂謝太白南山元翁二座元至舉古詩云山逢好處行已倦一云書當快意讀易盡客有可人呼不來世事相違每如此好懷能得幾回開芝峰則不然成癖襟懷為愛山不逢佳處不開顏錦屏劒閣重相見疑在岷峨翠靄間上堂謝育王寂窗和尚相訪一二三四五六七八九十閩音梵語華言譯不成玉几重新添註解字義炳然無人領解賴有同風知點頭道奇怪彷彷彿彿一似東山瓦鼓歌腔調宛同聲無高下諸人要知格外鄉談麼作長鼓勢云彭八刺拶未在未在閩音上堂謝秉拂造齋書雲開管宴法輪食輪轉覰之雙眼盲味之唾三嚥雲門胡餅謾自誇張楊岐栗蓬急須収卷且道収卷後如何露柱燈籠春風滿面上堂謝道士興首座相訪道德五千言深明玄妙句雲門一字關截斷橫陳路十二峰前危分險布喚醒惺惺石上瞌睡主人公握手評論掀眉笑語驚放寒梅一兩花漏洩先春奔馳驛使拍床云啞尋香逐臭人無數郡王忌提綱向上機頂門眼察秋毫處暗昏昏透險崕中平坦坦三世諸佛正視無門白牯狸奴活埋何限以拂子擊床云這裏見得徹去便見從上諸聖脫珍御服衣弊垢衣撈摝羣生入泥入水故我奉化郡王述而不作了如幻三昧隱菩薩相現宰官身致君澤民封王建節奮醫國手穹護法城凡聖情空死生夢破塵勞境寂智慧花開九有四生皆承恩力且道行何行願獲此殊勝掛拂子云妙處欲言言不及月移花影上闌干結座親隨彌勒下長汀一字王書奉化名輔國功成歸內院子孫恩被錦衣榮上元上堂謝知客無辨古今眼有辨古今舌說得十分真何如見得徹見得徹耿耿心燈奪夜寒年年宴賞元宵節上堂謝道士至茅舍春深韶華可人山花裛翠烟草如茵況有尋幽客至錦囊探句藜杖挑琴握手松根同一笑高風曾不護東林上堂雪竇方菴遺書至廣漢馬駒子十方羅漢僧不喫金鷄粟專𭊷血戰冤古龍囦吸乾到底清凉樹靠倒無根五處移場弄𡾟險化機曾不涉春緣休征藏密地陷天崩棠棣花殘鴈沉影椎𮌎未免哭蒼天四月旦上堂三月青春彈指過九旬朱夏又從頭茶抽舌郎忙摘麥弄蝦鬚逐旋収熾然說法聲撼林丘拈丈南陽忠國師來也見汝諸人不識擲下云倒騎佛殿徑入蟭螟眼裏去也上堂謝秉拂造齋天厨禁臠熊掌與魚二難兼得我此一眾久受枯寂食法二輪同時撥轉飽甞真味無著歡喜處可謂無上法喜純陀之供雖然且道與天厨禁臠相去幾何拍床云五陵玉筯耽肥軟何似春山笋蕨肥五月旦上堂結夏已半月了也水牯牛作麼生愛從荒草去不向坦途行閙中牽索靜處加鞭月白風清眠露地聲聲牧笛響烟村端午上堂小供天中節家貧樂有餘蒻包粳米粽茶點石菖蒲不用童尋藥何須鬼𦘕符千妖俱掃迹長夏得安居雖然衲僧門下天地懸殊上堂放下著莫妄想無孔銕鎚半斤八兩面門拋擲土曠人稀無業趙州元不會鳳林徒自說吒之六月旦上堂六月苦炎熱蠟人何似生火雲烹得解解後却完全堪笑雲門老杲掣風顛通身臭汗微凉生殿閣打失鬼精魂要會諸佛出身處良久拍膝驢年驢年上堂眼裏著得須彌山耳裏著得四大海子細思量身如椰子大著許多𡏖𡏖圾圾作麼瑞巖眼裏著聲不得耳裏著色不得年近八十救死不贍何暇向聲前色後鼓弄人家男女今朝旦喜祖父田園旱苗得雨高下豐熟一飽可期皷腹謳歌快活快活你這一隊漢略不知恩更來者裏挨肩並足討恁麼椀拽主丈下座大眾一時走散復云侍者収取拄杖上堂請監収雨足龍閑年豐民樂袖出刈禾鎌大地全収却歸來十二峰前別甑炊香明璣滿鉢餵飽活衲僧曲肱酣睡著佛法身心爛似泥拍膝啞醫無藥上堂截鶴續鳧夷壑盈嶽肇法師折許多氣力作什麼古今天地古今日月山是山水是水僧是僧俗是俗切不得動著何故彼自無瘡勿傷之也上堂謝新舊兩班十二峰前傀儡棚盡由行主線抽牽編排科段無新舊歌舞秋風樂管筵上堂謝江西巽藏主雪峰來人從福州來接得江西信報道雪峰木毬輥入育王鰻井怒浪飜空魚龍乞命秋風吹落惺惺石上驚觸主人翁酣睡醒良久掀眉一笑千峰靜中秋上堂八月十五中秋節人皆競賞天邊月心月孤圓自不知不涉圓虧光影滅馬師父子錯商量拂袖便行猶未徹諸人還見心月麼以拂打相急著眼看重重金屑打板上堂巖桂飄香井梧凋葉活祖師機重重漏洩見得分明眼似眉道得完全舌如結諸人要知親切句麼蒲團三月冷如氷今朝穩坐靜聽渠分說重九上堂九月九重陽節不向東籬賞菊花只點茱萸茶一啜苦澀難甞舌如㔢更吞栗棘蓬肝腸裂且道陶淵明還曾知此味麼乃搖頭云莫說莫說上堂九月授衣天山林無可授破衲擁殘雲癡坐蒲團透長慶稜捲簾悟道病眼見空花香林遠紙襖大書破袖爭出手鳧短鶴長驢前馬後拍膝云不知笑破他人口上堂謝道士游山歸會萬物為自己其惟聖人乎拈主丈主丈子嫌佛不肯做不居凡聖位自己生冤家更有何物可會朝游檀特莫宿羅浮鴈宕天台隨緣放曠徤行青草徑困臥白雲根優哉游哉快活活快且道誰是同行者靠丈顧視云聻上堂綉閤新添一綫長金針鬪巧製鴛鴦竪拂云不知這箇長多少莫把龜毛亂較量上堂為勤監寄庫水陸如意珠在何許盡情収拾堅牢庫輕如毫末重如山賤似黃金貴如土輪鎚擊不開毗嵐散還聚隋珠照乘何足云趙璧連城難較此豈不見郁山主騎驢過斷橋攧殺知落處凜凜寒光照千古又不見个寂子通身有口難吞吐傾出栲栳珠殷勤奉東寺二老家珍誰堪分付勤監寺喏牢記取頌要見心珠發耿光只消一念破慳囊昆虫草木承恩力世世藂林建法幢上堂謝秉拂幹齋并修墻十方義聚和氣如春非魔非佛無主無賓食法二輪能妙轉不虗剪月過書雲雖然聞韶不知味門戶喜重新上堂謝遠首座并說規矩結繩為政畫地為牢堯舜之君猶有化在拈丈主丈子罪犯彌天剛強難化非結繩可以取其信非畫地可以格其非商令至嚴惡心轉熾瑞巖老朽既司其職當言不避截舌卓丈輕輕點著返朴還淳何故不過虎溪橋誰識東林遠佛成道上堂當年不合棄金輪忍凍吞飢度六春又被毛頭星換眼至今苦屈未能伸瑞巖不孝尚有慈心燒塊木頭修薄供且圖溫飽過切忌賺他人正旦雲晴上堂兆應豐年單明一色玉作樓臺銀連巷陌新晴人喜賀元正不識春山頭併白上堂謝新舊知客掌財維那茶迎過客無新舊秤定須彌有重輕活弄手頭雖得妙何如聞𪹼桶箍聲涅槃上堂今朝二月十五黃面瞿曇滅度諸方撾皷聲冤盡是閑言長語一點涅槃心無人知落處拍膝云山花泪滴如紅雨上堂久雨新晴物情顯煥蝶弄海棠陰鶯啼楊柳岸聲色純真不得一半堪笑靈雲活眼睛却被桃花換拍床云啞瞎漢瞎漢上堂謝都寺殿主并𠕋子廣福和尚相訪楊岐栗棘蓬趙州殿裏底一句當機裂萬差盡大地人扶不起且道達磨西來所傳𠕋子上還該著麼如辨端倪三脚驢踏破坤維然燈佛在你脚底上堂謝天童環溪和尚相訪四十年同參廿餘年相別不唱菩薩蠻何暇說佛法驀劄相逢十二峰我患生盲你患聾是聖是凡都莫問且分苔石憩松風上堂謝智首座龍維那相訪客路奔馳歲月深朝游東魯暮西秦子規苦勸人歸去血濺巖花幾見春只如象骨巖法戰不勝大隋菴劫火洞然還有這箇消息麼待須彌崩倒却向汝道且道須彌幾時崩倒喝看壽崇節滿散上堂示大家身為帝王母與佛同生福兼寰宇萬國歡悰慶誕彌蟠桃何止宴瑤池祝香云一德覆坤維永輔明君之化八荒開壽域長居聖母之尊浴佛上堂棒打不死水浸不死指地指天周行七步做出許多裝夯子瑞巖不欲證父攘羊訐人短處勉強辦一盆湯為洗通身染污教渠知有淨智莊嚴功德聚雖然笑倒門前老松樹乾會節滿散上堂九曲河清產聖人行堯舜道覺斯民萬翹仰垂衣化皷舞春風賀太平祝香云色禽峻宇常懷五子之歌富壽多男式副封人之祝結制上堂九旬禁足困魚止濼三月安居鈍鳥栖蘆圓覺伽藍俱掃迹釋迦彌勒是他奴且道他他是誰喝云切忌安名立字禮都寺供佛寄庫提綱元禮首座與老僧見處一般苦瓠連根苦楊岐監寺跨瞎驢踏人無數甜瓜徹蔕甜似這般底束作一束投寄堅牢庫藏亘百世無一毫增損光吞宇宙聲振古今以此供千佛合掌道難消以此利群生銘心思報德何患袈裟下堅固誰云法﨟不增高先身後身一夢兩覺且道承何善力得恁麼殊勝以拂擊禪床欲窮千里目更上一層樓上堂謝閩浙蜀中兄弟相訪筀筍剪龍鬚山茶烹舌欵客話家私各打鄉談說閩蜀同風浙音迥別老倒芝峰耳重聽拍床云子規聲訴三更月端午上堂道士書符引鬼入師巫舍童子采藥抱病投良醫門自身無瘡徒勞針艾瑞巖素無活人藥亦無奪命符俯順時宜以拂畫一畫百恠千妖俱掃跡飽占米飯唱山歌知音者少觸脾多上堂煎笋并謝前白雲和尚相訪傾倒投子油瓶拗折龍孫頭角大鑪鞴裏烹煎香透千巖萬壑殷勤奉供昔年高臥白雲僧與無舌人從頭咬嚼咬得著鼓舞昇平唱村田樂上堂謝靈峰權管跨弄蹄驢住疎壁院千古遺風今再見吞吐何須栗棘蓬煅煉已成丹九轉傾出瓶壺寒光閃電扶危妙在通權變立秋上堂一葉落天下秋一塵起大地収三世諸佛歷代祖師天下老和尚古往今來未曾起一毫情念因甚十方虗空悉皆消殞知麼但得龍王致霖雨大田多稼自豐年解夏上堂閏六月九旬禁足已嫌多那更重加一月遙不解六根門互用蠟人銕做也應消上堂八月秋何處熱塞鴈來賓井梧凋葉拈丈衲僧主丈知時節畫一畫千里萬里一條銕卓一卓阿剌剌中秋上堂謝祖印西堂太白客祖印高提虗明炳煥譬如中秋夜月高低普照幽晦俱明若論靈山指曹溪指好修行好供養總是光不透脫諸人要見光境俱亡十方通暢處麼問取玲瓏巖下具透關者九月旦上堂謝新舊兩序監本祖庭花東西爭擢秀一等放清香不分新與舊枝枝葉葉𨺗頓精神粧點芝園劫外春重九上堂秋菊鋪黃茱萸裛翠彭澤淵明清吟濁醉一年一度賞東籬蹉過重陽總不知因甚如此逐物意移上堂謝監収天童兄弟相訪䆉稏黃雲精神玉粒熟知稼穡人著意勤収拾已収拾舂石墜腰炊香滿室客來唱曲賀豐年撫髀清歡莫嫌貧極開爐上堂監寺莊主知庫楊岐驢弄蹄天衣鴈沉影兩个老無知語不分邪正何似火爐頭話無主無賓是非審定不違法印雖然我王庫內豈有是刀哉古今多少人以橘皮為火紛然錯認拍膝云啞死灰煨殺誰深省達磨忌拈香航海而來面壁而坐未明直指單傳先被梁王勘破當門齒露風隻履歸何早熊耳峰前纍纍荒草至今惹得行人笑元正上堂昨宵送舊今日迎新迎新送舊費盡精神新舊兩頭忘記了始知今日是元正不用借婆衫子拜今年人是去年人元宵上堂并謝知客監寺綿州憩藏主貧苦芝峰賞元宵節宴樂佳賓將何鋪設明挑海底燈細剪亭前月打拍東山瓦皷歌作打丈皷勢云掤八刺札樂有餘清不徹趣味森嚴恰似趙州曾到未到喫盃盃茶洞山生姜不改辣拍膝云啞不是知心向誰說涅槃上堂二月十五瞿曇滅度山鳥悲春山花泣雨盡大地人有屈無伸處拈丈獨有瑞巖主丈子銕作心腸渾不顧唱太平歌卓一下歡聲滿路因甚如此靠丈云殲厥渠魁澄清寰宇三月旦上堂浴乎沂舞雩歸道存目擊樂以忘機嗟歎奔馳途路客拋家失業有誰知拍床云杜䳌啼出血勸得幾人歸上堂薄福值荒年日飡三頓粥兩眼挂青山真味填枵腹貧有餘樂不足誰管古人見延壽不見延壽山前麥熟與未熟無事巖泉洗耳聽幽禽巧奏陽春曲好大哥快活快活佛鑑和尚忌拈香五髻峰頭怨憎會苦熱血相噴重重染污箇樣老妖魔慚愧今朝死麤茶一甌麤香一炷插香云供養阿儂作女人拜云願百劫千生驀劄相逢好眼看承好心攀顧切莫重行𡾟險路何故背後恐遭人指註四月旦上堂大地全荒總不憂奪飢人食縛耕牛衲僧舉止合如是百煉精金肯博鍮佛誕辰上堂撈摝群迷示生五濁臭穢通身如何洗却百袞洋銅以手作澆湯勢澆一杓阿爺爺葉言徹骨清凉快活快活德祐元年二月十六日退院上堂六年償債芝峰寺費盡衣盂用盡心今日杖藜行活路笑看花木媚清陰
