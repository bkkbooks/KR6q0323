得頭光快活生萬松影裏唱歌行脚頭脚底通霄路平處孤危險處平塚間湖山倒影水吞空鷗鷺忘機萬境融不用深深埋暗箭活人全在死人中古源七佛相承壽脉深只圖入水見長人截流機有青波路天下滔滔誰問津夢庵肱枕蘿囪飽黑甜華胥遊徧鶴蹁蹮不思議境全機路何待逢人竪起拳自得寶山有寶費搜尋何似形山寶最親左右逢原好収取絲毫全不假他人無庵銷鑠玄微萬境空㗸花百鳥謾尋踪莫教頑坐精靈窟門鎻亂雲千萬重北山占斷幽都立孤危周遭密布險崖機翻身斗裏深藏穩斫額人多到頂稀竹囪密葉篩金點碧沙月和梅影冷移來香嚴瓦礫徒拋擲門鎻重陰擊不開返照軒靈根豁達絕纖塵只貴回光見得親日斜半囪梅弄影客程猶有未歸人石庵永上人硬工夫做十全牢關深鎻綠蘿烟嶮崖機峻無人透幾見春山蕨竪拳送舜侍者見萬壽退耕和尚湖山深處侍巾瓶錯認頻呼小玉聲急掩耳待尋活路司南車在闔閭城放山室送芳上人見淨慈偃溪和尚南山鱉鼻雖無毒觸著依前解喪身不信當頭揩痒看渾鋼底也沒全人淨妙室為竹院可都正說一塵不立所依亡脫體靈明自放光巨闢三玄三要語接人無力下禪床賢首燈侍者求無盡燦發心燈耿夜臺一花開了一花開普光明殿重重見端的傳從七佛來松上人求古林秀擢威音劫外春靈根盤結幾何深挺生臨濟清凉樹盡大地人來息陰松州一道陰凉自古來依稀臨濟手親㘽枝枝葉葉垂清露點得一城人眼開別源賢首傳上人不續曹溪正脉支分一派朝宗弘滿清凉窟宅春雷變化魚龍月磵即虗明處發靈源坐在沉沉湛湛邊勇退截流機路活揭翻光影未生前昌侍者求斯道一念平常裂萬差覺斯民處貴無邪古今錯透長安路狼藉春風一徑花空華嚴號明海一片虗凝鑑古今持蠡難測幾何深十三華藏重重現照徹微塵古佛心蓬州如行圖僧求偈懶受神仙不死方棄蓬萊入野僧房莫教錯下風幡語頭被傍人剃得光贈淨書狀不學寒山落韻詩翻身來透祖師機碓頭舂出非臺鏡錯受黃梅半夜衣禪房十事蒲龕百帀千重包褁未免黑山裏坐古今多少生盲引得全身入草紙被通身不挂寸絲單明一色邊事要知結角羅紋徑問床分枕子禪板要成片段工夫須是全身倚靠雖然只見一邊未許睦州擔荷蒲團百草頭邊薦得何妨打塊成團直下千差坐斷無心猶隔重關拄杖格外藂林選出生緣不在天台雖然烏律卒地力扶多少人來拂子才得柄覇入手便要呵佛罵祖還他本色真㯶不比尋常談麈鉢盂做處全無滲漏用時開口向天盡大地人飫飽只圖个不知恩戒刀惡鉗鎚下番身未必鋒芒發露不惟斬得猫兒也解煞佛煞祖香印要識分明古篆一槌打得完全燒炷旃檀牛糞衲僧鼻孔穿癢和子既就良工雕琢何妨出手扶持抓著衲僧痒處賞伊一枚茘枝橫江回向徹上人素練翻花浪拍堤聲前聲後截流機青波路險無人透蘆葦風生白鳥飛南山平江南知客壽嶽名標自古今萬年松矮翠成陰東籬采菊悠然見珍重淵明眼有筋賀洪錦溪出世鴈山能仁諸方口裏水漉漉一滴何如龍鼻頭漲起春溪新濯錦觸崖翻瀑浪花浮冷泉二月雷驚蟄燒尾金鱗化作龍拖去鼻頭涓滴水洗清鴈宕幾千峰團垸俞大夫結鳳團花巧施設黑漫漫地轉希奇做教底板堅牢著自有傍人彩𦘕伊王鞔皷鼓兩片皮謾自己一回拈出一回新揭天聲響疑塗毒自有臨風側耳人矮道者身如椰子口宏開看盡諸方鬼戲來放一頭低人不識疎山師叔是同胎隣峰艮上人四十餘年別故鄉夢魂時復到藏王春風九曲溪頭寺花飜霞柳弄黃短笻扶瘦扣烟蘿欵問東山瓦皷歌老倦不能謳唱得隔窗幽鳥語尤多璉監寺烹金爐裏脫胚腪妙斵初無斧鑿痕汝質自成瑚璉噐我儂甘作破沙盆曾把楊岐破屋撑閑騎驢子弄蹄行犯寒踏月慈溪上冷笑梅兄太瘦生日本澄上人掃盡機緣萬法空澄潭不許臥蒼龍翻身踏斷來時路家在海山雲外峰日本然上人橫擔楖𣗖走諸方佛祖玄關路轉長放下身心歸故隱金烏依舊出扶桑奔趍客路困塵泥蟻夢方酣蝶夢飛賴有啼䳌知此意一聲聲勸不如歸化城山主化田古柳堤邊展化機要人一飽便忘飢誰將奪食驅耕手𢬵却良田種蒺藜人我擔骨露皮穿未肯休冥機蠻觸戰蝸牛一肩人我都擔了遍界從教是髑髏慧禪人翠織岷峨錦綉春堪嗟撲撲蔽胡塵金鷄㗸粟餘殃在誰繼神駒踏殺人從禪人臨濟陰凉樹已枯片無霜葉擁禪趺兒孫不解澆培得翫作山門境致圖寧藏主省師兄求語橘州石橋親鄉人橘州文學石橋書妙畫雄才舉世無宗說俱通心眼活奇哉老蚌出雙珠百年凜有遺風烈行處同途不同轍癡翁真得虎頭癡月峰清照峩月分飛鴈影各東西幾對秋風歎離別去去吳天淨如洗淡墨聯書形字義且教人道渠儂好對難兄與難弟緣侍者之淛右一本潼川花瑞菜全蜀知名誰不愛夜雨叢凝色染藍春風花噀香如麝不知何處得靈根㘽遍牛頭山後前古佛低頭看不厭聲聞鼻孔被渠穿上人携種游江淛味與首陽薇不別伏虎巖前清客甞老饕嚼斷娘生舌餘香分餉老芝峰彷彿家園小摘同此去零星休賣弄珍藏大作蘇陀供觀知客歸葬親求語道人觀方知彼去入門要驗賓中主喫一杯茶即轉身誰能掉舌論今古危機俊逸旱雷轟蒼鷹折翅獵狗烹老明覺舉手加額韓大伯敢攙先行秋深撥草天台路靈骨要尋親父母破钁頭邊掘窖埋斷猿哭月風號樹律宗玉維那三人禮石佛求語老倒南山犯真律三生鑿破寒巖石不立名中強立名弗狼籍處成狼籍兒孫膝下有黃金撥草瞻風遠訪尋三拜起來發一嘆方知老子錯留心天真自性佛不管頑石頭邊討甚椀費盡鉗鎚多破綻烏藤緊捉從頭看妙恩侍者求語一奩春錦闘鮮明較古菱花越樣清照影不應呼小玉至今湖海客關情又省師逴得諸方惡毒些歸尋刻骨舊冤家深深掘窖都埋了翻銕面皮誰識爺鄱陽恭上人求語番陽風鼓浪千尋徹底探窮不顧身塔主連聲呼莫莫截流機峻恐驚人靈叟小師悟垓侍者求語碧落一無本非草非真非篆鏡㨾渝江徹底清字義炳然人少見靈叟珍藏歲月深南來吳越人爭尋瘞鶴銘辭匪同調寒山詩句非知音紛紛問字誰親切勾不成勾丿不丿爭得盧公賽子雲一肩擔荷柴衝折臨行密付阿誰邊妙處休云子不傳索性掃除元字脚義天雲淨月孤玄簡州性上人求語春山杜䳌啼苦勸人歸去聲碎竹林風血染花梢雨我老無家可得歸蘿窓睡飽雲黏衣山童推枕破殘夢報道有僧開竹扉何方聖者來尋討解包颺下青龍鈔便欲庭前縱火焚淨地豈容狼藉了問渠何日離飛來兩月奔馳未到家好勸急歸休歇去春風落盡武林花周上人求語簡州憶昔周當仁手握金剛杵憤氣向南方誓滅諸魔子老婆驀劄點三心走入龍潭恨轉深掃蕩家私無一窖胡揮白棒到平人牧閒冷坐思高躅斷絃爭得鸞膠續扣門聽得簡州人倒屐相迎幾折足略寒溫外問來端叉手丁寧覔指南未舉帋燈明說了隔窗春鳥語綿蠻西山淨土庵奉寄具足孤松老師聞道虗空曾解講信疑往決西山亮烟雨溟濛蘚石溫六藏影跡難尋訪小徑披榛扣竹扉道人一見笑掀眉布衲橫肩瘦如削口持密語沒停時雲櫩掃榻延居夏白蓮香散東林社㵎水松風說苦空不資中有生清泰殷勤寄問老孤松具足門中有正宗灼然嫌佛不肯做鳳栖不在梧桐樹戊辰四月初五辭東臯
