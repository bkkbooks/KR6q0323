body:
  text: 題題樗寮書金剛經板善現一生向虗空裏作活計引惹瞿曇拏空撮空妄生穿鑿樗寮居士覰見敗缺展虗空紙大書欵案連累平人板行末運俾泥真空者去其靜勝守頑空者脫其桎梏如鳥飛空不留眹迹若知端的空不生花倘涉意思又從序分說大脫空去也題手軸羅漢這一火落極難描邈類虎欠斑似龍無角從前惡跡是人知活戾天台與南嶽神通遊戲野馬追風習定觀空困魚止爍藂林規矩一星無丘壑襟懷休舉著石爛松枯略無知覺謾說親曾見佛來悔不慎打頭一著錯錯題燈首座送行軸後天童堂司梅僑首座石皷受業無傳首座爛游湖海秋賦式微羣公乘間得肆其謗或謂太白峰前法戰不勝罸錢出院凌辱宗風或謂惠雲堂上機思遲鈍觸瓢墮地方解轉身巧語無根煞人可恕謗則謗了也但責情三十棒至竟無人動著待石皷一撾惡聲遠播藂林必有動心駭目者為之賞音志侍者送行軸用天童西湖三十景為題衲僧家折主丈頭盡乾坤大地不消一劄瓦解氷消何止西湖風月太白烟雲醯雞甕天分甘桎梏今觀此軸雖善闢宏智古佛眼返孤山處士魂欲覔行踪白雲萬里題初上人老融牛軸善畫無規真牧無迹放開線路柳烟披拂汀草蒙茸本地風光一何欠少若作境會當仁徒費精神具正眼看老融無下手處題瑩淨頭賀頌并和軸後衲僧家千聖頭邊胡屙亂撒玉山不能痛與掃除隨後狼籍求予助臂垃圾轉多使識者見之寧免掩鼻而過題月巖頌軸後平如鏡面險似懸崖拶透重關猶存光影機先有路鶻眼迷踪若是步步登高底人終不向明白裏討題玉上人諸祖真蹟先哲書問往來字字句句無非根道縱涉世諦細味之如庖人趍市於海岸漁家巨口細麟皆吾膾炙中物然與實相不相違背故歷代寶之以為大訓豈似今時恣祝鮀欺誑百端習成魔業玉上人珍藏數帖皆禪門負大名宗匠筆力遒勁辭語幽深正眼觀之起必死疾計優波離室必無晉人斥兒輩賤雞為誚焉秀峰其寶之為毒庵楊居土題彭侍郎真蹟諱大雅彭云湛寂明妙獨立不變與太虗為體者謂之性混沌開先造化後出與太極為蒂者謂之命動靜闔闢循環錯綜與天地為機者謂之心見於四時形於萬端與性命為用者謂之情性命心情體蒂機用待制彭公為八面敵故能綸巾羽扇坐碧油幢折千里遐衝立萬世勛業今觀妙畫英氣逼人死諸葛走生仲達可以併案非草書愈頭風子彰髑髏血糢糊祛瘧鬼者同日而語毒庵其寶之題盧石屏住護國送行軸後群賢妙唱字字句句有活人眼非石屏卒難承當雖然碧桃洞口春色烘人大有人迷路在遇指津時寒拾風顛隄防冷笑題王逸老草書心經般若真空語言道斷心行處滅不容擬議於其間因甚有許多絡索直饒四無礙辨窮盡玄微切莫草書謾我為石壁長老題應庵諸祖真蹟後鍋子大小杓柄短長諸老家私盡情吐露就中些子誵訛渾動不著若點檢得出諸方知這一絡索總是嚼飯餧兒隔屏罵婦不直一笑其或未然時難且與同香火歲晚須知各戶門徑山悟侍者求跋了庵頌軸一句子超百億脚未跨門參天荊棘若更待菜葉隨流泥牛入海竪拳勘證低頭而入總成未了公案要知不涉機思直造大休歇地麼悟侍者諾到家了也緊閉柴門打一覺睡題大覺真蹟大覺赴紫泥之詔對使者焚龍腦鉢法道愈尊䇿勛僧史真萬世鼎也滿謂氣食萬牛凜然有不可犯之態今觀此帖字畫端誠語辭卑遜略無一毫尊崇氣味視今炙手權門歃血盟里胥者以位自驕令人嘔穢為記行人䟦書圓覺經後大光明藏墨聚萬重圓覺妙場泥深三尺老瞿曇出身無路諸菩薩沒脚重淵口欵既招欲隱彌露記行人從頭寫過鋟板流通俾不了義人了此一段義若於帋上推尋連累行人負鞍㗸鐵離此別求同黃面老兒入犂泥獄題袁平叔𦘕鬼百戲圖墨魁瘦蹇不嘶熊癡綬步百樣喬䊋千般社舞獵獵旌旗蔽野雲呦呦鼓笛填村路不減朱陳嫁娶圖中有些兒奇恠處不是小道人亦非假胡女副墨子曲盡形容中陰身終難共語髑髏識盡喜猶存陰風歷歷鳴神樹敗缺了也窮鬼子窮鬼子題李伯時𦘕淨梵王抱太子謁大自在廟天王王見即禮拜圖小𤺊兒真捏怪人見憎鬼見怕累老爺懷抱不知斷慈母恩情忒煞生七日母死竺國威獰獨大天名自在何甞自在縱饒伊具三頭六臂展盡神通驀劄相逢終不免五體翹勤深深下拜題鬼踢弄圖駕險凌危曳弓放彈弄鬼精魂打喬雜絆笛吹夢蕻竹喧轟鼓打蝦蟇皮緊幔虗空踢出脚尖頭妙處不知誰解看說與渠魁請高著眼為昌州月上人題草虫圖草木精靈羽毛群族非翻身異類會無情說法者難邈其真雖然且道龍眠想入馬腹中莊周夢為蝴蝶是真耶非真耶問褚先生管城子舜侍者請題蘭亭帖唐臨蘭亭禊事帖世取妙刻為貴於死生亦大矣少有味之者故真贋所不分嗚呼崇山峻嶺茂林脩竹心畫燦然多作境會使右軍更生寧免一字三嘆清虗和尚語錄序石田去後其道方行盖其平日以氣自負縱霹靂火鎔烹金爐妙密鉗鎚非繞指柔不入煅煉灰飛烟滅癡絕校其書拊几長嘆曰噫世無碧眼胡雖天衣不能施其巧清虗善學柳下惠剔錮疏泥鈍鐵脫胎換骨火明文武橐鼓風雷清徹虗凝色含百煉頑銅鈍鐵悉為改容湖海咸知不待錄其術方鳴也惜乎畢工太速不克終其志遺竈猶存當有寒灰發𦦨躍冶不祥者以觀其續止啼黃葉予無取焉俊侍者將別山四會語錄歸日本板行求予序引圓照老人佩臨濟正傳之印五據要津印破天下衲僧面門如春雷啟蟄飛龍昇天驚蛇竄草各適所安別山深入閫奧搭無文印古篆分明六合雲奔千林氣肅辨龍蛇眼隱不容絲唾結砒霜語含鴆毒天王為之竦骨獅子聽之落威寶公因之死心長庚拱之失色惡聲貫耳充塞大唐俊侍者不能防身遠害更將惡蘖航海東歸予恐日本國中流殃肆毒累及無辜酖味喪軀貽無窮恨故作序引以冠其首云䟦䟦天童別山和尚語錄別山四會語如斷鰲立極無一毫傾側處貴令大地人安家樂業若知端的坐致昇平苟涉遲疑未免被毗藍轉却䟦石橋寫圓悟心要妙圓悟以之毛錐頴悟石橋以之熊掌與魚二者兼得上人宜以天厨禁臠十襲珍藏必有䑛鼎知味三嚥三嘆為之沃心䟦鈍庵密庵帖老宿言鈍庵與雲臥歃血論盟誓不應世晚念法門衰替戲伸怒臂振頹綱於雲海亭前鐵網漫空麟鳳龜龍皆歸籠絡密庵以破沙盆換正法眼清廟之器為之改色大張佛日應庵之道若揭日月豈小補哉諦觀二帖丁寧不倦槌拂善裁閫外威權如臥龍劃苦肉計使公瑾奏赤壁功若合符契德璉監寺需予著語明鏡繪像染污清明亟卷而還之庶無誚焉䟦大慧帖大慧以天縱之資熏風南來空華翳目錯認諸佛出身處後於海湧峰前閱華嚴第七地發明殃掘摩羅救產難因緣峻機電卷雄辯潮奔世無嬰其鋒者今觀妙帖舉方山待時而鳴激礪後人勿求速效如帝網交羅重重攝入真護法城壁立萬仞非不動步徧遊十三華藏界百億香水海者所能睥睨夜光可市求此實難了沂其寶之䟦禪會圖禪既強名會亦妄立一火無知打棚雜劇百樣喬䊋誑世人千般怪語瞞天日若是本色行家不打這般皷笛𦘕影圖形轉弗堪藂林千古成狼籍不狼籍留與仁禪遮破壁䟦枯山語錄後每憶侍先師與即庵於玉几涵秋獲聽語秀巖時事如金翅擘海直取龍吞不知滄溟之深淺篆銘心腑幾四十年今觀枯山六會拈提真克世其家碧落無本惜江湖掩明晦德惟以中興漢業稱之痛哉死諸葛走生仲達世豈無執董狐筆者奮為直書年月日䟦䟦天童淨和尚墨跡諸老䟦後太白死句中有活句諸老活句中有死句死活向上有事在擬議尋思吳元濟不待夜入蔡州城已被擒捉了也具透關眼者切忌掃雪求跡年月日䟦破庵和尚墨跡無準和尚䟦後鳳山攘羊龍囦證之已是笑破他人口更添乳竇竈倉耳語鼎鼎是什麼人家年月日䟦䟦送元東山造藏經歸蜀頌軸一生看經不識字總十二部為一句猶帶元字脚在蜀罹羯胡肆酷一大藏教片帋不存欲求元字脚了不可得東山未離文字相赬肩萬里一力擔回意使蜀人復見古道顏色不減經歸白馬僧到赤烏群英著語以旌其行可謂助桀為虐前途忽遇臭老婆點破切不得向窮諸玄辯處倒戈卸甲䟦新眾寮頌軸山僧入院後見眾寮頺圮難以安龍象乙丑丁旱鳩四山餘材架數椽以庇風雨初無奇特群賢作偈褒美何異與醜婦濃塗朱粉菷𦘕蛾眉非使効顰反令成鬼急卷還之免貽識者之誚䟦北磵和尚自贊靈照頌南康璋禪人請丹霞龐老總妖人不減獰爭蠱毒神靈照專行禁邪法相逢便捋鬼頭巾䟦永明惟心訣何山注心已強名訣從何來永明剜肉作瘡何山隔壁猜謎急急將來付丙丁大丈夫兒休擬議如擬議三級浪高魚化龍癡人猶戽夜塘水舜首座書語錄求䟦鴉臭當風立目之者掩鼻而過舜首座蓄之何為急丙丁無貽我醜䟦正宗贊庚戌歲予首眾冷泉有客携唐畫十六應真請上方癡絕老人長贊師命分作因為效顰蒙師褒美以是柏庭友于求贊祖像八九後數年藏六靈鷲放山室力疾續為之如蟻撼樹是不量其力也一時消遣豈謂江湖傳錄顏汗沃襟無著慚惶處欲毀不能得文質侍者乳竇相從詩吟小艶扇破犀牛頗禁磨琢水流雲散各天一涯朅來巘雲深處出示求䟦野狐涎唾視之惡心急令屏棄若於帋筆未形時贊毀不及處照見古人肝膽方知此錄鸚鵡喫煎茶䟦張魏公親書心經紫巖先生以經天緯地之材羽扇綸巾䇿勳帷幄調鼎餘暇侍母秦國太夫人趍圓悟室潛鞭密煉真金繞指汗血奏功致使薰風南來凉生殿閣揭示諸佛出身處拈花慧命一縷繫千鈞斷而復續大功不宰豈小補哉慨想典斗山仰止今觀親書心經妙畫龍翔鳳翥英氣逼人三沐三薰不忍去手倘非妙悟真空洞萬物表豈能照破空生敗闕夜光可市求此實難上人其寶之䟦禪會圖吾祖之道得人即興失人即亡自昔聖賢為內外護譬如琵琶琴瑟必資好手乃發至音鳳凰麒麟出以其時方為上瑞今觀此軸主法者皆僧中龍問道者皆人中傑至若翁嫗幼艾提籃拄钁茅舍團欒說無生話視死生為游戲非真實履踐安能及此慨望風規令人顙泚亦不知其為𦘕也豈雛道人趍炎販懸羊賣狗戕賊法門者同日而語因各為之贊敬題其上如將五采黼黻太虗叢林豈無具獲麟筆削重為䟦天宮可都正重刊辨正邪經鏡重磨淨發光金百煉柔繞指黃面老人無大人相反累他人傷鋒犯手何不明窗下安排何故見怪不怪其怪自壞清侍者求䟦密庵與寧侍者法語千聖頂𩕳父母未生嚙鏃靈機燭天光彩若非智眼洞明卒難透見密庵當陽揭示譬如禹門霹𮦷桃花浪暖變化魚龍皆承燒尾之力於中開遮縱奪作活破家邪法難扶鬼門貼卦清侍者莫惜淬倚天長劒一洗祅氛為寧侍者雪屈善學柳下惠叔世中流一壺當刮目以俟頌漩翁和泥合水幾經春只貴隨流轉得身白浪堆頭深掘窖老來偏解活埋人黑山佛祖仰望不及處暗昏昏地悄巍巍放開閃電光中路拶著全身陷銕圍雙溪朝宗正派競分支那箇源頭肯放低堪咲截流人不薦從東過了又從西雲溪一從鎻斷清波路密影重重布𦘕橋著脚不知深淺處定應攧折瞎驢腰兀庵身同枯木倚寒巖鑠盡玄微沒許般只麼守些獃怛怛從教壁倒與籬坍謙翁具通方眼放𭿇盲爭肯先人一步行窮四部洲求遜讓看來不出老先生龍淵未施爪距風雲玉鑑光寒不染塵昨夜寒濤輕蘸月賺他無限抉珠人古岸乾坤未剖立雄基雪袞寒濤日打圍脚下儘教浮逼逼直通一路與人歸無見色塵銷盡眼頭空著得須彌山萬重不似靈雲存鑑覺被桃花換主人翁滸眼萬派奔流觸斷崕渦漩一竅絕安排淵深徹見靈源底裏許如何著得沙大用二三四七惡機關互逞辭鋒鬪熱瞞不必山僧一彈指盡情貶向銕圍山無盡老胡移種覺園花五葉聯芳次第來惱亂春風沒休日一枝開了一枝開樵隱斫得塊柴擔不起和雲颺下枕頭邊夢魂不涉人間世肯把黃梅破鉢傳石壁一方峭峻絕安排立處還同萬仞崖盧老倩人書不得春日濈濈長莓苔假菴穿鑿虗空幻架或從來共住不知名笑他借位明功底錯認簷頭雨滴聲瓢泉當陽剖破劫壺來見徹根源眼有沙臨際爺爺得一杓葛藤浸爛又萠芽栖巖拗折瘦藤枝靠倒險崖句佛祖謾尋踪無你湊泊處休征擊碎軒轅鏡焚燒黃石書瘦笻春力徤帶月訪樵漁雪崖二壁立千尋度玉風絕捫摩處有行踪草鞋踏出毗盧印見得分明隔萬重空花翳眼沒根莖平白誰知太險生窮一色邊須撒手且無玄路與人行西窻格樣親傳鼻祖家短簷時見夕陽斜雖然巨闢通方眼牛過依前露尾巴愚翁聰明點盡若盲聾沒變通時有變通漏得黃梅無底鉢笑開老眼醉春風鏡堂非明非暗亦非臺萬像從教影現來剛被老胡書破壁沒塵埃却有塵埃虗叟千聖機塵一洗清心淵絕滓自靈明白頭謾說無功用種得空花結菓成元叟搆得先天那一機𮌎中字脚沒星兒直從千聖頭邊坐不許兒孫取次知平山一鏡面鋪非剗削且無高下與人爭擬從頂𩕳尋玄路著脚須防有賺阬滸眼一生逐浪與隨流未見根源未肯休孔竅不知深幾許臨崖看著使人愁疎山塔二衲僧毛病沒星星剛被傍人授記成萬壑松濤撼明月隔溪誤認倒屙聲活被人埋汝水濆新豐一曲杳無聞可怜嬌舞曹家女不嫁春風嫁白雲惺惺石主人翁已強安名何待區區喚一聲坐得石頭穿透底依然打箇不惺惺古桃仙苑春風幾奏名三千年實結初成曾將一點枝頭血換却靈雲兩眼睛煨芋糞火香凝午夢初爛煨黃獨替春蔬山童急把柴門掩只恐閑雲引詔書送雪竇圓兄歸疎山錦鏡濃粧蜀樣花沒塵埃處惹塵埃好歸說與曹家女已是當堂打破來送椿兄之蔣山徑山法語有賣虗空之說老倒凌霄徹骨窮強書白契賣虗空要將刀尺分長短須向鍾山問寶公送如兄見枯椿枯椿一語錯流傳礙塞平人萬萬千百雜碎時須跳出莫教坐在法身邊送明兄之天童徑山火後古蠻絲褁塊焦桐色帶凌霄劫火紅送與天童彈一操風前月下滴丁東送清兄見天童并扣石溪前寶公兮後寶公分身說法在玲瓏訪尋不用論賓主十二面門元一同送傑兄歸子雲墨池徑山有東坡墨池凌風倒握瘦藤枝來探坡僊浣墨池染污一身難洗雪到家莫使子雲知送悅兄歸篆江省母萬疊穠陰襯落花一江流水篆紋斜娘生面目無遮護見得分明始到家石溪自鴈宕避難回天童巢雲蒼鷹俊翼倦摩霄巖下深雲穩寄巢且放愁狐雙眼閉恐驚群鷺宿寒梢鴈峰削玉鎻層陰彷彿梅陽瘴面春回首揭天撾毒皷聲冤何止十三人回賀阡辨山退雙林赴金山雙檮定起月三更倒跨金鰲戲八紘袖褁門槌惡剌剌德雲不敢占先行賀天童心首座懶織蒲鞋罷養親入蟭螟眼鼓烟塵只將打發雲門手更與玲瓏接一人送東川本之太白本鄉有低頭佛萬松關險路縈紆門掩深雲窄有餘佛過低頭不妨得且圖人見額邊珠送人住雲臥接待菴雲臥遺風仰正傳接人全在钁頭邊臨機不用閑忉怛自有春山蕨竪拳送俊兄歸桃源省母故國胡塵蔽不開拏舟深入武陵家野桃花映娘生面莫學靈雲眼著沙疎山送道州如矮歸湘西善寫真筆頭俊逸眼頭親邈得疎山矮子真落鴈圖邊輕展看誰云不是道州人疎山送日兄歸玄沙疎山覔得曹家女嬌舞西風不解羞歸與謝郎稱萬福免教紅爛在漁舟悼時愚菴主詔書颺在破床頭高枕松根睡覺休啼盡山禽驚不醒蘿囪空鎻暮雲愁送鏡兄之虎丘虎巖老虎太威獰平地拏人死復生背却西風行一轉髭鬚倒捋兩三莖采蕨撥雲尋蕨到層峰荊棘林中有路通拈起一拳全殺活漏籃無底貯春風燒筍稚子相呼脫錦衣餉春不減首山蕨翻身跳入爐中浴透得山僧嚙鏃機刈茆百草頭邊活路通嶮崖機透幾千重長長短短𠜂除了収放全歸掌握中划柴紛紛枝葉亂如麻不惜從頭與一划驚起銕蛇忙竄草樵歌聲徹老盧家寄紫籜茶與虎丘石溪籜龍㗸味噀春英香入蘿囪午夢清笑汲新泉煩陸羽責圖尊宿眼增明寄賀天童滅翁和尚二老饕八十再生牙爛嚼虗空吐出滓點檢玲瓏巖下草枝枝葉葉是曇花接人籌室肯雷同用活兵機不犯鋒把定牢關輕放過一人標記一株松寫華嚴求偈衲僧用處得能乖肯向龍宮鼻嗅來黑墨濃磨塗白帋重重無盡雜花開古樵七佛已前曾賣弄分明一塊爛枯柴老盧不解擔當得火種只今無地埋無聞缺齒胡僧戲劇多打虗空皷唱巴歌山河大地連聲咲不柰聾人耳朵何天童送鑑少瞻之江心東谷生涯徹骨貧煩君說與了師兄一從鳳宿龍巢後寶殿無人步月明天童送深兄歸湖州采樵深入萬松關踏破烟雲幾朵山擔折驀知柴束重掉頭歸唱月彎彎送祐兄之仰山仰山活業苦無多畬片荒田種粟籮去與一鋤翻到底聽渠叉手道如何淨慈送拱侍者之天童參天目無孔銕鎚三五百大川語烹金鑪裏鑄成來就將一箇輕拋擲擊得玲瓏竅子開明月谷血書華嚴蒙恩宣入內庭一回𡎺破娘生指血染春風開雜花香噴龍王宮殿滿胡僧嗅得鼻頭喎平溪一片寒光湛不流古今誰解覔源頭東西雖有地如掌未許南泉閑牧牛古柏不識威音劫外春錯將西祖意瞞人紛紛多是尋枝葉誰向枯椿透法身湧溪平地忽翻千尺浪吞空沃日勢滔滔截流機峻無人薦謾說荼陵踏斷橋泉山接得靈源正脉親險崖機裏解翻身莫教倒嶽傾湫去浸殺茫茫大地人巨源元無一滴皷波瀾發得頭來海樣寬舉棹迷踪知幾許桃花誤作武陵看竹房三莖