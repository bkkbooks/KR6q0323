本呆蹈前車覆轍良馬窺鞭一撥便轉韓獹逐塊三搭不回無明草須要利器械底剗除折柴衝豈無大力量人擔荷且未說黃梅半夜正傳衣鉢先要知法華近年重整規繩坐臥經行十二時隄防六賊頑愚孛惡三十棒趂出三門如斯告報取笑傍觀且道笑箇甚麼少年曾決龍蛇陳老大還同稚子歌復示頌云不擬寒山落韻詩未傳盧老潑禪衣腳頭活取通霄路來透庭前剗草機上堂枕石安眠山雲四屯救不得也浣盆浣盆更說甚德山臨際棒如雨點喝似雷奔拍膝云草迷人去路月掛客愁村兜率茆屋西堂至上堂茆屋賦新詩內院尋知識身從勝境中來句自活法中得非身非句絶毫絶釐慈氏少陵安得知法華不敢輕饒舌只恐山禽語帶微因事上堂指臨際參黃蘗接雲門嗣雪峰賊無種相鼓弄說黃龍碎澄散聖冬瓜之印荷慈明骨董之箱賊無種相鼓法華門下還有這般作略底麼自云有三十棒趕出門外何故當甚王小波草鞋因事上堂鴆鳥毛蠱毒水毒不傷人何妨服餌以拂子打一圓相云只有這些兒含毒噴人深入骨髓三世諸佛畏之如兔見蒼鷹歷代祖師遠之如龍怖金翅唯有活衲僧嗜之如鼎味粉骨碎身猶未已貪他底著他底以拂子擊禪床一下云佛也如何救得你為聖僧開光明打頭不遇作家謾說俱輪先度饒伊諸漏頓超到底終成染污不染污以筆點眼云活眼點開光吞寰宇歸僧堂上堂六用門頭力戰爭奪鎗殺賊陳雲橫群魔竄入藕絲孔竟挽天河洗甲兵凌烟閣就汗血功成高枕圓蒲塵夢破隔窗幽鳥話升平灼然如是千聖同盟諸禪德若也腳跟浮逼逼𦘕堂立變鐵圍城祈晴上堂久雨不晴高低水平浸爛釋迦鼻孔淹鱉迦葉眼睛拈丈云主杖子天造草昧宜建侯而不寧正恁麼時向甚處曬㫰皮草卓一下豁開正眼明如日掃蕩重昏天宇清上堂住院恰周年日夜荒忙殺園荒手自鉏屋老身驚壓費盡心神百醜千拙翻思三條椽下噇飯噇眠凡聖情空心行處滅赤條條地生涯別生涯別羊頭車子推明月斷橋遺書至上堂南宕湖邊天台山上踏斷石橋絶人來往難透無過者一關望崖多少空惆悵握不成拳伸不成掌活語翻成死欵招謾說藕絲牽玉象上堂諸莊旱潦不為憂只恐難調水牯牛拽脫鼻繩憨睡穩數聲羌笛野田秋絶無形影誰放誰收通身白了通身黑游戲風煙百草頭上堂三伏炎蒸汗流如雨老倒白雲說迷說悟一莖草上建瓊樓喝云熟睡饒譫語上堂覿體全彰曾無覆藏蟬聲集古寺鳥影度寒塘眼裏無筋偷觀即瞎耳中有竅絶聽何傷堪笑勤川孟八郎不知諸佛出身處錯摶量薰凰自南來殿閣生微凉引得傍人鬪熱荒拍膝云鵲石何曾解放光上堂不可以智知金剛手把八楞鎚不可以識識鎮州出箇大蘿蔔不可以語言造山禽聚集啼清曉不可以寂默通八角龜烏吞大蟲只這四重關古今多少人透不得法華與汝八字打開了也還有掉臂過關者麼自云有乃展兩手云還我出身公驗來解制上堂不守蠟人冰不憐鵝護雪互用六根門大地一團鐵擊拂子一下云百雜碎了也妙盡依亡肱枕緑蘿形影絶獻花百鳥自空忙謝新舊職事上堂墅里山前一棚傀儡箇東箇西或進或退打東山鼓樂斷送及時著楊岐戲衫編排合製雖由行主線牽抽妙舞三臺誰不會誰不會喝彩一聲鴉飛鵲喙謝連監寺上堂司南車轆轆轉務與冥行指迷肯被傍人指點三腳驢却步不前老楊歧惡殽難掩雖然靜為養道之源退乃修身之本著腳休循覆轍行白牛露地橫眠穩上堂四十餘年白雲高臥無端刺腦膠盆日夜烹煎家火莊田淹沒與死為鄰屋舍傾頽安身難保山僧冷地思量不覺呵呵大笑笑什麼定業難逃何妨笑破賴有東村王老知繞笆籬唱哩哩囉拍禪床云何似大石調中秋謝都場監收并知客維那上堂明月可中庭鴈影沉寒水烹金爐冷歲華深九鼎遺言猶在耳拈主丈云深深撥著宿火通紅不假一槌成大器刈禾鎌子疾如風退院上堂秋晚台星照命宮不亨通事亦亨通持還趙國連城璧換我蘿窗一枕風
