body:
  text: 希叟和尚廣録目次卷第一佛隴禪寺語録法華禪寺語録卷第二雪竇資聖禪寺語録開善崇慶禪寺語録卷第三開善崇慶禪寺語録卷第四小參法語卍已下二目係新插序說卷第五拈古并頌卷第六題跋頌卷第七題詩贊小佛事希叟和尚廣録目次終希叟和尚廣録卷第一希叟和尚佛隴禪寺語録侍者法澄編師於淳祐九年正月初八日入院山門大解脫門無入作處掣斷玄關頭頭活路遂驟步入云信腳何妨行數步佛殿德山軟頑雲門放憨救不得也瞿曇瞿曇遂插香云我也無端入閙籃方丈震旦心宗竺乾正眼覿面當機是非俱剗不落思惟透險崖喝云階下漢勑黃衲僧家尋常鼻孔遼天因甚被這箇穿却豈不見道至化難逃江湖疏臨崕擠人惡語傷人冤深潮海嚼齒吞齦啞說著無非是惡心法衣未入雞足山不踏黃梅路惡業苦無多平白披毛去明眼人前一場笑具法空座現成箇見得到行得到說得到須彌燈王狼籍不少索語陷虎機屠龍技大用現前無小試莫有奮不顧身底麼出來相見佛問隴頭瑞氣盤空闊古佛今朝又放光答云病眼見空花進云野梅的皪寒包玉引得清風度暗香學人上來請師祝聖答云太白峰前松萬本歲寒難比聖人心進云開堂祝聖蒙師指六代傳衣事若何答云賊無種相鼓籠進云如何是第一祖答云觸誤梁王諱恓恓暗渡江進云如何是第二祖答云白折一隻臂進云如何是第三祖答云通身紅爛不堪覷進云如何是第四祖答云空拳誑小兒進云如何是第五祖答云再來不直半分錢進云如何是第六祖答云石頭墜折瞎驢腰進云六祖已蒙師指示向上宗乘又若何答云簷頭滴滴分明瀝瀝進云昔日定上座參臨濟問如何是祖師西來意還端的也無答太平休整間戈甲進云際下禪床擒住云道道未審有指示無指示答云利劒斬虗空萬象鳴剝剝進云定擬議是會不會答云閉目食蝸牛一場酸澀苦進云只如傍僧云定上座何不禮拜還有成褫意也無答云與賊過梯進云因甚其僧禮拜便悟去答萬里崖州未為遠進云作家宗師天然猶在遂禮拜答云賊贓不受提綱向上一路滑壁立萬仞嶮石火電光猶是鈍德山臨濟用險崖機搆不徹南泉趙州具透關眼覷不見搆得徹覷得見萬里崖州未為遠更說甚即心即佛畫地為牢非心非佛刻舟求劒畢竟如何拂子擊禪床云聲前句後新羅箭舉保壽開堂三聖推出一僧保壽便打三聖云恁麼為人非惟瞎這僧眼瞎鎮州一城人眼去在保壽擲主丈歸方丈拈云保壽是則是惜乎小膽待三聖恁麼道拽主丈和聲打出庶見宗通眼活當時既已放過即今底聻遂橫按主丈顧視左右云誰敢當夜小參西子湖邊泛渺茫一堤寒緑看垂楊誰知業債難逃避開眼堂堂入鑊湯到這裏如何即得擬欲爛煨黃獨不顧紫泥未免陷古人腳跡擬欲關空鎖夢塞路斷橋又恐坐在葛藤窠裡不如隨分納些些俯順時宜去也遂拈主丈云竪窮三際橫按云橫亘十方卓一下云碧眼黃頭會不得靠主丈云野梅風定暗浮香復舉南泉山下有一庵主僧過云近日南泉出世何不上山禮拜主云非但南泉出世直饒千佛出世亦不出禮拜南泉聞得令趙州往勘州到便禮拜主不顧從東過西從西過東主亦不顧州云草賊大敗拽下簾子便行歸舉似南泉泉云我從來疑著這漢頌云奴顏婢膝走人間羞見羊裘七里灘文叔雖為天子貴子陵只作故人看為齊王上堂山雨釀春寒曉濕梅花重結實較遲遲且聽香浮動化工有意待重來永為鼎鼐調羮用且道重來底人是誰乃起身曲躬云齊王萬福元宵謝新舊兩班上堂人家競賞元宵佛隴百無一有管宴雖愧空疏賓主不分新舊隴頭月助放光明谷口風編排節奏春風舞袖樂升平不知身在然燈後乃拍手云好大哥正月十七百丈禪師忌拈香一喝三日聾盡把家私喪深掘陷人坑難免無根謗千古叢林作禍基幾人含笑幾人悲因事上堂舉趙州參投子中路值投子提瓶下山州云久嚮投子元來只是賣油翁子云汝只識賣油翁且不識投子州云如何是投子子提起瓶云油油拈云盡道投子老兒尋常涓滴無滲漏因甚被趙州點撿直饒錮鏴得成未免粘手綴腳二月一上堂三兄五弟嘯月眠雲看山玩水拈得口兮失却鼻衆中驀有箇漢出來道如來禪祖師意只這是佛隴不惜低眉向前深深打箇問訊云低聲低聲墻壁有耳謝新舊知事應亨浩妙應群機亨衢得路浩浩塵中如何辨主辨得主進退隨宜不妨去住倒跨楊岐三腳驢南北東西誇獨步佛涅槃上堂拘尸羅城娑羅雙樹死欵難翻賊身全露引得波旬叢然笑舞後代兒孫口似椎有屈誰伸訴山花點滴啼紅雨上堂春日晴燒痕青錦雲片片花霧冥冥舉拂子云無位真人面門出入喝云賊精賊精上堂一不做二不休得人一馬還人一牛豈不見臨際三遭白棒大愚肋下三拳痛𡎺不共戴天讎山悠悠水悠悠怨結春風百草頭拍膝云休休說著令人滿面羞祈晴上堂衲僧主丈頭一升三合米今年春雨多一飽應難擬覺海山仙聞如是語怒髮衝冠驅神駕鬼誅雲師掃煙翠以拂子打一圓相放出金烏出海門且聽歌舞樂豐年只圖一箇不知恩清明上堂寒食清明節人家拜掃時紙灰粘蝶翅啼血染花枝追親思遠寫恨含悲不論富貴大小由之唯有林泉衲子無思無念無欲無為圓蒲靜倚瘦䇿間戲燕子自長春寂寂長歌一曲囉囉哩拍膝云不是知音說向誰上堂從上爪牙千差萬別截鶴續鳧傷龜恕鱉拈主丈云主丈子不入這保社瞞瞞頇頇跛跛挈挈有眼如盲有舌如結靠主丈靜倚松根憨眠不徹佛法從教爛似泥搖手云不說不說上堂山舍春深生涯日貧桃花爛熳不見靈雲何故家無白澤圖上堂薄福住山渾無暇日忙時直是間緩處非常急驅園夫奴子鋤菜地掃松行指莫監楊團拆東籬補西壁眼前事亂如麻腳跟下黑如漆驀有箇漢出來道長老何太區區只向道任是七佛祖師亦無這箇消息入京歸上堂赤腳走紅塵全身入荒草費了幾精神不若居山好一塢間雲千峰啼鳥聲色純真是非不到堪悲堪笑寒山子十年歸不得忘却來時道上堂拈主丈云活鱍鱍硬紏紏明眼人覷不透剛被春山杜宇知點血啼清晝擲下主丈云臨風𨁝跳撼坤維喝云驢前馬後上堂向上機頂門眼碗脫丘漏燈盞從上諸祖已錯拈提佛壟今朝分明剖判會麼夜後打眠齊時喫飯摘茶笋上堂撼茶樹偷筍去角虎出林鐵蛇橫路毒氣炎炎如火聚眨上眉毛見得親靈跡不在猿啼處上堂松粉飄香麥鬚弄黃今朝春告別無處覔行藏燕子知不遷義深談實相對語雕梁見汝諸人不會銜泥營故壘飛過莫家塘因事上堂舉五祖頌云山前一片間田地叉手丁寧問祖翁幾度賣來還自買為憐松竹引清風拈云東山老人忒無主宰些小田地買來賣去有甚了期佛壟即不然祖翁田地絶邊垠契券分明孰敢侵削盡春風間草木松濤翻月竹篩金浴佛上堂棒打不死水浸不死兩手揶揄一身染污假饒佛壟藥頭靈到底如何洗得清結夏上堂四月十五諸方結夏畫地為牢重重杻械獨有陽堂石磬峰雲自高飛去留無礙何故登東山而小魯登泰山而小天下拍膝云不知誰是同參者上堂古人道參十箇善知識不知參一箇首座參十箇首座不如參一箇同行參十箇同行不如參一箇自己佛壟即不然太平休整間戈甲一枕松風醉黑甜上堂肥馬碌碌瘦馬碌碌醫得眼前瘡剜却心頭肉朝不足莫不足六六依然三十六會麼雲門見睦州良遂參麻谷上堂萬機休罷住雲間門掩青蘿竟日間時聽嗚咿歌一曲倒騎黃犢出松關若作佛法會錦包特石若作世諦會鐵褁泥團惆悵無人知此意拍繩床云臨風拍碎石闌干徑山遺書拈香父不仁子惡毒熱血相噴痛拳相𡎺不共戴天讎推入阿鼻獄此冤此恨與誰論海月山雲亦斷魂端午上堂有服藥甚功效不收肘後方書不入神農本草善財采處不識真文殊用之不得妙拈丈云佛壟信手拈來卓下云百病根源俱掃諸人還覺脫體清涼麼良久云既已清凉擲下云何須這箇上堂煙晴竹樹啼姑惡月冷松梢哭子規莫謂一聲聲破夢未歸須憶到家時台州夔一翁同少野相訪上堂人從天台來遺我一卷易報道同人于野先號咷而後笑終吉佛壟田舍兒素不知書三沐三薰玩之無懌何故誰將華屋富換却草廬貧上堂三日晴五日雨無象太平滿田禾黍不作佛法商量亦非世諦流布碧眼黃頭總不知拈杖云問訊輪皴主丈子卓下云牢記取道舊至上堂橫按主丈云德山令行曲直難辨喝一喝臨際用底真僞不分佛壟小長老無力蹈古人腳跡隨分東拏西撮以當門風擲下主丈云主丈從教化活龍雖然如是取笑傍觀上堂拈主丈平如鏡面險似懸崖不容擬議豈屬安排卓下云閃電光中行活路大悲院裏赴村齊上堂三伏炎炎汗流如雨佛壟把扇扇風手尚無力何暇拈槌竪拂與諸人說黃道黑雖然如是錯會者多謝監收上堂舉拂子這一粒甚處生陰陽未判芽孽先萌開花也一川雪霽結實也萬頃雲橫收拾歸來香滿鉢飯餘鼓腹唱歌行且道承誰恩力顧視左右云聻上堂六月買清風人間恐無價佛壟拔貧作富盡情收拾與諸人祛除熱惱去也將拂子作搖扇勢云暢殺我儂快殺我儂上堂顯大機明大用六月黃河連底凍千聖不携己靈不重帶角披毛異類行拍膝云漆桶漆桶上堂是是荊棘叢林黃金田地非非伊蘭旃蔔甘露蒺藜是不是非不非鶴健將雛去猿間抱子歸上堂有亦不管無亦不管飯來開口睡來合眼且道什麼人境界良久云我亦不知上堂拂子畫一畫云包羲一畫朴散淳離達磨九年情忘義斷已後搬泥拽石擔板輥毬邪法難扶浸成凌滅到這裡如何即得喝一喝幸然明似鏡何用曲如鉤謝侍者維那相訪并謝監收上堂小玉聲中桶箍聲𪹼處密用潛行危分險布佛壟且無許多般事乘時刈却禾香飯炊雲子間唱山居歌散步松門路雖然點撿將來也是趙婆酤醋上堂山僧未到此間時西湖之岸南山之陰客寄雲簷夢見石磬峰前紅光亘天時與諸人舉手加額同聲贊美既到此後飽和羅飯松風一枕鼻息如雷欲求前日夢中境界了不可得何故賊不入慎家之門上堂細入微塵大包無外擬欲承當失錢遭罪解制小參秋初夏末東去西去明眼衲僧撞著露柱直得狸奴白牯動地放光碧眼黃頭隱身無路雖然如是猶涉程途在須知更有到家句到家句三千里外逢人錯舉舉南泉鉏田次有僧來參泉云汝去庵中做飯喫與我送一分上山來左槎芒繩縛鬼子僧到庵做飯喫了將家生一時打破就南泉床展腳眠六月黃河連底凍南泉見時過飯不至遂歸見僧打破家生在床下眠泉亦就半壁眠玻璃萬頃含秋月折筯如何攪得渾其僧拂袖便出海枯終見底人死不知心泉後云三十年前有箇伶俐道者至今不知落著珊瑚枕上兩行淚半是思君半恨君拈云南泉老漢有定亂之謀無定亂之劒致得這僧無禮當時見僧在床上眠便縱火燒却庵直饒這僧出身路活未免髑髏著地解夏上堂出佛身血破和合僧驢腮馬頷逞技矜能堪笑靈山兒戲劇聚頭爭看蠟人氷拍膝云驢年驢年謝新舊維那首座監寺上堂雲巖洞裏桃花黃蘗樹頭蜜果春陽煦嫗爭妍霜雪憑凌不到乘時收粳兩全真信手拈來俱是妙倣倣佛佛渾渾圇圇一似楊岐栗棘蓬擘不破吞得過家私盡底掀翻了諸人還知麼良久拍床云狼籍不少故舊至上堂丹桂飄庭際寒蛩語砌陰聲聲調雅奏點點簇黃金盡情拈出宴樂嘉賓佛壟雖貧未是貧雖然如是喚作聲得麼喚作色得麼上堂有一物無人識或在東南或居西北破草鞋跟踏著價重千金折主丈頭挑來分文不直識不識吳地冬瓜鎮州蘿蔔中秋上堂一月行空千門賞玩自己光明幾人著眼馬師父子盡力揩磨不得一半諸人要見真月麼拂子打圓相云何似破漆碗上堂正令全提無在不在簸箕有唇洞庭無蓋若作奇特商量入地獄如箭射不作奇特商量入地獄如箭射謝副寺寮首座修造監收上堂守洞山活業須賣生姜續佛日光明豈無火種佛壟雖則移梁作柱拆東補西收拾將來莫不稱職美則美矣只如古德道刈禾鎌子疾如風又且如何定當待山僧計較得成即向諸人道九月一上堂地僻雲深秋高境寂堂戶凄凉無人面壁雖然淨地上誰肯狼籍上堂秋葉飄零秋蟲夜鳴色不是色聲亦非聲不勞眼見只許心聽達磨九年會不得急携隻履問歸程重九上堂甘菊舒黃茱萸噴香淵明錯會耽賞重陽采菊東籬下南山見未忘拍膝云剛道花枝有短長海莊歸上堂繭足尋莊到海門天衣往事與誰論長空鴈影沉寒水瘦立西風幾斷魂上堂撞烟樓不知羞闢蟭螟眼輥百花毬四七二三阿轆轆不思萬里有崖州上堂頭上漫漫腳下漫漫拈掇不起地闊天寬何故老僧住持事繁達磨祖師忌燒香鼠竊竺乾身逃震旦合火分贓兒孫無眼死欵諸方不言今朝佛壟分明斷以何為據插香云看上堂竪抹橫該馬腹驢胎聖凡情盡古路封苔不用閉門防客愛間能有幾人來上堂拈主丈主丈子半生倔強不受人瞞等間拋擲青山不敢青白雲不敢白逗到今日無繩自縛一點氣用不著未免隨氀㲣秋行枯葉徑春步落花村且恁麼過雖然如是土曠人稀上堂山木陰陰寒花淺深巢雲鶴怨掛月猿吟妙手王維𦘕不得拍膝云神光徒自覔安心上堂拈主丈無量劫來七顛八倒卓下云打破虗空擲下主丈全身入草上堂謝愛雲西堂相訪舉福巖置和尚頌云福巖山上雲舒卷任朝昏忽爾落平地客來難討門拈云福巖雖則緘封甚密爭奈沒蹤跡處有踪跡佛壟即不然佛壟山上雲一片三四片忽遇客推門零亂舒還卷有踪由却沒踪由通身是眼尋難見尋得見木落千林光浮碧巘開爐上堂佛壟開爐寒灰死火撥著星兒彌天罪過笑倒嵩山破竈墮舉應菴冬夜示衆云一十三州七十僧驢腮馬頷得人憎諸方若具撈籠手今日無緣到淨因徑山先師佛鑑和尚拈云應庵太師祖道也煞道惜乎舌頭太長徑山即不然五百餘僧八十州襤襂破衲面皺搜諸方有道不肯學甘共山僧拽木頭拈云徑山先師道則也煞道惜乎舌頭太短佛壟雖則舌頭無骨狗尾續貂試下一轉語看三十餘僧眼似眉白雲深處聚頭嬉燒枯柴火煨山芋拽木撈籠總不知上堂冬至日舒長舉拂子云這箇長多少虗空為尺不能量蟭螟眼中盛恰好盛恰好衒惑神光迷逢達磨上堂謝首座秉拂知事做齊人天眼目堂中首座一句截流千差失照何似栗棘蓬鐵餕餡格外安排目前包褁只要諸人塞斷耳根併却咽喉聽得真咬得破咬破後如何三十烏藤莫言不道上堂我也無端到住山忙忙業識不曾間白雲拂盡到枯葉恐礙采樵人往還寒松瑟瑟幽鳥關關家私花擘盡誰道語音蠻上堂生平說大脫空今受活地獄報一片無骨舌頭數日和根爛了衆中莫有善能救藥底麼乃吐舌云阿爺爺上堂古檜吟風寒鴉布陳不落見聞幾人錯認不錯認道士擎拳闍梨問訊聖節上堂祝融峰萬年松翠陰籠鶴瑞氣蟠龍用獻聖明天子壽枝枝葉葉自春風臘八上堂六年雪凍不死見明星便說悟貿易皮衣走出山覷人鐵褁面皮頑且道還可救藥也無乃搖頭云難難因事上堂炊無米飯向無煙火斷義忘恩違因背果三世諸佛也恁麼歷代祖師也恁麼天下老凍膿也恁麼佛壟一衆也恁麼且道其中還有優劣也無良久云時難且與同床竈歲晚須知各戶門上堂一塢耕樵門扃緑蘿富驕時少貧樂時多婦搖機軋軋兒弄口㗻㗻㵎水松聲交節奏拍床云何似東山瓦鼓歌鋪新席上堂入荒田不揀信手拈來草緯地與經天頭頭俱是妙打成一片見全功碧眼黃頭俱靠倒豈不見長慶稜道者坐破蒲團一箇兩箇三箇四五六七箇拍膝云家風狼籍知多少謝南麓雪崖庵主上堂山鬟風急墜松叉冷竈凝烟午未齊黃獨煨香不能熟老僧忍凍拾枯柴見成活業出格安排懶瓚窮未徹糞火一生埋立春日上堂拈主丈春日打春牛一擊百雜碎黃梅石女暗驚胎生下無名物一塊問四聖四聖不知問六凡六凡不會擲下主丈風前散作萬家春賤似黃金貴似塵歲旦上堂惟一堅密身一切塵中現老婆腰繫紫紗裙嬌兒手把紅羅扇南奧東村張坊李店拜賀新年春風滿面歡悰不覺語聲高驚落梅花一片兩片三四片散聖節上堂大道無方至尊無位睿哲文明垂衣而治堯風舜日萬斯年舉世無思不戴天謝新舊副寺監寺并謝應都寺歲齊上堂高價賣生姜雪真珠滿床清貧雖徹骨富敢鬪君王灼然如是膾身為食漬血為漿盡情供養猶未相當若也未是和烟耕緑野枯笛送斜陽元宵上堂舉拂子這一燈處甚起沒踪由難擬議三賢十聖眼見如盲芥狗泥猪放光動地吹拂子云大家吹滅暗中行然燈佛在你腳底百丈和尚忌拈香浪蕩貪觀野鴨兒犯叢林合講清規鼻頭揑破知慚愧燒炷楓香供養伊上堂增金以黃謗沉無香達磨不會歷魏游梁更有不識好惡底齊腰立雪寄食窮鄉拍膝云巫峽聞猿空斷腸上堂花禁冷葉紅草敵虗嵐翠費盡幾丹青欲描描不類和煙和雨濕闌干諸禪德吾無隱乎爾上堂一徑直二周遮眉毛眼睫地角天涯雲門胡餅趙州茶惠崇蘆鴈趙昌花會則星河秋一鴈不會則砧杵夜千家因雪上堂枯木糝瑤花虗庭封玉砌少室謾安心神光空折臂不墮功勛一色邊拍膝云闌干誰共倚佛涅槃上堂四十九年欺胡謾漢疾入涅槃救得一半諦觀紫磨金色身拍膝云涴却娘生眼上堂我有一機極盡玄微飢來喫飯寒來著衣我有一句包羅今古犬吠枯樁猫捉老鼠且道是佛法耶世諦耶良久云問取門前石塔子上堂祕魔擎叉俱胝竪指邪法難扶如何得是山僧冷地思量只得吞聲飲氣何故攻乎異端斯害也矣上堂衆人問訊了也侍者燒香了也拈丈云次當主丈子宣說法要畫一畫云太文采生卓一卓云太多口生靠云掛壁從教白醭生上堂拈丈云覿面當機東湧西沒平地上險崖惺惺中淈𣸩不是心不是佛不是物擲下云貶向無生國清明上堂花錦蝶翻紅柳烟鶯織曉曾不動機絲奪盡春工巧玄中玄妙中妙三世諸佛覷不破歷代祖師窮不到窮得到寒食清明家家拜掃法華語録侍者了舜編師於景定庚申六月初九日入院三門路透清波山橫翠壁樓閣門開彈指云從這裡入佛殿三十二相八十種好馬頷驢腮彌天羅過新法華因甚刺腦入膠盆插香云過在你殃及我土地正直聰明風流儒雅堅護法城䇿勳千載李將軍有佳聲在李觀察為土地祖堂靈鷲峰前熱血相噴覺城東際陷坑無底失腳休論後與先癡翁何似我風顛癡絶開山據室拈丈云智與理冥神與境會碎維摩床斷毗盧髻碧眼黃頭著眼覷卓主丈云百雜碎法座頂𩕳機法空座不涉思而知不動步而到喝云無端入荒草府帖借家傳帝網絲下公子仙鼇釣捩轉衲僧鼻頭撩撥諸方一笑鵾化鵬飛總未知推蓬對月平分破却請維那揚帆鼓棹府疏韓柳肺腸蘇黃骨髓點著禪衣香風匝地七十二峰增秀氣江湖疏共飯江湖何須唆鬪含血噴人先污其口結成不共戴天冤句句無非是罵門山門疏三百斤鐵枷數載無人荷揚在壁根頭只得冤讎到口欵分明不可翻老肩無力也須擔祝觀相香柱石皇家遠布伊周之德金湯佛法永推裴李之心壽介松椿福深河海提綱一物不為鳳縈金網萬機寢削龍怖碧潭便恁麼去少室門風離離荒草放開線道俯順時宜借東山鼓樂趂呵場熱發諸人一笑去也拈主丈橫按作打長鼓勢云堋八刺札還聞麼新翻曲調逸格鄉談意隨流水遠聲遏莫雲寒豆子山前人不會靠丈云月移花影上闌干舉裴相國捧佛請黃檗安名公案拈云裴相國容儀挺特百福嚴身脫體現成不知污染老黃檗強將五采黼黻太虗明眼人前不滿一笑何故它家自有黃金骨不假旃檀入細雕為太師周國正惠公周國夫人上堂尊貴中來報土無差瓊琚庭院錦繡樓臺何似靈山聽法華聯穩駕白牛車十五日謝兩班上堂老倒住山全無伎倆揖客低腰逢僧合掌雖然俯順時宜不礙當機收放何故鯤化鵬飛羽翼齊搏扶一舉青霄上為行者立參盧老無端揚下柴碓頭舂出古菱花惡聲千載成狼籍養子誰人解克家入城歸上堂三伏走人間炎蒸汗如雨非無休歇時亦無栖泊處拈主丈拄杖子脊梁生鐵鑄浩浩塵中能辨主歸來息影翠微深抹月披雲卓主丈一下云截斷千差路上堂解夏五日了也水牯牛作麼生溪東溪西山南山北白蘋香細翠草陰濃收放無羈去留自適爭奈鼻繩在山僧手裏要知穩步到家藏身無跡處麼數聲羌笛烟村暝猿掛寒梢月正明雖然猶隔洞庭七十二峰在八月秋何處熱出門行處荒草離披面壁坐時寒蛩凄切衲僧眼裏著得須彌山耳中著得四大海聲色純真只得一橛且道如何是蓋色騎聲句良久云人倚𦘕樓江月冷玉簫三弄碧雲秋重九因事上堂籬菊鋪黃茱萸噴香淵明錯會耽賞重陽何似林間衲子無榮無辱無可思量飽噇香積飯高臥古禪床是佛是魔俱掃跡獻花無路鳥空忙十月初五達磨忌拈香教外別傳全無巴鼻接二祖錯指本來心破六宗打落當門齒罪犯彌天容身無地法華小比丘既不能斬草除根因甚燒香作禮不見道禮之用和為貴謝三峰西堂蔭首座上堂湖山蒼蒼湖水茫茫丹楓飄錦金橘鋪黃明眼衲僧隨境轉聖凡無處覔行藏雖然瞞法華一人即得若遇屋裏人不勞拈出且那個是屋裏人顧視云聻天童別山和尚遺書至上堂太白峰前施小伎淵默雷霆人自畏瓦礫翻成釋梵宮古佛門風重振起不墮功勳等間遊戲金毛獅子忽翻身草木昆蟲俱𢪛淚𢪛淚即不無且甚處見天童師兄良久云杲日麗天盲人摸地上堂覺城東際小小叢林旃檀圍繞獅子嚬呻蘿月四窗雲萬壑見成一片祖師心喝云眼裏無筋一世貧上堂落寞山家忙如火急趂晴刈茆帶霜收橘山僧冷地思量盡把家私狼籍日日日東上日日日西沒上堂有一物黑如漆常在面門出入騎聲蓋色妙密中嶮崕倒用逆施嶮崕中妙密三世諸佛遠之愈親白牯狸奴得之轉失法華不惜眉毛拈主丈為汝當陽拈出夭夭矯矯𥻘𥻘皴皴將謂南山鱉鼻蛇却是天台楖𣗖擲下主丈云分文不直病中上堂久病腳力衰嬰兒學移步喪盡目前機辨得塵中主鼻直眼橫皮穿骨露驢不成兮馬不成撫膝一下云且無描摸處良久云賺殺僧繇吳道子病起并謝新舊職事上堂拈主丈曹山攢簇不得底病盧醫難以施其巧山僧自出母胎四百四病悉皆嘗遍世醫亦為之拱手驀於絶思慮息機緣裂萬差破諸有處見一無位真人面前深深問訊云且喜邇來大小職事進退合宜聞如是語如獲肘後方書通靈妙藥以至佛祖身心饑飽勞疫風寒暑濕一切諸病卓主丈一下云不消一服脫體清凉去也諸人莫要同到安樂之地麼靠主丈彼自無瘡莫傷之也啓建天基節上堂拈主丈拄杖子化作直符使者遍巡天台南嶽五臺峨眉檀特羅浮竺乾震旦次第報云黃河三千年一度清聖人五百世一間出今正是時既告報已急歸覺城山下普集人天撾鼓升堂三呼萬歲法華既其勤至乃慰之曰甚勞神觀彼聞此語還復本形靠主丈軃入禪床角頭休歇身心涵泳聖化去也何故堯舜垂衣天下治何須木鐸警華戎佛成道上堂棄金輪王位尊貴不尊貴凍餓深雪中爭甚麼間氣見明星沒巴鼻更言大地一切衆生成正覺吽吽棒折也未謝應藏主至綿州人上堂大康山楊浮山撞頭搕額共打鄉談其中切腳無人會一大藏教華梵重翻且道是甚麼字切不得道鉢囉