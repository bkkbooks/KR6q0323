body:
  text: 拈古并頌舉溈山臥次長蛇偃月勢難分仰山上問訊赤腳上刀梯溈山轉面覷後綿𮖐蒺藜仰云某甲是和尚弟子何用形跡撩鈎搭索溈山作起勢利動君子半是真情半脫空仰山便出黃蘗作驢鍬溈喚回云我適來得一夢汝試為原看滿口嚼氷霜仰山將一盆水一手巾度與賊須賊捉溈山遂洗面將錯就錯香嚴至溈云我適來與寂子做一上神通不同小小不獨謾人亦自謾嚴云我在下面一一知得分明賊口難憑溈云試道看重重納敗嚴點一碗茶與之前箭猶輕後箭深溈云二子神通智過鶖子誣人之罪以罪加之拈云細影密鋪金鎖碎清聲微動玉玲瓏不無溈山父子點檢將來總是開眼做夢雖然洛陽花下路迷却幾多人頌古洞桃花發嫩枝施朱施粉兩相宜要渠成結千年實多謝春風著意吹舉明招上堂衆集定招云這裏風頭稍硬且歸暖處商量作賊人心虗衆隨至方丈逼狗上墻招云才到暖處便見瞌睡以主丈一時趕散滿川龍虎舉猶自說平基拈云明招獨眼龍可謂秦無人當時若是箇漢待他道這裏風頭稍硬且歸暖處商量便撫掌呵呵大笑非惟增光一衆使這老漢有身無著處拈明招雖則嫌客罵婦點檢將來未免如猫捕鼠頌田厙翁翁兩𩯭霜苦貪濁酒弄觥觴兒孫步步相隨逐扶得歸家又發狂舉臺山婆子僧問臺山路向什麼處去刺腦入膠盆婆云驀直去荊棘參天僧才行腳下泥深三尺婆云好箇師僧便恁麼去貪杯惜醉人趙州聞云須勘過這老婆始得只聞人作鬼不見寉成仙及見便問臺山路向什麼處去劒甲未施賊身已露婆云驀直去鐵鑄巖崖州云勘破了也兩手扶犂拈云臺山一路平如鏡面險似懸崖千人萬人只解貪程不知蹉過要見婆子麼去路一身輕似葉要見趙州麼佳名千古重如山頌收拾成都賣卜家君平術肆獨宏開閙中人獻支機石掀倒卦盤歸去來舉馬祖西藏百丈南泉玩月次祖云正恁麼時如何藕絲牽動五須彌藏云正好供養過山尋蟻跡又云正好修行度水覔魚踪南泉拂袖便行蝦跳不出斗祖云經歸藏禪歸海惟有普願獨超物外渾家送上渡頭船拈寶峰山頂皓月流輝幸自可憐生無端一陳黑風吹數片雲翳却清光了也致令千古之下揑目生花衆中莫有忍俊不禁底麼如無山僧不惜眉毛為伊點破以拂子空中畫云風休雲淨打一圓相云皓月流輝擲拂子云直饒光影滅何似未生時頌百戲場中賽錦標蠻牌竹馬舞兒多頭籌暗地奪將去行主喃喃強說呵拈一種弄光影就中南泉較險何故拂跡成痕舉趙州問南泉如何是道太平休整間戈甲泉云平常心是道黃金包𮖐爛泥團州云還可趣向也無金剛腦後抽生鐵泉云擬向即乖截斷腳跟州云不擬爭知是道錮鏴著生鐵泉云道不屬知不屬不知知是妄覺不知是無記若真達不疑之道譬如太虗廓然寥豁豈可強是非耶舌頭拖地州禮拜李陵雖好手未免陷番身拈南泉父子激揚錚鏗如驪龍玩珠吞吐自如若是真正衲僧寧免嘔噦頌一塊郴州鐵渾崙擘不開輪槌輕擊著雪刃暗飛來舉僧問馬祖離四句絶百非請師直指西來意含元殿裏覔長安祖云我今日勞倦不能為汝說問取智藏利刃蜜僧問智藏云我今日頭痛不能為汝說問取海兄綿𮖐蒺藜海云我到這裏却不會幽州猶自可最苦是新羅僧舉似馬祖云藏頭白海頭黑苕𦘕蛾眉拈云衆中皆謂這僧死而不弔殊不知馬師父子被他一狀領過頌出匣神鋒瑩鸊鵜將軍珍襲已多時相承不是誅龍手只作三文補履錐舉南泉鋤田次有僧來參泉云汝去庵中做飯喫與老僧送一分上山來左搓芒繩縛鬼子僧歸做飯喫了將家生一時打破就南泉床上展腳睡六月黃河連底凍泉歸見亦就半壁眠玻璃萬頃含秋月折筯如何攪得渾僧拂袖便行海枯終見底人死不知心泉後云三十年前有箇伶利道者至今不知落處泪出痛腸拈南泉老漢有定亂之謀無定亂之劒致令這僧無禮當時見在床上眠便縱火燒却庵直饒這僧全機未免髑髏著地頌勢罷奴欺主年衰鬼弄人南泉招致得冷泪濕衣巾舉世尊初生一手指天一手指地云天上天下唯吾獨尊借人面具舞三臺鴉臭當風立雲門云我當時若見一棒打殺與狗子喫貴圖天下太平李陵雖好手未免陷番身拈清平世界管絃沸月花錦妍春無端一陳妖氛大地山河皆成墨聚雲門憤氣不平握生苕菷痛與掃除雖則千兵易得一將難求其奈貪程太過墮在萬丈深坑至今出頭不得遂左右顧視云衆中莫有為雲門雪屈底麼如無山僧不惜眉毛驀拈主丈橫按云吽吽須知海嶽歸明主未信乾坤陷吉人卓一下又雲門雖則把手共行無間路點檢將來趂得老鼠打破油缸頌落賴兒郎自小愚為貪花酒廢詩書當時早得嚴師訓破壞箕裘未到渠舉世尊拈花清平世界鼓烟塵迦葉微笑助桀為虐世尊云吾有正法眼藏涅槃妙心分付摩訶迦葉餿飯祭間神拈諸方老宿或云迦葉失却一隻眼或云被特石驀口一塞至今有屈無雪處點檢將來只解扶強不能扶弱殊不知釋迦老子展盡神通不滿迦葉一笑何故春風得意馬蹄疾一日看盡長安花頌塞北安南幾戰爭老來卜築傍煙村却將舊斬樓蘭劒換得黃牛教子孫舉文殊是七佛之師因甚出女子定不得鐵牛不食欄邊草誅龍之劒不揮蛇罔明下界菩薩因甚出得癩馬空嘶柳下風太阿補履不如錐拈文殊買鐵得金罔明如蟲禦木向使女子把得定千聖頂𩕳瞥轉一機看這一隊漢面皮厚多少頌仙苑名花取次糚鼕鼕羯鼓謾催芳春風不費纖毫力拂掠枝頭便有香舉文殊普賢起佛見法見貧兒思舊債家衰窮相現世尊以神力攝向二鐵圍山毒蛇須是乞兒捉樂則同歡賞不避仇讎拈文殊普賢佛見法見璞玉渾金磚頭瓦片盡情掃却不留踪萬里神光腦後箭諸人還知黃面老子敗缺處麼良久云若不同床處焉知被底穿又黃面瞿曇只顧他非不知己過當時盡令而行也是鐵圍山裏漢何故若不同床睡焉知被底穿且道誵訛在甚麼處頌美如西子離金闕嬌似楊妃倚玉樓猶把琵琶半遮面不令人見轉風流又拂苔高臥白雲根夢繞春風錦繡園驀聽采樵歌一曲醒來月掛客愁村舉舍利弗問須菩提夢中說法與覺時是同是別醉人說話不堪聽莫𥧌語你又醉也須菩提云此義甚深吾不能說此會有彌勒大士汝可往問慣作搕𢶍污人門舍利弗往問彌勒避得風雷遭雨雹出得醬甕又入虀甕彌勒云誰名彌勒誰是彌勒者屎無兩般臭傳尸勞病怕沾身拈須菩提一生虗空作活計被人問著不說便休無事駕禍與別人作麼若非補處大士深辨端倪寧免寐熟饒譫語頌風前不見花中葉雨後難尋葉底花蜂蝶紛紛過墻去只疑春色在鄰家舉達磨見武帝帝問如何是聖諦我一義八角蒺藜當面擲磨云廓然無聖鐵網漫空帝云對朕者誰砒霜未是毒磨云不識截斷腳跟帝不契買金須是賣金人磨遂渡江善為道路拈老胡殫千金之産學屠龍之技技成無以施其巧雖然誰知冷灰裏九轉透瓶香頌宮花壓𩯭墜烏雲傾國風流宛勝秦玉笛插藏人不見夜深吹起鳳樓春乃顧左右云還有第相品弄者麼自云有拍膝云邪法難扶舉世尊一日與阿難行次見一塔世尊便禮拜奴見婢殷勤難云此是誰人之塔言中設網羅世尊云過去諸佛塔牛死空欄難云過去諸佛是誰弟子捉賊求贓世尊云是吾弟子河水從源濁拈過去諸佛是世尊弟子則故是且道世尊是誰弟子若也知得楊柳春風行樂處若也不知芭蕉夜雨斷腸時頌碧緑青紅百樣花盡從春色巧安排不知春色端倪處平地危分萬仞崖舉外問者佛不問有言不問無言黃金鑄就鐵崑崙世尊良久殺人刀活人劒誰知冷灰裏九轉透瓶香外道云世尊大慈大悲開我迷雲令我得入削玉求瑕世尊云如世良馬見鞭影而行茅戶挂珠簾直饒描得似未免費丹青拈騎賊馬趕賊奪賊槍殺賊則不無黃面老兒反被阿難輕輕拶著便見將南作北雖然如是玉印不離天子手金箱豈可庶人知又息黥補劓拂跡成痕黃面老人寧免諸方唇吻只如不動鋒鋩不施藥線活必死於膏肓還有人辨得底麼若也辨得良馬窺鞭已遲八刻若也未辨東土阿師不如西天外道頌萬里澄江雪霽時玉壺一色冷涵輝漁翁認得烟村路柳線穿魚帶月歸舉月上女入城舍利弗出城相值弗問云聖女何處去女云如舍利弗恁麼去弗云我方出城汝方入城何云如某甲恁麼去女云諸佛弟子依何而住弗云依大涅槃而住女云若依大涅槃而住則我如舍利弗恁麼去拈月上女前頭較些子後頭笑殺人若是箇丈夫漢向千聖頂𩕳別行一路直饒古今佛祖競出頭來亦仰望不及爭肯受人平地活埋雖然如是誰知冷灰裏九轉透瓶香頌黃金肌骨鐵心腸曉出重城眩巧糚賺入涅槃門路去連天荒草看人忙舉二僧見風吹剎幡一人云風動一云幡動爭論未已六祖云非風幡動仁者心動拈擔柴漢黃梅席上竊得衣盂半夜三更驚忙奔走及見風幡便言心動也是作賊人心虗雖然如是只如風幡未動何處求心還知麼白雲盡處見明月黃葉落時聞搗衣頌烟雨溟濛望眼迷蘭舟小泊𦘕橋西兒童不識春流漲却怪湖邊柳樹低舉馬祖送書與國一開見書中圓相國一於中著一點封回國師聞云欽師猶被馬師惑拈大小國師三緘不密錯斷諸方名言山僧要問欽師被惑則固是且道馬師還曾被惑麼待渠擬議便云惑了也教這老漢知道螳蜋貪怒臂黃已爭擒頌𤺊撲場中作斷交拳來腳去不相饒誰知用盡平生力却被間人奪錦標舉鳥窠因侍者相辭師云甚處去侍云某甲為法出家和尚不垂慈誨今往諸方學佛法去師云若是佛法我這裏亦有少許侍云如何是和尚此間佛法師拈布毛吹一吹侍者因此有省拈鳥窠吹布毛幸自可憐生無端侍者因而悟去冷眼看來也是鈍鳥不離窠頌擬學鵬搏九萬風誰知折翅鳥窠中至今秦望山前雨血泪千林花泪紅舉破竈墮山前有一廟中惟一竈別無神像終日祭祀不歇師一日入廟云汝本泥土所成靈從何來聖從何起日受宰殺遂以杖擊之云破也墮也竈即隨手而壞是夜竇神拜謝而去拈靈從何來聖從何起潑土頽磚有何奇異輕輕拈出瘦藤枝擊碎元來無一伎雖然世諦流布即得衲僧門下也是餿飯祭間神頌苦戀京華不肯歸行裝須待送窮時茆船寂寞煙汀月別後何人更有詩舉國師三喚侍者侍者三應師云將謂吾辜負汝誰知汝辜負吾拈國師年老心孤憐兒不覺醜侍者孝當竭力無日不承顏因甚却道汝辜負吾會麼黃金滿眼書盈屋只恐承家得力遲頌仙翁還斾武陵家仙女歡迎步彩霞貪弄玉簫頻勸酒不知凋盡碧桃花舉丹霞訪國師問逢侍者問國師在否云云不謬為南陽國師拈侍者有抱關擊柝之意無隄防暴客之心致遭他人毒手當時若解慎初護末待他道龍生龍子鳳産鳳兒即向道老賊我識得你非惟截斷丹霞腳跟亦免渾家窮煎餓炒頌南陽家法是人知剛被丹霞教壞伊致使親生龍鳳子一時翻作鼠黏兒舉馬祖同百丈游山次見野鴨子祖遂扭丈鼻頭忍痛失聲遂大悟後歸寮或哭或笑拈川僧素無頭腦步步引人入草忽驚野鴨群飛便把鼻頭揑破哭不成聲笑還絶倒只因家富小兒嬌七世門風都壞了且道還可扶持也無遂扭侍者鼻云更添一箇頌送目群飛野鴨邊不勝情事與誰論輕輕扭定娘生鼻海月山雲亦斷魂舉龐居士問馬祖不與萬法為侶是什麼人祖云待汝一口吸盡西江水即向汝道拈大小龐翁向鬼窟裏作活計更得傍人燒錢酹酒助發狂魂至今出陰界不得山僧雖無肘後靈符也要與渠勦絶拈主丈云敕敕吉吉攝攝又避得風雷重遭雨雹頌脫體無依是病由直須大死一回休西江吸盡無涓滴便解人前不識羞舉百丈再參馬祖拈舉拂子掛拂子大用全提曾無肯路當機一喝三日聾大冶精金如糞土諸人要知二老相見處麼火雲飛碧漢氷片滿長街頌閃電光中奪信旗怒雷一擊喪全機從茲獨據雄峰頂佛祖低頭聽指揮舉僧問百丈如何是奇特丈云獨坐大雄峰拈無人處斫額望汝又將謂奇特元來在草窠裏輥頌鼻孔親遭扭揑來乞兒得食向人誇雄峰獨坐稱奇特斷綆何曾是活蛇舉百丈問溈山云併却咽喉唇吻道將一句來溈山云却請和尚道道吾云和尚也須併却雲巖云和尚有也未拈丁公七箭鎖喉法善用者不露鋒鋩百丈老人雖解發不能中的返被群驍攢箭射殺雖然如是李將軍有佳聲在不得封侯亦是間頌破鏡生兒惜似金晨昏不敢離煙林羽毛長就飛求食聚口粉爭喫母心舉麻谷參章敬繞禪床一匝振錫一下卓然而立敬云是是又到南泉亦繞禪床一匝振錫一下卓然而立泉云不是不是谷云章敬道是和尚未審道不是泉云章敬即是是汝不是此是風力所轉終成敗壞拈麻谷用盡自己心笑破他人口章敬南泉一等天行病陰陽證不同頌學得陶米小術些當場撮弄數般花雖然過得常人眼到底難瞞是作家舉丹霞訪居士門逢靈照女便問居士在否照放下菜籃斂手而立又問居士在否女提籃便行丹霞遂回女歸舉似龐翁翁云丹霞在否女云已去翁云赤土塗牛妳拈丹霞阿魏無真遇物便噬靈照水銀無假入煆即流只如道赤土塗牛妳未審落在賓家落在主家具透關眼者必能甄別頌雲𩯭慵梳劣性多逢人專要逞慺㦬門前落節歸誇俊不奈爺爺咬齒何舉南泉示衆云喚作如如早變了也今時師僧須向異類中行始得趙州云出異即不問如何是類南泉以手托地州一踏踏倒急歸延壽呌云悔悔泉令侍者問悔箇甚麼州云悔不更與兩踏拈異類中行不無南泉爭奈鼻繩在趙州手裏趙州雖得便宜未免出南泉圈繢不得頌飛騎將軍入虜庭兵機煉得十分精誰知敗績緣欺敵致使凌烟易姓名舉南泉與歸宗麻谷同謁國師至中路泉𦘕一圓相歸宗便於中坐麻谷作女人拜泉云恁麼則不去也遂相喚而回拈家貧猶自可路貧愁殺人頌上林春色正繁華公子聯轆去賞花貪弄玉杯泥樣醉笙歌中路逆歸家舉臨濟參黃蘗三度問佛法大意三度被打遂往見大愚乃問有過無過愚云黃蘗恁麼老婆心切猶問有過無過濟大悟遂於大愚肋下築三拳愚托云汝師黃蘗非關我事拈黃蘗棒頭無活眼大愚舌上有龍泉直饒臨濟得路翻身子已過新羅國頌南國江山入戰圖生靈何處問漁樵憑君休說封侯事一將功成萬骨枯舉盤山云三界無法何處求心拈劒閣路雖險夜行人更多頌柳掛金絲鶯織曉花鋪翠錦蝶眠春見成一幅新圖𦘕不待王維手眼親舉天皇住時龍潭開餅鋪日將十餅奉皇每留一餅還潭潭乃問皇云是汝持來還復於汝渾遂出家名信後得法拈本是善因而招惡果頌胡餅朝朝供一僧知他結了幾生冤甜瓜換得胡盧種才出頭來便滅門舉世尊升座文殊白槌云諦觀法王法法王法如是拈皓玉無瑕雕文喪德頌雪徑輕寒蝶未知暗香誰遣好風吹野橋漏泄春光處正為橫斜一兩枝舉南泉云王老師賣身去也云云不作貴不作賤拈諸方酬價或云來年與和尚作一領布衫或云和尚屬我也山僧貧作富勉強酬一句看和尚年尊恐難使喚又云切莫嫌粗難惡頌赤窮王老賣渾身賤似黃金貴似塵不費分文收買得一程送與采樵人舉十二時中不依倚一物拈死水不藏龍頌太平時節歲豐登旅不賫糧戶不扄官路無人夜無月唱歌歸去月三更舉雲門問僧甚處來僧云江西來門云江西一隊老漢寐語住也未僧無對拈鸕語鶴頌村落誰家醜女兒愛將苕菷𦘕蛾眉逢人掩鼻嫌腥穢鴉臭當風自不知舉麻谷問臨濟大悲千手眼那箇是正眼濟云大悲千手眼作麼生是正眼速道速道谷拽濟下禪床便坐濟云不審谷擬議濟便喝拽谷下禪床却坐谷便休去拈臨濟麻谷如屯百萬軍對壘相似皂旗閃爍雪刃縱橫凜然有不可犯之勢及至兩將挑戰却只以瓦礫相攻正眼看來當甚小兒戲劇頌大悲正眼露堂堂百步常搖閃電光被掣風顛醫瞎了暗中拖拽下禪床舉僧問投子如何是十身調御投子下繩牀立拈𦘕虎成狸頌白髮宮娃不解愁滿頭猶自插花枝曾緣玉兒君王寵準擬人看似舊時舉供養百千諸佛不如供養一箇無心道人拈召大衆云百千諸佛有何過無心道人有何德會麼仙壇無客到鬼市足人行頌霜拂金鞍玉墜腰雞聲催入紫宸朝何如雲壑飽清夢殘月半囪松影搖舉南泉山下有一庵主僧過云近日南泉出世何不上山禮拜主云莫道南泉出世任是千佛出世亦不去禮拜南泉聞得令趙州去勘州到便禮拜主不顧州從西過東從東過西主並不顧州云草賊大敗遂拽下簾子便行歸舉似泉泉云我從來疑著這漢拈南泉父子平地喫交至今無人扶得起庵主雖則牢關把定千聖窺覷無門點檢將來未免燒錢惹鬼頌奴顏婢膝走人間羞見羊裘七里灘文叔雖為天子貴子陵只作故人看舉清淨行者不入涅槃破戒比丘不入地獄拈功德天黑暗女有智人前二俱不受頌濁酒松醪喫兩鍾醉拖長袖舞春風天崩地裂誰能管幾見落花堆亂紅舉居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實拈無孔鐵鎚頌喫粥喫飯過聽風聽雨眠風光俱買盡不費一文錢舉藥山坐次石頭問云作甚麼山云一物不為頭云恁麼則間坐也山云間坐則為也頭云千聖亦不識拈古井須防有毒蛇頌一塊松根石頑然自古來更無人覷著歲歲長莓苔舉僧問如何是清淨法身雲門云花藥闌僧云便恁麼去時如何門云金毛獅子雪竇拈云大無端拈進人若將加諸膝退人若將墜諸淵雲門放去較憨雪竇收來較險諸人還有恁麼時節麼若有切不得坐在這裏頌玉闌花藥鬪春工雨濕胭脂臉暈紅絲管紛紛來賞玩可憐吹落五更風舉大耳三藏得他心通朝見肅宗帝命國師驗之藏見師便拜侍立于右師云汝得他心通是否藏云不敢師云汝道老僧即今在什麼處藏云和尚是一國之師何得在西川看競渡師再問藏云和尚是一國之師何得在天津橋上看弄胡孫第三次問老僧只今在什麼處藏罔知去處國師叱云這野狐精他心通在什麼處拈大耳三藏不道他不得他心通只是龍頭蛇尾致被國師呵叱若是通身具眼第三次待問老僧只今在什麼處只向道和尚是一國之師因甚在鬼窟裏作活計倘能如是直饒國師不高竪降旗未免舉手加額頌黃金包褁爛泥團不惜當場撮弄看破綻遭人窺戲了末梢依舊被渠瞞舉波斯匿王問勝義諦中還有世俗諦也無若言其有云云戽水潑鴛鴦佛云我今無說汝亦無聞無說無聞是名一義二義酷嫌蠆尾長搖毒終使花頭不損香拈波斯匿王如戰澶淵發幢子努擬山山摧擬海海竭爭奈世尊不動鋒芒折衝千里諸人還知二老落處麼幾般雲色出峰頂一樣泉聲落檻前頌十字街頭鋪席開牛溲馬渤盡收來等間落在名醫手貴賤無非是藥材舉無著往五臺禮文殊路逢老人著問莫便是文殊麼老人云豈有二文殊著禮拜起老人不見拈可笑無著賊在面前不能捉得空自掩門呌屈有甚共語處當時待他道豈有二文殊劈面便唾直饒老人有冲天之計管使入地三尺頌遠望蓬萊去學仙途中遇著呂先生還丹一粒吞還吐回首空山獨自行舉肅宗問國師云和尚百年後所須何物師云為我造箇無縫塔子帝展手云塔樣國師良久云會麼帝云不會師云吾有得法耽源可詔而問之後詔問源源云湘之南潭之北中有黃金充一國無影樹下合同船琉璃殿上無知識拈國師無縫塔不勞斤斧本自圓成及乎被人請樣便是七穿八穴耽源任是巧奪工輸未免方木逗圓竅頌八面玲瓏逗月寒要尋形影十分難無端平地生層級湘北潭南作樣看舉馬大師示衆云汝等諸人各信自心是佛拈馬大師壓良為賤當時一衆皮下還有血麼若使稍知衲僧巴鼻八十四人灼然別有生涯不致阿轆轆地何故俊鷹不瞬愁胡眼爭打籬根死兒頌讀破燈窗萬卷書經綸勛業付洪儒古今多少麒麟𦘕幼學誰人不順朱舉稅闍梨問曹山清稅孤貧乞師拯濟八角蒺藜當面擲山喚云稅闍梨藕絲牽動五須彌稅應諾砒霜未是毒山云清原白家三盞酒喫了猶道未沾唇淚出痛腸拈云稅闍梨寸鐵在手撥亂乾坤若不是曹山洎合牽羊納璧雖然畢竟那裏是他喫酒處頌紅錦纏頭舞醉身笙歌聲沸鳳樓春百花藂裏扶歸去誰道郎兒徹骨貧舉德山示衆云今夜小參不答話問話者三十棒當門懸白澤有僧出禮拜山便打賞不避仇讎僧云某甲話也未問因甚打某甲泪出痛腸山云汝是什麼處人入泥入水僧云新羅人不勞再勘山云未跨船舷好與三十棒貪行荒草裏不覺露沾衣拈云諸人還會麼德山可謂少年曾決龍蛇陳老大還同稚子歌頌萬戰森嚴細柳營信威獨許漢將軍誰知袖隱屠龍劒却把蒿枝箭䇿勳舉雪峰普請搬柴次路逢一僧峰揚一束藤於地千鈞弩發僧擬取把髻投衙峰遂踏倒為人須用殺人心歸遂舉似長生云我適來踏著這僧乞兒見小利生云和尚代這僧入涅槃堂始得賊過後張弓峰休去軟如綿硬似鐵拈云這僧貪觀天上月失却手中橈致令雪峰無禮當時見他揚下藤束便云淨地上不得狼籍擬議劈𮌎便摟何故國有謀臣頌揚下山藤設意深嗅烏喙藥禍沾身腳跟未斷紅絲線智鑑難逃明眼人舉香嚴侍立溈山次溈問云聞子在先師會下問一答十問十答百是否折筯攪滄溟嚴云不敢全身陷鐵圍溈云我不問汝問一答十問十答百父母未生以前道將一句來要窮圓澤意須到葛洪川香嚴返復搜尋無啓口處消得龍王多少風乃云望和尚慈悲為某甲說蒼天中更加怨苦溈云我若為汝說他日悟去決定罵我煉銅為膽鐵為心小心人難得嚴云今生更不參禪做個長行粥飯僧去只恐不是玉却較些子遂卜南陽遺趾居焉不到烏江不肯休一日掃地擲瓦擊竹作聲忽然大悟莫將鶴唳誤作鶯啼乃云一擊忘所知笑破他人口更不假修持腳下泥深三尺動容揚古路何曾夢見不墮峭然機正好喫棒處處無踪跡堆山積嶽聲色外威儀重重圭角諸方達道者癩兒牽伴咸言上上機誰恁麼道乃望溈山炷香作禮云和尚當時若為某甲說何得有今日乞兒拾得席消得龍王多少風溈山聞得乃令仰山去勘賊須賊捉仰到問云聞師弟擊竹有省試為我說看相牽入火坑嚴云去年貧未是貧今年貧始是貧去年貧尚有卓錐之地今年貧錐也無巧盡拙出仰云師弟會得如來禪祖師禪未夢見在低聲低聲嚴云我有一機瞬目示伊若也不會却喚沙彌萬里崖州仰云且喜師弟會祖師禪便喝掩面而出拈盡底掃除窮活計要渠赤手立生涯不無溈仰父子點檢將來也是憐兒不覺醜香嚴悟去閉目食蝸牛頌爝火初經一線開寶盤終日自縈回也知物理關人事歷盡崎嶇心始灰舉真園頭問良山家賊難防時如何殷勤送別瀟湘岸山云識破後不為冤金剛杵打鐵山摧真云識破後如何樂則同歡山云貶向無生國裏擘開太華手須是巨靈神天堂未就地獄先成真云莫便是他安身立命處也無頭上著枷腳下著杻賺却一船人山云死水不藏龍盡力扶不起真云如何是活水裏龍舉拂子看看山云興波不作浪何曾夢見莫嚇我真云或遇傾湫倒嶽來時如何且緩緩只聞人作鬼不見鶴成仙山下禪床扭住云闍梨莫教濕却老僧袈裟角盡力跳不出棺木裏瞪眼拈作家相見一拶一挨平如鏡面險似懸崖頭頭具生殺之機著著有出身之路明眼人前未免如蟲禦木頌荒廢人家命蹇迍行年在坎鬼臨身燒錢遠送他方去轉禍來為五福神舉雪峰一日謂玄沙云備頭陀何不遍參去掘窖深埋沙云達磨不來東土二祖不往西天蝦跳不出斗雪峰肯之面皮厚多少拈衆中總道玄沙如龍馬駒奔軼絶塵不受控制殊不知被雪峰芒繩縛定至今無出身之路頌幼小勤書懶出門春風花柳自村村芳心不被笙歌引時把唐虞子細論舉定上座參臨濟問如何是祖師西來意太平休整間戈甲濟下禪床擒住云道道利劒斬虗空萬象鳴剝剝定擬議閉目食蝸牛傍僧云定上座何不禮拜與賊過梯捧上不成龍定禮拜忽然大悟朝打三千暮打八百拈臨濟如排百萬迷魂之陳只要褰旗斬將若不得傍僧幾成虗設雖然如是衲僧門下豈止笑三十年頌剪酥蹙錦上林花曉怯春寒不放開驀聽一聲撾羯鼓檀心遠送異香來舉晏國師赴鼓山雪峰云一隻聖箭子射入九重城裏去也誤將魚目作明珠憐兒不覺醜孚上座云渠未在疑殺天下人峰云渠是徹底人錮鏴著生鐵孚云待某與伊勘過腳上刀梯國師云九重城裏去開眼堂堂入鑊湯孚云忽遇三軍圍繞時如何知君不是金牙作爭敢彎弓射尉遲國師云他家自有通霄路腳下泥深三尺孚云恁麼則離宮失殿去也千聖覔無踪國師云何處不稱尊頭上著枷腳下著杻孚歸謂雪峰云聖箭子折也桀犬吠堯峰云渠語在盡力扶不起孚云這老凍膿終是有鄉情伎窮也伎窮也拈孚上座不戰屈人兵煞人不眨眼因甚向雪峰面前倒戈卸甲會麼良久云攻乎異端斯害也已頌白髮將軍坐碧油教嬰兒打百花毬被人馳馬拏將去猶把兵書說未休舉定山與夾山同行次定云生死中無佛則無生死黑牛臥死水夾山云生死中有佛則不迷生死癩馬繫枯樁二人不肯同上大梅人事了夾山便問未審二人見處那箇較親截耳臥街梅云且去明日來心急馬行遲山明日上問記劒刻舟梅云一親一疏別寶撞著瞎波斯山云那個親那個疏低聲低聲墻壁有耳梅云親者不問問者不親金剛杵打鐵山摧夾山住後云我當時在大梅處失却一隻眼只堪忍笑不堪陳雪竇拈云夾山殊不知在大梅處換得一隻眼為蛇𦘕足不成龍拈有佛無佛一親一疏以拂子𦘕云山僧為汝盡情裂破了也且道還出得生死也無喝云清平世界切忌訛言又拈大梅老漢得處瞞盰用處儱侗引得許多葛藤當時若解主丈用事將這兩個漢倒卓屎坑頭使知衲僧門下道佛一字嗽口三年有甚有無生死可辨具眼者薦取頌飛騎將軍入虜庭鎗旗未動死生分戰酣馳入中軍寨且聽元戎議賞勳舉石頭因藥山問三乘十二分教某甲粗知常聞南方直指人心見性成佛實未明了望和尚慈悲指示掘地覔青天棄却甜桃樹㳂山摘醋梨頭云恁麼也不得不恁麼也不得恁麼不恁麼總不得汝作麼生會八角蒺藜當面擲迷魂陳奪元戎山佇思髑髏著地頭云子因緣不在此江西見馬大師去推過又爭得平地擠人落險崖山至祖處復如前問幽州猶自可最苦是新羅祖云我有時教伊揚眉瞬目是有時教伊揚眉瞬目不是上林花萬朵輕付豆娘兒山有省便禮拜頭上著枷腳下著杻祖云子見個什麼道理將蝦釣鱉山云某甲在石頭時如蚊子上鐵牛甚處得這消息來稱鎚有什麼汁祖云汝既如是宜善護持蒼天蒼天面皮厚多少法雲秀云石頭好個無孔鐵鎚太似分付不著人說什麼無孔鐵鎚直是金聲玉振大溈智云說什麼石頭時如蚊子上鐵牛只今又何曾吐得出直饒吐得堪作何用溈山果云前箭猶自可後箭射人深藥山直饒悟去已落第二月好箭只是無芒射中草人有甚麼用處折也折也五祖東山道只見波濤湧不見海龍宮可謂盡美矣點檢將來只解扶強不能扶弱法華狗尾續貂試下一轉語看藥山當時若是箇漢但只喫果子莫管樹曲彔著然別有生涯拈石頭馬祖向洪波浩渺處金鉤拋月鐵網鋪雲要打衝浪錦鱗惜乎藥山這裏翻身那邊點額當時待他恁麼道但云大好直指拂袖便行非惟坐斷二老舌頭亦免掛後人唇吻具眼者辨取頌籠養翎毛不記名春來巧弄百般聲臨風放出丹山鳳多謝簫韶奏九成舉藥山久不上堂古墓深深埋暗箭院主白云大衆久思示誨爛泥有刺山云打鐘著皂旗閃閃陳雲排主打鐘火牛鞭起奪齊城衆才集藥山便歸方丈倒携無柄六合掃胡塵主隨云既許示誨因甚一言不措甲不開倉山云經有經師論有論師爭怪得老僧笑殺人龍頭蛇尾百花帽子布纏腰賴有推托處拈雪竇道可惜藥山老漢平地喫撲盡大地人扶不起而今還有為藥山出手底麼若有也須救取雪竇又衆中道藥山閉門屋裏坐禍從天上來殊不知院主雖得一場榮刖却一雙足又藥山雖解隨機應變爭奈通身泥水笑倒傍觀當時若知主丈用事非惟令行院主直須一衆萬里崖州頌九曲明珠素蘊藏走盤時見發寒光當陽拈出還收拾瞎眼波斯自著忙舉藥山示衆云我有一句待特牛生兒只向汝道鐵索鎖長江豈知魚變化時有僧出云特牛生兒只是和尚不道倒用司農印山喚侍者點燈來閉目食蝸牛僧便抽身入衆虎斑終不是人斑拈藥山老漢向千聖頂𩕳輥出百花毬直是不形文彩爭奈這僧機如掣電眼似流星等間一擊百雜碎待點得火來片帆已過東海頌鈎餌深拋五十牛鯨鰲吞海誤吞鈎急須身逐洪波去暗織滄溟一片愁舉僧問藥山平田淺草塵鹿成群如何射得主中主不勞弓矢力遍界髑髏乾山云看箭費力不少僧便作倒勢綿𮖐蒺藜山云拖出這死尸相隨來也僧𨁝跳便出新手泥彈子便作走盤珠山云捏泥團漢有什麼限鬼去挂桃符拈藥山平地喫攧盡大地人扶不起致令琅邪道賊出關門家中呌屈當時待他問平田淺草塵鹿成群如何射得主中主拈主丈和聲便打豈不為天下宗匠何故鵰鶚在秋天大地狐踪滅舉僧問藥山學人有疑請師決折筯攪滄溟把髻投衙山云晚間來與汝決暗藏機陷虎難免自傷身至晚上堂衆集定山云今日要決疑僧在麼計較成也發過砒霜不殺人其僧便出不到烏江不肯休山下床把住云大衆這僧有疑與一推便歸方丈草繩弄活不成蛇用盡自己心笑破他人口拈藥山決疑大似嚼飯餧嬰孩不顧傍觀者醜這僧若是箇漢待他道晚間來與汝決便撫掌大笑而出非惟把斷要津亦免藥山傷鋒犯手舉遵布衲作殿主浴佛次藥山云汝只浴得這箇還浴得那個麼含元殿裏覔長安遵云把將那個來樊噲踏鴻門危亡全不顧又云儉山休去殺人可恕無禮難當拈二尊宿各出一隻手沐浴金軀正眼看來只成惡水相潑若是那個何曾動著何故雲在嶺頭間不徹水流澗下太忙生又云隔舉世尊一日見文殊在門外立乃云文殊文殊何不入門來平地推人落險崖是何心存殊云我不見一法在門外何以教我入頭上漫漫腳下漫漫拈七佛之師將謂有多少奇特元來在鬼窟作活計當時若是個漢待世尊道何不入門來遂撫掌呵呵大笑管使這老漢開口了合不得舉文殊三處度夏入水見長人三盞酒糚公子面迦葉欲擯出知心能幾人一枝花插美人頭才近椎見百千文殊年衰鬼弄人盡其神力椎不能舉買石得雲饒世尊問云汝欲擯那個文殊醉後添杯迦葉默然袖藏花塢月恐泄玉樓春拈諸方盡道迦葉當斷不斷返招其亂殊不知世尊文殊鼻孔總在這老漢手裏何故齊之以禮又云盡法無民舉大集會上勑天下獰惡鬼神吾滅後護擁正法不知禍起蕭墻內虗築防胡萬里城若有一人不到令四天門王飛熱鐵輪追之抑逼人作麼有一魔王謂世尊云瞿曇瞿曇我待一切成佛竟我然後發菩提心拈釋迦老子市漫天鐵網只圖打鳳羅龍只這魔王也不易得既解裂網而出惜乎羽力不全又遭纏殺當時即向道乍可永劫沉淪不求諸聖解脫非惟象頭檀特枯木重榮亦使黃面瞿曇退身三舍又舉天衣道何者是佛何者是魔還有辨得底麼舉了呵呵大笑云有甚麼難辨處有甚麼奇特處若是咬人師子豈露爪牙惜乎大集會上更無一人具天然氣槩平白贏他一著當時若有個挺特漢他道瞿曇瞿曇我待一切衆生成佛竟我然後發菩提心只向道只聞人作鬼不見鶴成仙或云將謂將謂元來元來非惟教伊隱身無路亦使天下鬼神唾面而散何故邯鄲學唐步舉達磨云我本來茲土作任麼說法救迷情笑破他人口一花開五葉司空見慣結果自然成可知道拈缺齒老胡可謂秦無人一年一度洪纖長短誰不開花誰不結果須要節上生枝作麼遂顧左右云這裏還有祖師麼拽主丈下座舉臨濟云我在先師處三度喫六十主丈如蒿枝拂相似而今更思一頓誰為下手鐵網漫空貧兒思舊債有僧出云某甲下手赤身挨白刃探驪龍頷扶明珠濟拈主丈度與鴆鳥落毛僧才接濟便打犯著商君令分身兩處看拈臨濟施陷虎之機惜乎這僧只知逞俊不解番身遂致落他深穽當時若是箇漢待他道而今更思一頓誰為下手只向道活棒不打死漢直饒臨濟全機未免退身無路舉世尊拈花迦葉微笑霜風括地掃枯荄誰覺東君令已回唯有嶺梅曾漏泄一枝先向雪中開舉殃崛救産我自賢聖劫來未曾殺生緑蘿窗底枕肱時夢繞華胥客路迷聽得煙村一聲笛醒來元是住居西舉那吒太子折肉還父折骨還母九十芳春日遊蜂競採花花歸蜜房盡殘葉落誰家舉大士講經道冠儒履佛袈裟弄鬼精魂却有些多謝寶公勤照拂雙檮枯盡再生花拍板門槌伎倆窮人前遍要辱宗風驢鳴狗吠成狼籍瞞得梁王屈寶公舉吾不見時何不見吾不見之見十年不作抓棱夢一旦來從帝苑遊召對金鸞酬一問布衣脫下便封侯舉居一切時不起妄念春有百花秋有月夏有凉風冬有雪莫將間事掛心頭便是人間好時節舉少林面壁竺乾逴得屠龍技袖隱神鋒入海南弄巧不消人一笑九年面壁好羞慚舉二祖安心平白將身入草窠折娘生臂凍驢腰一年一度嵩山雪雪有消時恨不消舉三祖懺罪通身紅爛業非輕血染千山草木腥一陳西風捲黃葉月華如水滿空庭舉韓文公見大顛問佛法省要幽賞春華到𦘕橋金絲拖柳錦翻桃臨風不識東皇意却聽流鶯舌弄嬌舉五祖再來身後身前不丈夫钁頭邊事想含糊不知費幾蒼松機換得渠儂破鉢盂舉六祖傳衣不依本分去擔柴負石黃梅驗作家半夜三更設分曉和糠舂出古菱花舉文殊令善財采藥拈善財信手拈來文殊當面合色香美味非不完全遇明眼人快須收抗何故陳橘皮或云萬病丸舉阿育王問賓頭盧尊者親見佛來亦預一數拈實謂古今罕聞又云不易不易舉十七祖問童子風鈴鳴耶子云非風鈴鳴我心鳴耳祖遂印可拈大小祖師用心不臧何故見人落井將桶子蓋頭舉賓國王斬師子尊者拈尊者好一顆九曲明珠惜乎只作豌豆糶却賓雖乘快便爭奈白折一隻臂舉文殊問疾論不二法門維摩默然拈大士默然直得山河大地草木藂林情與無情共轉根本法輪非惟文殊贊嘆不及任是古今佛祖競出頭來亦無啓口處美則美矣點檢將來也是持鉢不得舉障蔽魔王一千年不見金剛齊菩薩拈金剛齊瞞障蔽魔王即得衲僧門下喫棒趂出有分何故兩手扶犁水過膝舉七賢女遊尸陀林拈聖女作麼作麼認驢鞍橋作阿爺下頷引得諸姊束手墮懸崖帝釋既知善說般若因甚三件物會麼自從掣得金鰲後更不晴江理釣絲舉城東老母與佛同生不願見佛拈城東老母太煞老婆既不奈何與渠同生何用苦苦作麼要好日日香花夜夜燈教渠自知慚愧去何故見怪不怪其怪自壞釋迦老子可謂貴買賤賣他既不要便休何苦亞渠作麼遂顧左右召大衆云還見釋迦老子麼自云在這裏乃云無事提瓶挈水去舉鹽官問座主華嚴有幾重法界主云略有四重廣則重重無盡官提起拂子云這個是第幾重主良久官云思而知慮而解鬼家活計日下孤燈果然失照拈舉諸方拈提了乃云諸方老宿只解扶強不能扶弱殊不知這僧良久華嚴法界如帝網交羅重重攝入說甚麼第幾重會麼但見皇風成一片不知何處是封疆舉達磨謂門人曰時將至矣汝自各言所得拈云三千弟子鴛行立一一呼來教順朱達磨大師如弄棚頭傀儡雖則語言進退雍容可觀殊不知用盡自己心笑破他人口舉僧問曹山抱璞投師乞師雕琢曹云不雕琢僧云因甚不雕琢曹云須信曹山好手拈黃閣簾垂難傳信息紫羅帳合暗撒真珠曹洞家風可謂綿密子細看來猶缺大人相在山僧即不然忽有問抱璞投師乞師雕琢即向道侍者寮喫茶去忽然瞥地子已過新羅國舉雲門問僧甚處來僧云嶽山來也門云老僧不曾與人葛藤僧珍重便出門喚云近前來僧近前門云去徑山拈云葛藤不少拈得也得也舉雪峰示衆云雪峰門下不得咳嗽時有僧咳嗽一聲峰云作恁麼僧云傷風峰云傷風即得拈雷聲浩大雨點全無舉洞山示衆秋初夏末東去西去直須向萬里無寸草處去石霜道出門便是草拈一人平地上險崕一人險崕中平地點檢將來總缺一著萬里無寸草出門便是草支笻寂寞中望斷無人到舉李殿撰問雪竇云三教中那個最尊竇起身側立撰云有口何不道竇云對夫子以難言拈三教誰尊側身而立當門不用栽荊棘對夫子以難言賊賊舉忠國師問紫璘供奉佛是什麼義奉云是覺義師云佛曾迷否云不曾迷師云用覺什麼奉無對拈不因樵子徑爭到葛洪家又家無小使舉忠國師云語漸也返常合道語頓也不留眹迹大慧喝一喝云寐語作什麼遂舉拂子復彈指云徑山即今舉拂彈指若向這裡覔眹迹入地獄如箭射拈寐語不少舉歸宗因僧問如何是佛宗云我與汝道恐汝不信僧云和尚誠言焉敢不信宗云只汝是僧云如何保任宗云一翳在眼空花遍界僧於此有省拈歸宗為人雖無迃曲點檢將來大似嚼飯餧孩兒當是個漢待他道只你是便掩耳而出教這老漢開口了合不得舉清原令石頭與大慧通書乃云回來與汝鈯斧子住山去拈大小石頭虗張意氣既不求諸聖不重己靈因甚却求鈯斧子會麼折得荷花渾忘却空將荷葉蓋頭歸舉盤山將順世云莫有邈得吾真否或呈頂相皆不契普化云某甲邈得和尚真山云何不呈似老僧化打筋斗而出山云這漢向後掣風顛去在拈將謂普化邈真元來只呈死伎何故手腳俱露舉水潦自從一喫馬師踏直到而今笑不休拈我當時若見便與攔胸扭住云笑則不問喚什麼作一毫頭待渠擬議更與一踏舉香嚴示衆云若論此事如人在百尺懸崖口咬樹枝手不攀枝腳不踏枝下有問西來意若不答他又辜他問若答又恐喪身失命正恁麼時如何時有虎頭上座云樹上問即易未上樹時道得一句來嚴休去拈香嚴用盡平生伎倆如邊底小將排得個陳依稀偃月倣佛長蛇將謂折衝千里殊不知被虎頭上座不動烟塵等間一擊星羅雲散坐致太平雖然如是諸人畢竟知得香嚴落處麼良久云簾幕垂垂花影轉一壺春色滿樓臺舉黃蘗上堂衆集定以主丈一時打下却招大衆衆回首蘗云月似彎弓少雨多風拈著死急舉趙州洗鉢拈趙州覿面無私就地撮將黃葉去這僧當機得路入山推出白雲來只如東山謂無為泰云你只知路上事且不知路上滋味諸人又作麼生會莫守寒巖異草青坐却白雲宗不妙舉南泉云不是心不是佛不是佛拈過得龍門風濤更惡舉趙州路逢婆子趙州問云甚處去婆云偷趙州笋去州云忽遇趙州時如何婆與一掌趙州便休後東山拈云婆子可謂去路一身輕似葉拈東山雖為出氣猶涉人情在說甚麼一身輕似葉殊不知這婆子被趙州草繩縛定至今求生不得生求死不得死具眼者辨取舉外道問佛昨日說甚法云云昨日定今日不定拈不是任公子徒勞話釣竿舉僧問睦州靈山還有蛇否州云者丘引雲門代山白骨連山拈睦州鬪劣雲門鬪勝山僧志微力弱不能恁麼得待有問靈山還有蛇否將主丈攛下舉手作怕云阿爺阿爺舉國師因僧請益國師云直下應難會尋言轉更賒若言佛與祖特地隔天涯其僧不會遂問侍者者云和尚恁麼道猶隔天涯在國師聞得乃喚侍者問云你為這僧恁麼道那侍者云是國師遂打出院拈國師父子激揚錚鏗一期可觀爭奈蚌鷸相持俱落漁人之手
