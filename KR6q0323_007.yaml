body:
  text: 題為叔向題坐禪蝦蟇下有白蓮一從識得性分明懶作春池鼓吹聲間把六根門鎖斷白蓮香散水風清題直夫牛圖三三五五戲平蕪踏裂春風百草枯莫寫溈山僧某甲恐人誤作祖師圖題老融猿枝上坐舉手捫果危坐禪枝冷機含毒果深直饒捫摸著未必死偷心題圓澤圖月下騎寒犢三生事細論已遭人點檢休弄鬼精魂題拗韁牛壠樹冥冥日向西苦貪芳草不知歸牧童盡力拽得轉在在暝煙深翠微坦老求題真歇宏智竹庵同遊雁山酬唱真迹軸後天生三箇老冤魔狹路相逢沒奈何把肚腸摟抉看曲於四十九盤多題放山堂一擊牢關八字開石頭機路滑如苔危分險布知多少排闥從渠輥入來杜甫騎驢遊春客路如天遠吟身太瘦生無家歸未得䇿蹇傍春行李白醉騎驢圖酒渴思鯨飲金鸞早退朝醉身扶不起壓折老驢腰題秋堂四蘭風指玉彈曉喙檀噀春倐爾生妬陰飇不仁晴湘英整佩楚衣告紉羲黃薦馥釆釆疑真雨紛披佩玉仆委苔痕簷花寫恨難拈楚魂雪幽石封白深林掩芳隱德不耀何矜色香題蘭蕙色淡而清節香而貞隱德不耀咀華含英君子同其芳潔寫真不墮丹青宜乎孕瀟湘幽楚之靈一莖四花挺然萃其臭如蘭其標如芷檀喙簇煙而不繁徑節疾風而不倚是以昂山有山林軒昂之志題四蘭風深藏巖谷裡初不要人知苦是香難掩春風得意吹晴喜晴彈玉指林下見幽人楚楚湘靈樣肌膚不染塵雨珮玉半零亂繄誰吊楚英醉香魂未返愁聽打蓬聲雪一再荒林雪全身掩薜蘿直饒埋沒得爭奈鼻頭何題秋堂四蘭風靈均侈山林之樂薄籠綃袴幽放檀心嬌舞春風身醉香力難扶也晴久居深林幽寂中雖隱德不耀遇春陽姁嫗笑彈玉指十倍精神所慮楚俗尚芳紉而為佩使不克終其天矣雨娥英吊舜於九疑泣泪如雨珮玉零亂半委塵泥愚恐離騷九歌曲盡其哀香魂冷而卒難拈也雪大雪申威萬木摧拉獨能擢芳於凝沍中雖百折不委非素有所養寧不為外侮憑凌者歟為丘桂巖司門題和靖雪後看梅圖破曉湖山入畫時短篷搖雪傍疏籬一心只在梅花上凍損吟身也不知元暉山水圖簇簇煙林挂酒簾山藏古寺寂無僧瘦笻便欲幽尋去隔岸小舟呼不譍為張良臣知府題梅圖一篷春雪泛西湖不覺和身入畫圖千古暗香疏影在誰云骨冷不容呼山水圖招提依約在煙蘿酒斾風微拂釣蓑欲稅雲林歸卜隱山靈應笑賺人多為友于題水禽一水鵲獨立沙上俯頭邊有草衰草汀煙寂寞秋忍寒獨立懶盟鷗江湖風味駸駸惡得縮頭時且縮頭一雪姑立敗荷上浙浙西風肅殺時枯荷餘得折殘枝疾風凌雨多翻覆只處姑姑立處危拱秀閣萬疊遙岑緑打圍曉寒空翠潑禪衣幽禽喚起蘿窗定間看春雲帶雨歸為圓雪崖題待月邊有芭蕉終日忙忙繼月明要看杜撰八陽經直饒讀到流通分未必芭蕉著耳聽為行可維那題子陵釣臺七里灘頭古木陰眼空寰海老垂綸無端釣得劉文叔却把羊裘污俗塵題許由棄瓢圖視堯天下一瓢輕厭聽風梢歷歷聲揚下不須頻顧戀始終存取隱淪名禮大梅塔即心即佛已隨邪況與龐翁亂撒沙茅舍從茲混塵迹老梅羞放雪中花題荷衣沼緑荷親製蔽窮身池面香風噀古今百萬軍藏藕絲孔豈知綿密度金針為元首座紙燈船輕輕點著發光寒這裡停橈舞棹難明暗路岐都照破放行初不犯波瀾題佛迹巖一度𢬵身透險崖石頭機路滑如苔腳跟點地不點地立處何曾踏實來禮香山湯禪師祖師眼時開合寂寞空山宴坐時千鈞重寄一絲危直饒雙眼頻開合著處由來不自知送綿襖與東岡羅紋結角見蹤由翻著從教刺眼休線路放開綿密密瞿曇踢出腳尖頭寄賀錢薦福東林和尚烹金爐去杳無蹤沉影愁看鴈過空出手與渠重結了未應碧眼是頑銅錢王活業付東林古墓埋藏暗箭深機正發時誰中的空山落日幾驚心法身邊事會多時端的枯樁弗用疑無柄鐵鎚輕擊碎心花粲發不萠枝悼雲泉老師奪得犀牛便跺跟蘋洲玩月角生紋翻身入海無消息驚散沙鷗白鷺群賀友山新建東臯接待分袂南湖十數春近聞華搆䇿奇勳鉢從金粟摶香飯僧自東臯接水雲柔玉新拳春塢蕨懶黃新縷曉溪芹定應容我分陳榻曝背晴簷醉夕曛禮雲門千歲塔越山清絶無塵翳不到胡僧取次埋輒莫更加千歲壽也須和骨洗將來梅窗溢目湖山看不足引清吟有此雲房簷牙挂月橫疏影隙眼通風度暗香夜掩只疑和靖宅曉開爭看壽陽妝蘭兄礬弟休相憐斗室難為納衆芳隱秀觸戰蠻征總不知樂羲皇世遁嘉肥馨香靜掩芝蘭室文采深藏錦繡機伴野僧眠嵩少石汲蒙泉煮首陽薇簞瓢飫味水貧趣爭得紅塵染著衣竹雲春錦千綳玉萬竿嵐光翠裛渭川寒油然已作從龍勢只恐仙陂化蟄難王庵和劉府教鹿眠芳草印春庭月挂蘿窗曉半扄白髮老僧偏愛客忍寒同看換鵝經遊九峰攀石捫蘿入杳冥凌虗潛覺膽魂驚陰崖攧瀑瑤花碎枯葉翻霜錦樹榮汲水僧歸龍洞去采薇人踏虎蹤行風流二老遺音在度曲松濤萬壑清九峰橘州雙澗奔流戰玉龍浮屠雲鎖翠千重只將一疏傳天下大覺驢年識九峰清涼禮先師遺像白雲迷谷雪鋪階老倒清涼眼著沙若問普通年遠事三千里外摘楊花興化寺門照雙池鏡樣明東西廊喝寂無聲紫羅帳裏機玄密雖有珍珠撒未成焙經老胡監本誑人天開口無非吐黑煙五熱炙身甘自受要翻元欵待驢年為惟翁題非畫圖誤入蓬壺影裏遊論盟白鳥下滄洲吞波島嶼鰲身黑映日樓臺蜃氣浮門逆潮開喧海市網沿堤晒簇漁舟晦明晴雨時時別難把王維腕力收登金峩峰頂撥開空翠上危顛路繞羊腸石齒尖到頂方知天下小攀高似取世人嫌碧連蓬島雲千疊冷照東溟鏡一奩歸去松窗伴禪老此山佳致話無厭為聖俞頌橘巖洞庭秋晚半青黃須待霜林熟自香不向懸崖親撒手認皮作火錯承當聞竺寺迎號服因成口號絲管紛紛鼓亂撾兩山迎接賜衣來白雲恐污山翁耳重鎖柴門不放開祖庭秋晚日增悲見得芙蓉便展眉不與狂花爭瑣細淄川緣有拒霜枝六言山居野菜花飛胡蝶古藤枝挂清猿間倚柴門看倦枕肱高臥雲根積雪封無過路亂雲堆滿空庭我也誰能掃得掩關且讀殘經盤石新封翠蘚破龕重繞青蘿喚起驚回殘夢月篩林影婆娑粉芋頭煨軟火懶黃菁煮沙瓶飯後烏藤用事小奚忙啓巖扄石澗霜凝松粉竹籬雪點梅膚春到山家日遠愧貧管領全無曉徑旋除榛翳午厨要欵鄰僧童子掃雲歸晚忍飢趂手嬌藤香霧曉垂簾幕幽禽春弄笙簧誰料貧無一物邇來富敵君王兩耳爐焚柏子一拳不養菖蒲客至莫談塵事略寒溫外跏趺得失心無半點聖凡機裂千差終日山禽聚集且無箇去㗸花香醉人尋梅塢馬嘶聲度雲坳急把柴門深掩從教小外推敲悼芳洲懺首不忍螢窗賺一生翻身義虎頂頭行金篦刮盡空花膜喜得天台教眼明煙渚春融岸碧綃采蘭人競唱離騷曲終翻作無生調聽著愁魂似雪消送剡源講師住華亭延慶三周講得墜天花法眼無瑕却有瑕切莫朱涇訪船子一橈摵碎潑生涯依愚谷韻悼無已中金蠶毒好埋冤家醜難將歲月論冷地思量喫虧處咬牙不覺把齦吞雪真珠布滿階庭急把楊岐破屋撑死伎窮時機路活倒騎驢子弄蹄行末後蘇州作斷手頭活弄死蛇條暗遭一口通身爛纍合城人哭幾朝定侍者奔乃師喪諸公以偈乃求題其後五逆從前恨阿爺幾思吞併老尸骸無端更被人攛掇憤憤扶鍬去活埋送徑山圓兄亂後歸鄉故國煙塵慘甲兵勞生終日望升平軍持帶得龍淵水歸去何妨一洗清和曹泰寓省元瀟湘八景卜算子瀟湘夜雨秋氣肅蒼梧暝色昏南斗蘆岸漁燈隱映明人醉松醪酒忽聽打蓬聲夢入無何有曉看娥英竹泪痕愁結腸回九洞庭秋月一曲翠奩開西子妝清腕簾捲西風倚嶽陽送目湘江遠靜夜宴嬋娟大白浮金碗皓影凌靈玉佩寒零亂瑤田滿煙寺晚鐘挂晴絲薄暮分多景僧聽疏撞晝定回翠濕禪衣冷樓隱碧雲深鯨吼修林靜立遍危句未成月鏤青蘿影漁村落照遠浦釣帆歸鷗狎爭飛逐江勢吞空燦暮霞飽玩心無足濁酒醉兒孫共唱滄浪曲簇簇茅簷暝色昏移棹蘆灣宿平沙落鴈緑褪水痕枯淘見金星殞一片平鋪塞樣寒縱目無窮盡撲摝起蘆藂小泊程難凖古字書空淡墨橫翼倦遲還緊遠浦帆歸身似白鷗間湖海尋盟去津樹冥蒙水印空倣佛瀛洲路十幅飽西風隱見舟行處家在蘆花古岸外檣泊江天暮山市晴嵐一塢耕桑酒斾風斜亞宿雨初收翠靄浮買斷春無價門巷麴塵迷黃鳥啼岡柘大小誰家舊隱居古壁蝸涎涴江天莫雪江氣結層陰凍損砂禽翼天巧繽紛六出花一瓊瑤色著水旋銷鎔入夜還堆積好是孤舟獨釣翁新把漁蓑飾挽顏伯涯制斡約上雪豆喜種桐愛菊疾不及賞坐化握手論盟二十年瘦笻曾約上危巔雪崖未遂同觀瀑玉沼何期促孕蓮桐葉成陰愁引月菊花無酒冷含煙細看新補東林傳十八賢中又一賢送節操翁住閻寺庵中早年教海已馳名破衲青燈究一經不借虗空開口説肯教頑石點頭聽宸奎錫命旌梅塢丹桂飄香供柏庭指日白雲禪坐穩獻花無地著山靈南楊判鎮以詩問安次韻拙養自林泉鏖戰驚蠻觸心灰百念寒虐𦦨肯停蓄猗歟子雲翁惜我如龜玉無復獻楚庭終期毀于櫝寄梅墟陳提幹齒履登臨乏欵延薰風報謁藍天拂塵未下雲簷榻采寶新歸海國船乘興迷柳下搜吟夢到梅邊何時握手東林社重結三生未盡緣懷樗寮半生魚佩解黃金泉石郊垌得趣深幽興發時間副墨俗塵捐處靜觀心聖賢爐冶鎔聲色妙密工夫鏗古今遐想蓮居馳夢遠未應輕易到瑤林挽王知縣號覺非居士坐右銘云廉勤蒞官清貧守節東晉風流繼令名家傳真本換鵝經廉勤自得官中趣貧節親書座右銘民感庥仁忘赴壑子明詩禮為趍庭疾風誰料摧梁木猿鶴悲鳴不忍聽聽叫居親求語幼把儒冠揚壁根朅來巾侍乳峰僧吟詩清苦規寒子舂碓辛勤慕老能錦鏡間看花瑣碎瀑崖戲擊玉稜層惜分陰語宜鞭䇿望汝來挑暗室燈仁座主自西山來求語燈窗苦讀覺身癯暫握笻枝訪野夫愛竹徑思持玉節看梅間共數銀鬚西山月冷歸招隱南嶽風清欲步趍靈利莫教人指去且教船子老江湖賦梅雪邊春信到衡茅誰遣梅兄慰寂寥秀氣一枝抽嫩玉寒英五葉剪生綃月移疏影窗前挂風清香竹外飄幾許吟魂招不返急催蘭弟讀離騷靈叟小師贊布袋握杖握藤枝駝布袋轉腦回頭使些奉化逢人謾説覔文錢乞兒乞兒敗缺了也達磨遠離竺國見梁王五鬼臨身討苦噇面面相看言不識秋風一葦急橫江靈照女把笊籬邊有錢幾對丹霞鬪活機惡心腸有老爺知笊籬舀得春風滿不直分文賣與誰漁籃婦短裳褰起露珠珍雲鬢慵梳惑亂人弄得籃中魚再活禹門未必解翻身大慧禪師薰風南來涼生殿閣諸佛出身開口即錯錯錯贏得衡梅十七年驢前馬後無歸著慈林講師頂相氣宇兮春溫風標兮凜然律虎出林兮裂破開遮持犯經龍攪海兮探窮頓漸偏圓句法清新兮吟徹山莊梅竹𮌎襟妙蘊兮包羅丘壑風煙友縉紳兮非權門炙手荷佛法兮思重負肩煨芋香兮無心收涕臥雲深兮豈意朝天邈真容兮明鏡繪像付箕裘兮神珠藏囦夫是之謂慈林克家之子真鸞膠而續絃者也達磨折蘆渡江殫千金産學屠龍袖隱吹毛不露鋒洎見真龍元不識郎忙航葦去無蹤布袋肩丈拖袋回頭看小兒捉衣楖栗橫肩拖布袋回頭轉腦小兒嬉休言兜率宮中事已被渠儂捉敗伊別山和尚真為瑞淨頭贊嚴冷面皮軟頑腸肚對同參唱菩薩蠻與行家説無義語縱蒼鷹搏物機闢獅子翻身路醫衲僧病下天王補心圓移覩史宮換長庚大火聚雖潛行密用處鶻眼迷蹤