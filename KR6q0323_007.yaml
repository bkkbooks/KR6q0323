天台旨盤珠影不留死生聊一戲定慧絶雙修到這裏説甚莊周夢蝶蝶夢莊周牢關俱鎖斷雲散一天秋為雪航庵主講師轉骨歸葬罷講雨花筵糞火煨山芋蕩盡聖凡情巉然丰骨露瞥轉一機揚塵簸土靈蹤不在猿啼處雪航雪航更須進步與靈鷲猿下火紅樹栖雲古藤挂月捷影一飛清吟三疊直下息攀緣死生心路絶無復經行異類中擲炬云火聚何妨參勝熱為清涼日東山入骨臨濟清涼樹東山瓦鼓歌就陰休歇小接響聽聞多死生根斷棚八聲消和骨和腔更換了何妨輥入葛藤窠為燈上坐入骨燦發心燈輝騰今古觸著髑髏乾點即偷心死死中活頭枕衡山腳踏北嶽為燈首座入塔點發心燈瞎人天眼當暗中有明當明中有暗揭翻明暗路岐猶是弄光影漢畢竟如何爍破髑髏無朕迹背陰山子向陽多淨上人起龕淨潔無根更加磨煉直須照破娘生面拊龕打破鏡來與汝相見鑒覺雙亡死眼開腳根拽斷紅絲線資壽瑩大師下火三十歲鐵牛坐下某人辛勤三十年鍊行將晶瑩力透鐵牛機未跨末山頂翻身得路徹底惺惺生死牢關百雜碎倒騎玉象火中行為因講師親書天台口義入塔佛壟眼睛天台骨髓流出胸襟蓋天蓋地不是刮膜金篦亦非拭瘡故紙三千一念細平章掘窖深埋亦放光為達老入塔無限真達不疑太虗寥廓凡聖性空死生夢覺直下髑髏雙眼活無栖泊處堪栖泊為湘南叟下火百城煙水罷南詢歸織蒲鞋養老親活業掃空呈死伎瀟湘夜雨正愁人揭翻玄路密透金塵不須參勝熱𩗺炬云化火自焚身為行者居奇下火老奇年登七十八悟得庖厨真妙訣袖藏露刃冷含霜細切清風薄明月善煮東山木札羮餕餡無皮渾是鐵咬破方知百味全驗盡衲僧三寸舌昨朝揚下破鉛刀撒手便行心路絶心路絶火裏烏龜頭戴雪為彬典坐下火某人質野文史非關汝事煮木札羮傷鹽費醋昨朝死伎窮直下尋歸路尋歸路驀直去家家門前火把子為定侍者下火扯破犀牛扇參方伎倆窮那伽常在定死水不藏龍揭翻活路千聖迷蹤百煉真金柔繞指更須入火奏全功為逢知客下火古今眼正辨龍蛇驀劄相逢便喫茶活業用窮呈死伎火官頭上轉風車為成道相開光明正覺山前錯見星至今盲視不分明無端纍瞎傍人眼以筆作點勢玉乳何妨為點睛為説法相開光明説五俱輪入草行豈知口裏黑煙生為人眼目且如此以筆作點勢點一盲教引衆盲粧金剛開光明墮在佛數金褁爛泥團卓立門風腦後抽生鐵總彰文采全彰已是眼中著屑去却屑以筆作點勢云一段光明毫端點發
