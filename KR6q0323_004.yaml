body:
  text: 小參結夏小參拈主丈云二千年前摩竭提國卓下云親行此令車不橫推理無曲斷二千年後靜深堂上卓云小店新開阿魏無真水銀無假當場辨的應用無虧垂一機坐斷天下人舌頭使一星毒入天下人骨髓以此禁足朝遊檀特暮宿羅浮以此護生地絶昆蟲水無鱗介然雖如是靠丈云且靠一邊何故善賈之家不停死貨舉德山示衆云今夜小參不答話問話者三十棒當門懸白澤時有僧出禮拜山便打賞不避仇讎僧云話也未問因甚便打某甲淚出痛腸山云汝是甚處人入泥入水僧云新羅人不勞再勘山云未跨船舷好與二十棒貪行荒草裏不覺露沾衣拈云德山前頭較些子後頭笑殺人子細看來可謂少年曾決龍蛇陳老大還同稚子歌法華小參鈯斧埋藏歲月深巖居日與白雲鄰業風無奈重飄鼓又作擔柴賣筊人事到於斯難為回避只得草鞋緊峭楖𣗖橫擔踏翻玲瓏二十里之松濤來看洞庭七二峰之蘿月嗚咿樵唱欵乃漁歌鼓舞升平樂無為化且道承誰恩力挂拂子云切忌妄通消息舉教中道森羅及萬像一法之所印師拈云黃面瞿曇一乘席上三百六十骨節八萬四千毛竅盡情撒向諸人面前直至而今收拾不上新法華雖無較長短淺深之手要斷二千餘年未了公案以拂子空中撥云森羅萬像甚處得來擊禪床一下云一法向甚處著擲下拂子云道泰不傳天子令時清休唱太平歌冬夜小參無陰陽地長惡根株枝梃不萠花開無影結團團果非青黃赤白形其色非甜酸苦澀充其滋春陽昫嫗不足以育生霜雪憑陵豈賴其成熟原其用非楊岐栗蓬之可擬雜其真非黃蘗蜜果之可儔圓陀陀獨露於萬像之中赤灑灑孤標於八紘之表輕如毫末重如山賤似黃金貴如土法華包藏既久今遇書雲令節打破慳囊和盤托出供養諸人去也以拂子打一圓相云還見麼覷之眼睛枯嗅之腦門裂味之咽喉結食之髑髏乾若是舌頭無骨底信手拈來不妨吞吐忽有箇漢出來道長老甚好供養太粗惡生只向他道蟠桃只解供王母霜橘從教占洞庭舉洞山與泰首座喫果子公案師拈云這則公案古今多少人咬嚼多是渾圇吞少見百雜碎法華於衆口分餐處試咬一箇看掇退果卓不無洞山未免倚勢欺人不顧傍觀者哂法華當時若見他道有一物黑似漆即以手掩其口云低聲低聲非惟塞斷洞山咽喉亦免後人粘牙綴齒具眼者辨取歲夜小參千聖樞機群情杻械盡底掀翻未為脫灑拈主丈主杖子四十餘年撥草瞻風參尋知識究明此事逗到﨟月三十日依舊黑𥻘皴地引得馬當庿大王忍俊不禁向碧玉盤中青螺影裏布扶疏梅月奏蕭瑟松風泛漁浦雪航鳴樵家玉斧將家私盡情花擘了也拄杖子喏還會麼惺惺著囱前雖點舊年燈樓上已吹新歲角卓下云錯舉東山空和尚與夢石分歲云歲暮人人有所分翁今分歲亦隨羣餅翻溪上團團月膾縷簷間細細雲漱壑醴泉珠萬斛堆盤珠柳雪千斤兩翁一飽風顛在倦僕飢童總未聞師拈云雪峰大開東閣宴樂佳賓則固是超羣逸格點檢將來未免將常住物當自己人情法華家貧難辦素食勉強效顰與諸人分歲去也草舍開張小小筵炊無米飯爨無煙通身飽暖憨憨睡夢到滄洲白鳥邊結制小參布袋結包括乾坤無漏泄禁網開靈禽異獸撞頭來釋迦老子不善用心以大圓覺為伽籃平地擠人墮坑落塹法華不欲助桀為虐向脫落無羈處闢通天活路與諸人開粥共夏拄杖畫一畫云萬緣畫斷一物不為東廊西廡飽飯間嬉聽殷都料斫木形瓦棺之用任馬泥水磨磚泄南嶽之機是亦不管非亦不知佛法身心爛似泥卓下云任運獨超千里外松蘿不與月輪齊舉達磨見武帝帝問云如何是聖諦第一義八角蒺藜當面擲祖云廓然無聖鐵網漫空帝云對朕者誰砒霜本是毒祖云不識截耳臥階帝不契買石得雲饒祖遂渡江善為道路復拈云老胡殫千金之産學屠龍之伎伎成無以施其巧雖然誰知冷灰裏九轉透瓶香聊呈一頌宮花壓鬢墜烏雲傾國風流宛勝秦玉笛插藏人不見夜深吹起鳳樓春衆中莫有相品弄者麼自顧視左右云有拍膝云邪法難扶解制小參布袋頭開東去西去滿目荒榛一身塵土破草鞋等間踢出後彌勒前釋迦折拄杖信手挑來胡張三黑李四瞎頂門眼辨龍蛇透險崕機擒虎兕朝遊南嶽暮宿天台晝往西天夜歸東土此猶是衲僧尋常行履處爭奈法華橫點頭未敢輕許何故鴻飛冥冥弋人何慕舉洞山示衆云秋初夏末東西去去直須向萬里無寸草處去劉陽庵主道出門便是草拈云一人平地上險崖一人險崖中平地點撿將來總欠一著聊呈一頌萬里無寸草出門便是草支笻寂寞中望斷無人到結夏小參緊結布袋頭森羅萬象一時收高挂主丈子火冷雲深無覔處契此翁用盡神通拖不行把不去未免飲氣吞聲向大寂光中禁足護生怗然而住住大住地變荒榛晴天飛雹雨德山臨濟回避無門雲門趙州隱身無路又説甚平等性智金裹爛泥團身心安居水浸黃楊樹開粥共夏餿飯祭間神圓覺伽藍蒿籬關猛虎有來由無本據總是熟睡饒譫語契此翁諾兜率內院即得乳竇峰前斫額望汝拍床云牢記取舉藥山示衆云我有一句待特牛兒生即向汝道鐵索鎖長江豈知魚變化有僧出云特牛生兒了也自是和尚不道倒用司農印藥山喚侍者點燈來閉目食蝸牛一場酸澀苦其僧抽身歸衆虎斑終不似人斑拈云藥山老兒向千聖頂𩕳輥出百花毬直是不形文采爭奈這僧機如掣電眼似流星等間一擊百雜碎待點得燈來片帆已過東海為行者立參貪傳無底鉢栽松道者七歲重來愛吟落韻詩寒山𤺊兒半生清苦甘贄手親行襯纍南泉打破粥鍋老盧眼不識書摵黃梅非臺鏡窮伎倆一時拈弄惡聲響千古流傳人苟存尊堯鄙桀之心豈無希顏慕藺之作務在克遵師訓更須痛念己躬鹽車馬展驥可期陶壁梭化龍有日切宜謹守無致故違三十竹篦莫言不道復頌云槽廠安身不記年一心希慕嶺南能肩頭揚下潑柴擔要汝來傳佛祖燈晚參旃檀藂林旃檀圍繞破驢脊上足蒼蠅獅子窟宅獅子嚬呻窮伎倆不勞拈出我此一衆身無所倚心無所緣真實具存了無枝葉等間開口聲振梵天信手拈來香浮宇宙文殊師不能控禦束手墮懸崖南堂老豈解提持謾獻遼束豕屏息狐狸之形掃除荊棘之林威震祖庭光揚法席於斯告報趙婆沽醋取笑諸方衆中莫有純一無雜不受塗糊底麼如無拈主丈拄杖子未免引諸人全身入草去也卓一下欲窮圓澤意須到葛洪川解夏小參小小青山藂藂翠竹野景無多怡然縱目明覺老人向獨脫無依處間坐解疏慵為靜勝所縛拈丈主丈子同轍不同途見山不是山居竹不見竹業識忙忙卒未休卓一下忙中解唱陽春曲花簇簇錦簇簇聽不足玩不足卓一下欵乃一聲山水緑只如聲色純真動靜一致於衲僧分上還有小分相應也無靠主丈良久還我九十日飯錢來為新歸堂兄弟晚參畫地為牢已是傷風敗教結繩為政明知散朴離淳既云拂迹成痕因甚鑿空安柄老臊胡左搓芒繩縛鬼子越禁者多後掘地窖陷平人突圍不少積年塵鏡假揩磨始見光明蹊田特牛去鞭繩豈能耕稼切忌知而故犯務在遵而力行雖無罪貫三千條只要罰油十六兩聊陳管見以曉後來塞却耳根分明聽取説規矩不録頌一莖草外隱全形翳盡藂林活眼睛破綻莫教輕捉著堂前高挂贖金名冬至小參一拳拳倒黃鶴樓一剔剔翻鸚鵡洲發許多無明多麼萬機休罷無餘事肱枕蘿囱臥白雲踏破籬門捉起來打總恁麼祖師門下苔封古徑荒草離離有甚麼共語處拈主丈主丈子忍俊不禁向陰陽未判動靜未分已前闢開線路與諸人應時納祐去也卓一下群陰剝水退石稜生山空霜木落卓一下一陽生氷河新發焰石笋暗抽莖畫一畫陰陽削迹又畫一動靜無痕皓老布裩拈來赫歷赤洞山果子咬破渾崙吞熙熙焉陶陶焉雲外不知堯舜化飯餘曝背傍晴簷雖然如是擲丈不直分文除夜小參聖諦廓然無一葦橫江闊少林立雪凍折牛腰庾嶺爭衣行甚驢腳活馬駒於金雞粟下養虎危身死臨濟於黃蘗棒頭助桀為虐古路斷皺剝水上紅旗閃爍開畬鍬子鈍鐵無鋒安心石頭碔砆難琢這一絡索盡情拋却年窮歲盡各有生涯又誰把他人潑笊籬漏木杓高燒柮榾禦春寒飽和羅飯村田樂衲衣下事休拈著輕拈著拍膝云樓上已吹新歲角衆寮晚參説規矩妙斫去漫巧運風斤之手專工修月細無玉斧之痕木之就規矩在梓匠輪輿金可作瓶盤假洪爐烹煉學道謹鞭羊之戒希賢思畫虎之羞蠅附驥千里可期葛倚松九霄有望馬勝熱威儀攝衆忍不步趨婆羅門聚會無殊速須敬遠隄防六賊守心城莫使穿窬掃蕩群邪行正路須教透徹百丈頽綱要人提掇楊岐破屋要汝支撑灼然皮下有血人終不隨他語脈轉倘能深信彼此無辜其或未然拍膝一下啼得血流無用處不如緘口過殘春頌千丈巖頭太險生無端更掘陷人坑深深疊石防頽岸要汝臨崖撒手行結夏小參拈主丈隔墻見角知是牛隔林見煙知是火衲僧門下挈水提瓶不可放過卓一下擊碎神駒白玉鞭畫一畫掣開古殿黃金鎖偃三玄戈甲掃蕩祲氛去五位君臣肅雍清庿止原夢二子休逞神通叱跛腳阿師不須話墮百法明門關閉了四壁蕭然無一窖又教誰九旬禁足癩馬繫枯樁三月安居瞎驢牽石磨月娟娟山悄悄笑拍闌干唱竹枝哩哩囉囉無人和卓一下遏雲聲斷千峰曉晚參普説慈明骨董箱荷斯文重寄眼中金屑萬重楊岐三腳驢躐先聖靈蹤腳下泥深三尺原其攛身軍伍喫苦吞辛縮項嗟噓忍寒受餓故有展戈矛吞栗棘前不搆村後不迭店貽千古法門之誚後世劈琴煮鶴漫紫削方漢楚割鴻溝爭圖王霸棄骨董箱如爛繒弊屣視三腳驢如疥狗泥豬圾垃成堆誰肯正眼覷著致令象頭檀特九十六種不了妙覺未入正修窮空不歸還入輪轉底乘間而入覆巢破卵剝床及膚殆無所容膝衆中若有個漢牙如劒樹口似血盆欲不報平奮不顧身怒臂援溺煙塵不動殲厥渠魁逐大軍於藕絲孔中䇿元勳於凌煙閣上如關羽斬顏良目無萬軍之敵臥龍擒孟獲面施七縱之機盤珠坂丸了無留影風凌雨豈待褰裳俊哉俊哉快活快活諸禪德決欲擔荷此事若非渾鋼打就生鐵鑄成翻轉面皮爺也不識腳尖踢倒三世佛鼻息衝破五須彌力負萬鈞眼生三角少室門墻鮮覷崖涘前所謂慈明攛身軍伍一見汾陽便有奪槍殺賊之意千鈞弩發乃云自到師席每見垂示皆世俗鄙事佛法二字略無所聞滿川龍虎舉猶自説平基汾陽知是個漢不肯放過略施鼠伎怒罵云是何禿子敢裨販老僧耶折許多氣力作麼誅龍之器惜用揮蛇慈明驚走聲救將謂有多少奇特汾陽掩其口曰喚作罵耶明大悟消得龍王多少風買錢得金一場富貴又被胡僧覷破六人成大器豆娘顏本醜那更飾黃金明就辭歸里照顧溪邊老婆子善為道路幸自可憐生無端汾陽矢上加尖念一道五天神呪梵語不成唐言不是天無頭劈面便唾年衰鬼弄人吉州城畔展戈矛著甚死急頂戴燒鐘十萬斤將軍匹馬林下過草賊大敗士元貪展驥不顧髑髏乾袁州城裏閙啾啾一家有事百家忙後住南泉以楊岐充監寺臭肉來蠅不是冤家不聚頭窮煎餓炒透金圈吞栗棘日求升合度朝昏鬼家活業餿飯祭間神不勞拈出一日際晚慈明出遊龍得水時添意氣虎逢山色更威獰腳跟不點地岐乃撾鼓請歸立參折逼人作麼毒蛇須是乞兒捉明乃示悔鴉臭當風立掩耳而退叢林因有晚參之名山僧比來謬玷師席居萬峰頂白雲往來野鳥啁哳無𣸪故時敗人意中事得與五湖四海學般若龍象開粥共夏晝看飛瀑夜倚團蒲坐臥經行不知身在圓覺枷藍現成受用若起一毫分別之想便墮聖凡閫域若墮聖凡閫域便分生死路歧若分生死路岐便入邪魔群隊如蠶作繭自縈自纏障閉出身之路回視骨董箱輕若鴻毛輕盡力舉之不動三腳驢俊若神駒俊盡力鞭之不行病在伊何病在偷心未死所以道臨際兒孫不受鑑覺若受鑑覺自救不了豈有宗門奇特事耶到者裏直須盡情放下將從前學得底參得底悟得底聖凡閫域生死路岐邪魔群隊束作一束揚在大洋海外更海外空勞勞地別立生涯將一莖草作丈六金身將丈六金身作一莖草隨緣放曠任運騰騰凡亦不知聖亦不會三間茆屋分雲住十里松門伴月遊其或未然中峰雖在猿啼處不問樵家路轉迷告香萬法是心光諸緣惟性曉本無迷悟人只要今日了釋迦老子達磨大師天下老和尚逾城栖雪向壁觀心擔板輥毬擎杈竪指潛行密用險布危分列派分宗千差萬別逗到臘月三十日結角羅紋處是了耶不了耶幸自可憐生無端龜毛拂子老無定力刺腦膠盆剛要從公定當竪起拂子云這箇不是萬法喚甚麼作心光擊床云者箇不是諸緣作麼生惟性曉悟是誰悟迷是誰迷畫一畫悟迷無影迹佛祖絶離微松風瑟瑟蘿月依依對客高堂清話歇挂主丈云冷和雲影挂松枝了不了兮誰得知散説不録解夏小參百二十日夏今宵已足期蠟人輕檢點不見兩莖眉致令明覺老人誾誾含笑水邊林下瘦䇿間戲將乳峰白石偃蓋蒼松錦鏡清光珠林翠色揍成瀑布一聯詩那斯祁力㘞希新翻音律逸格風規梵語華言該不著賡酬惟有夜蟲知拍床云不遇寒山舉向誰冬節小參揑聚大千指甲上塵塵法界踢出古佛腳尖頭步步寒花臨際兒孫不受鑑覺玲瓏八面自回合峭峻一方誰敢窺盤珠坂丸了無留影説甚陰極陽生道消道長赫赤布裩隨時換替豈容皓老書名團欒果子信手拏撮未許洞山知味剗斷去路截斷葛藤飯餘散步出松門遠看青山近飛瀑雖然如是不是一番寒徹骨爭得梅花撲鼻香除夜小參屋中有主從君住尺箠當猛虎奮呼而操擊無主外來俱得路徒手遇蜥蜴變色而却步拈丈主丈子爛遊湖海四十餘年硬葛怛黑𥻘皴翻轉鐵面皮親爺也不識塞破臨際血盆口孰教伊旱地轟雷捶折德山麁糲梨免致得孤峰結草自餘斷橫古路水上立紅旗撼茶原夢弄鬼精魂説識論心隨邪倒見擎杈竪指臭霧漫天擔板輥毬祲氛塞路卓一下不消一劄瓦解氷消衆中驀有箇漢出來道主丈子峻機妙用則不無只如﨟月三十日一點氣使不著又且如何擺撥又卓一下來年尚有新條在惱亂春風卒未休為行者立參負石舂粳盧行者十成鈍置吟詩捉飯寒山子一世顛狂這不唧𠺕漢鈍置藂林惟大闡提人別行活路安排鍬钁旋栽冬嶺之松淬礪鋒鋩快剗春庭之草澡心清潔潑凡夫成佛不為難苦口叮嚀老和尚憐兒不覺醜急須悔過莫返為冤冀汝淨行人速下菩提種晚參利劒斬虗空萬象鳴嚗嚗蒿籬關猛虎大地暗昏昏衲僧行履如火燒氷如蛇噀毒無你近傍處無你啖處氣吞牛斗三千丈俊哉俊哉頭戴燒鍾十萬斤快活快活耕破山前地穴鼻牛拽斷繩頭踏斷天下人良馬駒過由鞭影呼臨濟提瓶挈水呵德山捧硯脫靴上門上戶眼如鈴有麼有麼機如電嫌佛不肯做自己生冤家膝下有黃金肯受人籠絡灼然如是衲僧門下本色大闡提人其或未然前路驀然逢著虎莫謂翁翁不道來結夏小參握靈蛇簸弄乾坤韓信臨朝底抱金匱深藏巖谷諸葛困茅廬拈主丈主丈子忍俊不禁從公定當卓一下貶向二鐵圍山了也盡法無民放開線路向飛雪巖前現前清衆遵行古制創立新規以大圓覺喫蒙汗藥為我伽藍馬廄牛欄身心安居繫縛盲驢平等性智鴨雞無氣黃面老子積世家私一時潑撒了也且道九十日內諸人將何受用靠主丈萬壑深雲千峰月枕肱無事放憨眠莫道無事好中夏晚參普説金雞一粒粟馬駒踏殺天下人莫嚇我堂堂行九逵嚼嚙金勒便有天間十二氣象黃蘗三頓棒臨濟未是白拈賊灼然灼然跳籬驀墻脫間漏架重關巨闢劫盡家財説甚青氈吾家舊物慈明易身軍伍遭汾陽怒罵連聲求救消得龍王多少風骨董箱荷斯文重寄一縷繫千鈞厥後黃龍奮卓犖不羣之志築滿一肚皮間言長語到處領衆行腳前不搆村後不迭店將謂秦無人擲枕子打雲峰汞銀入煆即流真不掩偽曲不藏直向聞棒聲合喫處不消一劄久佩泐潭冬瓜印子一時百雜碎遲八刻醜人醜舉止佛手驢腳欲隱彌露引得展大旗拖條布裙屎臭氣無眼山翁拳分背觸塵飛翳天難掃去貓捕鼠巧盡拙生選佛得甲科從緣入無失醯酸蚋聚肉臭蠅攢邪法難扶如何得是楊岐聽喃喃幽鳥深村荒草把手共行赤眼撞著火柴頭住單丁破院布雪珠滿床縮項嗟吁凍餓不死弄蹄驢子踏躐白雲絶後再蘇聞驅儺笑略伸怒臂一拳拳倒黃鶴樓一踢踢翻鸚鵡洲直得通身汗下向一莖草上現瓊樓玉殿鬼家活計不勞拈出有般漢出得醬甕不解澡身鼓喙呀唇咬人火急摵摩尼珠百雜碎將謂天雄附子元來草木烏頭貧無四壁強書白契賤賣田園松竹清風盡情狼籍有甚共語處頻呼小玉識得家私子湖看狗舌如鉗撥火窮神歸破墮家貧生出豆娘兒似者一火不唧𠺕底衲僧門下掘窖深埋有甚麼罪過盡法無民留取一箇半箇縱饒驕陽七載洪水九年盡大地寸草不生別甑炊香不到得無飯喫緣他一副英靈骨未出母胎已是渾金鑄就璞玉鐫成輕若鴻毛輕重若丘山重看渠等間垂一機示一境如萬丈洪崖轉圓石相似饒你通身手眼亦無窺覷處亦無近傍處不枉為達磨兒孫諸禪德一等擘破黃面皮拋離父母瞻風撥草訪友尋師何不學如是作略真實究取己躬一段光明令腳跟如十日並照斫額望鄉關大涉程途在所以雲門大師道直得盡乾坤大地無絲毫過患猶是轉句不見一法始是半提須知更有全提底時節且道如何是全提底時節莫是半夜逾城六年栖雪正覺山前明星換眼麼且喜沒交涉莫是九年面壁斷臂安心半夜傳衣非風幡動麼且喜沒交涉莫是打牛打車磨磚作鏡野鴨飛過驀鼻牽回麼且喜沒交涉莫是棒如雨點喝似雷奔輥毬斫牌擎叉竪指麼且喜沒交涉古人見你奔馳不能休歇去不得已掉出一柄鉛刀子與汝一刀兩段令汝灑灑落落去爭奈以病為藥三箇成團四箇作塊聚頭浩浩摶量者箇公案又如何那箇公案又如彼轉增業火日夜烹煎欲往西秦却之東魯譬如州縣捉劫賊相似圖形畫影多立賞金看者百千及乎賊在面前却又不識若要真正全提須向生佛未具父母未生機境未形心行未到豁開正路掉臂便行方有自由分則不墮佛法卑種類所謂佛法卑種類盜名竊服寄活吾門名利戰鏖恣情裨販者不預焉指其稍有鎡基稍蘊志識可為上而反趍下也或因微識理路流浪半途不肯進前便謂萬法掃空而忽無因果或於古人方䇿上諸方口皮邊逴得一言半句攢花簇錦四六文章築在肚皮中貼在額頭上到處輕忽上流造無間業或顯己長談彼短或重久習薄初機或尊偏見斥圓聞或喪沖機矜俊辨不如取笑識者其病伊何只緣不立大志發大願全無真實惟務浮虗如插春枝於浮壤一時非不發榮不久則枯矣此利根之病不可不知若鈍根者於無事角力守頑空全無孔竅執為木偶不知非木偶執為墻壁不知非墻壁見神見鬼忽笑忽啼一魔著心萬藥難解若是利根底背法堂著草鞋而去隔江見招扇而趍鈍根底坐破七箇蒲團捲簾見天下方許具衲僧些子氣息若到乳峰門下主丈不在苕柄各與三十且道賞伊罰伊向下文長付在來日珍重解夏小參乳峯絶頂法歲云周禁足護生裂開禁網燒畬種粟揚下鋤頭折主丈壁根頭憨眠覺破草鞋笆籬上乾晒重修只待金風肅野玉露漙秋鴈過長空影沈寒水鷗盟古渡雪點蘋洲東入天台南尋衡嶽朝遊檀特暮宿羅浮灑灑落落優優悠悠驗蠟人氷誰管得憐鵝護雪罷休休休休今古山河元一統何須漢楚割鴻溝拍禪床瑞巖小參緑蘿深處臥雲煙觸戰蠻征事悄然臨老無端重出醜借婆裙子拜婆年似恁麼有甚共語處若恁麼有些提掇處用則行舍則藏無適無莫遇緣則宗祖翁門戶緑苔封盡大地人難插腳拈丈畫一畫云裂破了也從這裡入石馬石人齊鼓舞澗聲清奏太平歌稍涉遲疑仰謝十二峰分照月如剪為行者立參侵鬢霜寒荷钁剩栽無影樹墜腰石冷和粳舂出古菱花纍周家女泣淚太多想黃梅僧短氣不少有為者必若是彼人也何畏哉入芝蘭室久久嗅無香行霧露中時時衣有潤勤謹溫良何妨共飯頑嚚悖逆斷請抽單青燈繼寒山子務學必求師黃葉止啼瑞巖老人憐兒不覺醜切宜遵守慎勿犯違庶曹溪絶潢潦之流俾良田純粳稻之種生苕專要掃腳迹黑竹篦且不順人情出廄良駒見鞭影即行千里摩雲俊翼假風力直上九天冀汝清淨人同埴菩提果頌拋捨箕裘要出家學盧行者去擔柴脊梁不具黃金骨碓米坊中被活埋結夏小參萬法是心光諸緣惟性曉本無迷悟人祇要今日了懿德山王聞如是語誾誾而笑即而問曰既無迷悟了個甚麼瑞巖被渠一問有口如槌有舌如結直得山河大地明暗色空草木昆蟲洪纖長短無限威光一時囊括了也向九十日截斷離微掃除玄妙潛鞭密練晦德窒聰不敢移易一絲毫雖然鳳縈金網龍悕碧潭瞥轉玄樞別尋活路三三兩兩松根石上唱紫芝歌宴樂升平快活快活正恁麼時且道承誰恩力以拂子擊床云握手欲言言不及月移花影上闌干趙侍郎請為衆開室普説提綱拶透險崖機瑞芝峰冷無香色揭示截流句剪月池怒漲波濤鼻無竅嗅之髑髏乾眼無筋覷之魂魄喪具足凡夫法凡夫不知具足聖人法聖人不會知不知會不會璞玉渾金泥團土塊到者裏三世諸佛歷代祖師天下老和尚放一頭低俯順時宜去也何故坐中盡是江南客何必樽前唱鷓鴣冬夜小參群陰剝小人道消千林木落一陽生君子道長石笋抽芽拈丈主丈子出陰陽之表居消長之前行一步卓一下大地揭翻無寸土示一機卓一下虗空消殞絶離微不學魯史青黃點畫不將宮線長短針錐無思無慮無事無為向晴窗曝暖看野梅花放疏影橫枝清絶境太平時靠丈靜倚松根眠覺醒間歌一曲囉囉哩不是知音説向誰除夜小參臘月三十日﨟月二十九等是歲華終無事窮相守舉行糊餅團團海月圓細縷凍雲絲絲氷玉瘦衲衣下事簇火商量今古誵訛盡情分剖香林臘月火燒山用盡精神不知有若知有臘月扇子匝地風生﨟月蓮花普天香透分付正法眼老臊胡活陷平人還我犀牛兒一國師外揚家醜以拂畫一畫云一畫畫斷別有機籌紛紛不解靈蛇毒王不留莖草爛秋結夏小參大地踏翻無寸土昆蟲介甲絶行蹤護生禁足元勛在圓覺伽藍一掃空個是諸方普請邊事瑞巖老不以筋力為能隨分與現前三兄五弟飽和羅飯唱太平歌要坐便坐苔石擁雲深要行便行笻枝敲月冷佛法身心爛似泥蠻觸戰塵無半點驀有箇漢出來道瑞巖恁麼與九十日內克期取證還有些少相應也無喝一喝莫將黃屋富換我草廬貧解夏小參瑞巖頻喚主人翁徹底惺惺不若聾裂盡見聞行活路鄉關猶隔海千重若是性燥漢翻轉鐵面皮爺來也不識掣開禁網擊碎伽藍主杖頭不撥一塵南嶽天台交點過草鞋尖踢出箇佛驢腮馬頷得人憎放行也得把住也得如十八歲男兒作狀元相似俊哉俊哉快活快活雖然酷暑逢秋雖爽意金風肅殺又愁人歲夜小參瑞巖徹骨窮最苦冤憎會廚無糝聚蠅將何物分歲擬烹露地牛催納筋角反為憂擬取鳳凰髓傷賀太平祥瑞氣擬吞栗棘蓬塞斷咽喉氣不通擬包鐵餕餡欠紫絲頭難措辦不如據見定隨家豐儉泉㪺聖井盤簇靈芝繪縷緑雲餅翻剪月飯後更煎茶一盞且無冤債與他償驀有個漢出來道長老深明因果滴水氷生因甚將常住物作自己人情只向他道舉世人貧食周粟相逢難話首陽薇行堂小參石嶺雲深荷钁剩栽無影樹碓坊月冷和粳舂出古菱花齷齪漢鈍置先世門風伶俐底不墮從來窠臼穩跨聖僧項透丹霞剗草之機直入圓通門悟大士尋聲之旨冥心激勵潑凡夫立地成佛不為難苦口叮嚀老和尚嚼飯不覺醜自宜警䇿勿犯規繩頌不業農商不業儒緇田弗下寸根株驢年斫倒菩提樹羞見新州箇老盧晚參十二時不雜用心黑牛臥死水四十年打成一片癩馬繫枯樁坐頑石喚醒主人翁黃丹塗鬼面荷破箱滿盛間骨董苕畫蛾眉前不搆村後不迭店隔海望扶桑大欠風帆在若是黃金肌骨生鐵肝腸未出母胎已作獅子吼潛行密用險布危分爛嚼虗空吐出滓揭翻大地無寸土驅耕奪食塞路斷橋控石霜角虎眼光搖百步之威未完牙爪跨陝府鐵牛腳力負萬鈞之重猶帶鞭繩糞坑頭倒卓諸祖師草鞋尖踢出三世佛如斯作略衲僧門下少分相應自餘不真履踐唯事浮華肚裏黑漫漫腳跟浮逼逼猖狂失守頑鈍無知有甚共語處我此一衆雖無枝葉尚帶玄微離心意識參出聖凡路學常提殺活劒不稟釋迦文竪淑世光明幢當忍死以俟美則美矣且不涉途程到家一句又作麼生拍床云剛被子規知此意臨風啼血染花梢結夏小參圓覺伽藍十方通暢凡聖同居任情往來無端老臊胡現小家相劄定牢關剛要九十日內護生禁足驗蠟人氷乃呵呵大笑云殊不知坑灰未冷山東亂劉項元來不讀書瑞巖忝良弓之子必學為箕家法森嚴豈容踰越未免別通線路與諸人開粥共夏去也以拂子搖拽云松下掃除青草徑畫一畫云澗邊開闢緑陰亭飯餘握手間行坐擊一下唱曲山歌賀太平遏雲古調流水新聲眼裏無筋聽不足又擊云臨風擊碎聖凡情解夏小參萬般施設不如常文不驚人又久長如常恰似秋風至無意涼人人自涼拈主丈云主丈子也如常九十日內深藏壁角穩貼貼地且無一點撑觸處無端把不定見湖海參玄上士縈纏禁網困守蠟人以丈畫云八面裂開卓一下從頭擊碎使一身無繫著六用絶瘢痕作箇灑灑落落人去也如斯施設且道是如常不如常靠丈云莫把是非來辨我浮生穿鑿不相關至節小參萬法本間而人自閙拈主丈主丈子退藏於密懶行芳草徑高臥白雲根千眼覔他蹤迹不得無端失腳閙藍光陰飄忽三見書雲無片時間暇幸無柏庭友于同此貧樂爛煨黃獨熟煮青藜看早梅鏤月瘦影橫斜聽枯葉舞風清聲陸續隨時消遣不墮斷常且道與洞山道有一物常在動用中動用中收不得相去幾何喝云莫將華屋富換我草廬貧雖然如是擲丈云不直分文結制小參三代結繩為政已是朴散淳離九旬畫地為牢轉見情亡義斷瑞巖素來不喜助桀為虐今夏隨分與三兄五弟向白雲深處古木陰中信步間行草鞋尖不曾踢出箇佛曲肱高臥木枕子未嘗推出示人喫和蘿飯飽即休唱村田樂倦即止若説平等性智鴉鳴鵲噪半點不相瞞圓覺伽藍水淥山青絲毫無隔礙外無所倚內無所緣優哉悠哉快活快活到這裏直饒盡大地草木藂林一一變作閻家老子要索飯錢無開口處何故中書堂裏經綸事問著樵蘇怎得知解制小參十方同聚會臭肉泊蒼蠅箇箇學無為困龍臥死水此是選佛場誤賺人不少心空及第歸謝三娘稱金恁麼告報衆中莫有橫點頭底麼若有九十日夏尅期取證功不浪施如無夏末秋初東去西去拄杖頭撥著一箇半箇挈水提瓶草鞋尖踢出一人兩人喚來洗腳如斯舉止未免芝峰橫點頭在何故良久擊拂云長江流不盡秋露滴無窮冬夜小參揭榜僧堂鬼面貼卦掇退果卓倚勢欺人驢腮馬頷得人憎諸方不具羅籠手鸕語鶴小人道消君子道長管他間事作麼這四塊捩鼻木古今多少人被渠礙塞有氣出不得芝峰今夜不惜鉛刀盡情花擘了也衆中莫有知香別臭底麼若有野梅知得先春信不待凝寒已放花如無喫果子時切忌渾崙吞却棗除夜小參住院二十餘年年年做箇分歲邇來赤骨律窮到此如何理會擬烹露地牛恐遭官禁罪擬炊無飯米欠納秋苗稅事不獲已未免將常住物作自己人情去也剪月為殽擘芝為膾一飽忘百飢遊戲諸塵外如斯管宴且道還契諸人意也無拍膝云噁官局既無銷食藥何妨鼓腹樂清貧頌東村王老夜燒錢拈引山雲海月魂貧極瑞巖輕助薦儘教無佛處稱尊結制小參瑞巖喚醒主人翁把手經行禁網中踏斷綱宗開活眼笑聽山鳥話家風莫是半夜逾城六年栖雪麼人貧智短莫是少林面壁分髓分皮麼馬瘦毛長莫是打牛打車行棒行喝麼黃丹塗鬼面莫是暗抽橫骨密度金針麼苕畫蛾眉自餘插鍬叉手惟識惟心險布危分潛行密用總是熟睡饒譫語於本參中隔海望鄉關大涉波濤在不若盡情揚下穩帖帖地同此安居飢來喫困來眠遠看青山近流水喝云莫道無事好除夜小參五十三年行腳走遍天涯海角早知唐喪光陰悔不閉門獨活古松下苔石憨眠野溪邊笻枝倒卓幽鳥啼春水奏流湊成一曲村田樂樂則不無且道臘月三十日事如何擺撥乃搖手云休話著以丈畫云都拈却作者好求無病藥卓丈云鐵牛掣斷黃金索法語卍姑入此目示曄庵主再住庵法語臥松蘿下塊石枕頭喚起來打爛煨黃獨不顧紫泥養拙未尊其餘鼓破钁活埋佛祖竪粗拳勘驗龍蛇總是無風匝匝之波萬里望鄉關日莫途遠若是衲活僧千聖頭邊別行一路爭肯臥松蘿埋身鬼窟煨黃獨把定死蛇鼓破钁弄鬼精魂竪麁拳呈醜伎倆柴門掩月茆舍鋪雲澗水鳴琴松風度曲萬機休罷一物不為花鳥迷蹤聖凡絶迹何天書可到何佛眼可覷任方來用盡神機向甚處嗅他氣息燁上人久諳此味知有千聖向上不傳一路盡情揚下別立生涯朅來法華開粥共夏正茲商略古人不恰好處痛加針砭故疾發作犯禁抽單炷香覔語為庵中道伴信筆示之倘能深究東山出醬甕入虀甕還丹點鐵之語摵南泉摩尼珠百雜碎白雲無文之印奪歸掌握回視從上住庵諸老透關眼囓鏃機當甚馬孛雖然再從覺城山下過棒折也未放你在若只數松窠揖強幹辜負己靈甘為流俗非獨望古人於九霄之外枯樹生耳不免少一番不得上人其勉之重慶元東山造經歸蜀求語錦官經論場雖西竺聖師奪外道赤幡瀉懸河辨未易倣佛因是周金剛奮不平之氣肩擔疏鈔誓掃南方魔子未跨龍潭過現未來心一點百雜碎吹滅紙燭止啼之金變為灰燼老東山窮自知之理發蓬蒿箭鎖斷岷峨吳楚老宿喉襟會聖庵前聞如來密語生平礙膺掃無蹤迹摵碎南泉摩尼珠貫花之文削無形影蜀罹犬戎之厄一大藏教片文隻字悉祕龍宮使後進決志流通者漠漠長河舍舟亥濟元公恍然興嘆萬里南來一肩擔荷庶復見漢官威儀踐立芳塵殊途同歸初無東西異轍之分矣中流一壺遇若千金於教門豈小補哉更能窮自知之要飲水防咽則古今東山一夢兩覺朅來玉乳峰前夜雨青燈細論委曲其志可嘉需語為途中道伴豫既跋群英餞行軸茲不重贅攄山偈以贈五千黃葉止兒啼不異渝江碧落古篆分明無贋本具看經眼不難窺示希革侍者歸江陵省親在昔東山多英傑圓通訥却萬乘之詔以大覺行其尊法有體卍庵顏脫身戈甲嬰妙喜鋒珊瑚枕上兩行泪一轉語報佛祖恩足矣要知斯文重寄非眼生三角力負萬鈞鮮能荷擔所以道離心意識參出聖凡路學已是畫影圖形搜尋六賊欲覔真贓卒難入手須向威音王已前生佛未具一揑百雜碎方有入作分若慕臨際𤺊兒脫間漏架跳籬驀墻肋下𡎺拳攔腮贈掌斫額望鄉關白雲千萬里革侍者髫齓出家尋師訪道奮志效圓通卍庵之作每恨不逢樵子徑未識葛洪家朅來玉乳峰前背法堂著草鞋上門上戶眼如鈴有麼有麼機如電不消山僧輕輕噴嚏寒毛卓竪緊捉烏藤革轍二門必期打透頻呼小玉認即非聲扯破犀牛見即非色稍知蹊徑痛欲加鞭秋風裝衣遽有江陵省親之舉臨行需語為途中道伴因謂學道如初成佛有餘驊騮墮地抱千里之志不可半塗而息大鵬展翅乘九萬之風豈戀槍榆之樂當思圓通卍庵一等喫花瑞菜春陽姁嫗霜雪憑陵信口吐出如優曇旃蔔撲鼻馨香原其所自無非離心意出聖凡項上生鐵三百斤打硬做成任是古佛也合低頭甘聽處分到者裏森羅萬象介甲昆蟲總是生身父母春水滿澤夏雲奇峰秋月揚輝冬松孤秀時時順色日日承顏冷面相看少曾間隔豈不思大義渡頭放暮顧一著子日月星辰為之撲落放一線道緊繫草鞋若到江陵有問千丈巖前切不得道奉化到山四十里興盡早回革轍向上有事在要汝東針西劄豫忍死而俟題圓正法不屈韃寇就座與寺俱焚并與小師正受法語丁酉燒成都府時達人大觀視生死如遊戲園林入佛入魔盤珠坂丸了無留影豈威武可屈諸塵可受耶無相禪師踞正法閫奧善用此機當羯胡虐焰亘天志烈秋霜義不受辱談笑危坐同須彌燈王入無聲三昧五熱炙身懸若符契古謂大冶精金無變色信不誣矣受禪人親承針訓終不向語脈轉却須知聲色堆頭別有通天活路信腳錯踏翻和光明藏解脫門盡情掃却受與不受總非他物爭肯閉目藏睛耽小家活計葬精靈鬼窟雖然如是且道乃師一期戲劇向火焰上轉大法輪三世諸佛立地聽是受耶不受耶咄清平世界切忌訛言示日本平將軍法語士大夫處身富貴不被富貴所籠又能擘破娘生鐵面皮銘心此道非夙具般若種智何以臻此所患不能𢬵死做真實工夫多見思量計較將心待悟擬心休歇喜人密證欲人稱贊才起此念便是生死根本況此事一超直入如來地不歷地位階差豈以輕心慢心螢火之見可擬議哉須是撞個無面目漢痛與打併使𮌎次無元字腳道佛一字嗽口三年方有少分相應若打祖師門下過喫痛棒有分豈不見李都尉參石門得道乃云參禪須是鐵漢著手心頭便判直趣無上菩提一切是非莫管此是士大夫參禪樣子往往以思量計較為窟它聞恁麼説話便道莫落空否譬如過海波濤怒作舟未翻先自驚懼忙跳下水去此深可憐愍閣下灼然欲究明此段大事直須將從前思量計較求證悟待休歇底心盡情揚下百不知百不會致君澤民遊刃兒戲驀地喚醒如睡夢覺如蓮花開掀髯一笑豈不快哉然後以斯道覺斯民引大地人下成佛種庶不負靈山付囑亦不枉東南閻浮提打一遭佛法東流入海因承大願力隱菩薩相示宰官身為內外護至祝至祝山野生于西蜀失腳南方五十餘載參見四十餘員具大眼目真實履踐大名宗匠恨未能究徹向上巴鼻以此疾心久聞鈞譽穹護法城時為舞蹈遠隔滄溟無由瞻見惟切斗山之仰昨承建長鄉老禪師賜書為閣下需語三思前輩大老與士大夫交遊未深不知造蘊不敢輕易通信恐誤於人況小僧耶溫英二兄裝軸懇言甚切不獲已老草奉呈萬丐目至示小師居簡住三大士廟庵收書得知與三大士共香火始為之笑又為之喜笑者衲僧家千聖頂𩕳瞥轉玄樞氣食萬牛嫌佛不肯做一旦緘封不密被鬼神覷見乃云修行無力大隋南泉一狀領過肯向精靈鬼窟倚青蝦蟆定吉凶惑亂人家男女玩祭鬼神殘羮餿飯辜負己靈造無間業喜者古庿香爐鬼家活計灼然提點得到死火寒灰臭煙蓬㶿乾坤聚墨日月韜光赴村齋避暴風卒雨與老興化把手共行早是郎當不小枕撈波夜宿紙錢堆裏踢出神前酒臺盤將蜆子老乞兒倒卓屎坑頭未為獨脫漢終日拈香擇火不知身是道場鬼面神頭千變萬化到這裏却須盡底掀翻向生佛未具朕兆未分已前別立生涯不行千聖閫域方有自由分若只循途守轍未免依前被三大士驅役丈夫自有衝天志寧不思之序説卍姑入此目坦講師求子直序在昔老臊胡踰海越漠以直指人心之説惑亂大唐人家男女殊不知未發足竺乾時早已迃曲了也立雪斷臂平地活埋打牛打車騰蛇繞足支分五派置之勿論天台智者入思大室橫飛捷出志烈秋霜於真精進法供養中克證旋陀羅三昧窮直指之妙一乘席上宗通説通心言直故始終地位無委曲相繩繩數百年履坦途由直徑冒其氏者不可以一二數豈敬直內義方外倣佛而語坦上人以子直為字切有慕焉大象截流由基神箭發無不中行無不到稍涉遲回子已過新羅國左上人逢源説般若真源純清絶代濫觴西竺滴水氷生達磨大師揚其波流入震旦少室峰前淵涵靈照雪冷霜凝飲者死心攪之斷臂已是無風匝匝之波曹溪決其正肆其瀾派列支分盈塞湖海欲究其源無非自得左上人以逢源為字深有慕焉求豫剩語因謂曰參禪學道須得其源若得其源則語默動靜折旋俯仰苦樂逆順得失是非等印妙心處處逢渠如影隨形無毫髮間始信孟軻氏居安資深左右逢源之言不妄矣如不逢源撓撓勞生坐化異類吾無取諸上人其審之三峰彪侍者求仲文説霧豹澤毛七日不下食蓋變其文也若是石霜角虎糙暴生獰文采未彰時怒視耽耽威墮地千里腥嘯生風萬木折奚俟鞹文炳蔚然後能噬物哉彪侍者妙年英發負食牛之氣以仲文為字深有取焉插翅出林反目睨母肆藂林無窮之害文不在茲也如其肉醉藍田堅石沒羽匪同日而語上人其勉之當刮目以待是上人求竹房語清陰十畝碧玉萬竿瀟灑門庭天然幽致道人飽和羅飯䔧床瓦枕夢繞華胥山鳥綿蠻臨風喚醒雲疏鏤月簷角蒙煙靜報平安清無俗語縷柏香燃古篆約枯梅老檜講歲寒之盟橫琴膝上三歎遺音桂影半江誦唐人僧在翠微之句怡然神與境會心與道融視整整錦綳森森玉節鳳巢密葉雪壓寒梢揭示真如闢開戶牖雖香嚴一擊忘所知多福三莖四莖曲蕩盡家私無以加此是上人取竹房為號乞語於豫不覺醜露倘姁嫗憑凌一其操榮枯長短虗其心閴爾六窗空然一室則坐臥經行惟汝之適如或摘葉尋枝扶籬摸壁未免此君有屈無雪處境上人太虗説六合之外聖人存而不論三間茆屋隨緣住十里松門獨自遊六合之內聖人論而不議四五百條花柳巷二三千座管絃樓是皆桎身蛙井未覩鯤溟衲僧家沒意智一著子踞千聖頂握萬化機寂寥非內寬廓非外如太虗空迥無邊表森羅萬象一印頓圓心佛衆生三輪普現摩竭提國法空為座癩馬繫枯樁嵩山少室併息諸緣黑牛臥死水周金剛無心無事虗而靈空而妙黼黻太過王老師真達不疑廓然寥豁豈強是非度量不少擲劒揮空空輪無迹揑目生花太青受點含生不來望空啓告真不思議境非出頭天外孰能睥睨哉境上人揭太虗為號深有取焉灼然於一切境如石女兒心行處滅虗徹靈明金塵密透則野色更無山隔斷天光直與水相通苟涉錙銖六合雲生笑破虗空口西寺恭論師房寒泓序灌溪漚麻池水得臨際一杓揚波鼓浪彌滿江湖劈箭機先孰探深淺雪峰古澗寒泉非趙州一疏壅脈塞源停含穢惡瞪目見底難辨濁清世皆謂二老得一十八灘濫觴之正愚竊觀之一人力鼓狂瀾一人生淹死水大寂源流略覷涯涘曾未知玉囦瑩徹光透十虗鏡水凝寒影融萬象攪無痕迹放含沙毒射人湛不搖中噀蒼龍氣吞海截流機無以施其伎犯牛斗難以尋其源烹雪乳者結咽喉驟冰稜者竦毛骨雖臨際趙州有逆水之波逗河之手主丈生獰靠壁有分又應能濡其涓滴哉恭上人禪房虗僻鑿方池於風簷之側雅扁寒泓清志乎澡心淵意乎浴德無事開窗卷箔鑒止凝神梅印月以影橫斜竹弄風而陰瑣碎崖洗秋而玉瘦泉濺沫以珠跳吟入鏤冰觀空擲礫塵無濯纓之染名無洗耳之慚洞見從上諸老肺腸如倉公上池之水無絲毫間洋洋焉自樂乎天真信鮫龍雲雨非池中物也求豫剩語因書以勉如曰供宴逸之玩雖東風解凍於牣魚躍同靈沼與民之樂吾無取焉上人其擇之涓禪人碧澗序湛如藍揭示法身凝不流生淹死水放開線道便見滔滔聒聒漱石穿崖色後聲前鼓弄人家男女雪峰瞪目不見底坐在澄澄湛湛至今未有出身之路南堂靈光逐處精認得昭昭靈靈到底不知截流之機雖云正脈流通望曹溪一滴猶隔雲泥在餘波末流窮其源冒其氏者不可以一二數涓禪人雅號碧澗意有慕焉求豫剩語不覺醜露灼能聲不是聲色不是色眼耳互為佛事則東西絶岸花紅深淺鳥語綿蠻總是自家行履處若夫透清波路過獨木橋切忌腳跟浮逼逼欽西堂號實泉求語實際理地不受一塵線路放開和泥合水來源有自豈可掠虗在昔新州賣柴漢眼不識橫畫用質直心折匾擔頭撥開正脈濫觴湖海變化魚龍浩浩湯湯莫知紀極若是蕩而忘返力鼓狂瀾執而不通生淹死水欲與同波玄沙道底欽禪老以實泉為號意在澡心浴德一洗澆浮劈箭機先不容作偽秋涵古澗月印清溪腳踏實地人便請截流去拗牛説示普和侍者祖父田園荒廢日久此職耕者罪不勝誅及詢所因非農之過乃牛不任用也稟性悖拗蹊田亂群大棒打不回粗繩拽不轉不喫欄邊草剛要犯人苗踏裂嶺上白雲一片兩片三四片觸倒溪邊牧竪十人草人千百人雖懶安用盡神機南泉搜窮智略春風百草頭不能收放得業風吹上玉乳峰來眼光掣電角力摧山意在一口吸盡飛雪亭前斷崕瀑布水不消半寸捩鼻木調伏粗惡心涓滴蒙汗湯斷除邪僻性力盡神疲穩帖帖地安眠石上遊戲松根耕以其時行不由徑顛騎亦得倒騎亦得淳乎又淳良可愛矣烏𣡶角韻羌笛聲幽無象太平人牛俱樂風清萬壑月朗千峰影迹雙忘乾坤晏肅和侍者號拗牛需豫剩語因事以遺之
