祖大病之瘡疣見鬼神幽愁之情狀擡你爺擡你娘擡上方丈拍禪床云洞山寧免無根謗雖然我王庫內無如是刀何似楊岐破屋盡底掀翻鼎新改創金鷄飛上玉欄干乃作鷄聲云低聲低聲莫說會禪連侍者惡模樣佛涅槃上堂瞿曇醜惡臨死猶多足下輪輻顯露𮌎前卍字揩磨抱橋澡洗寄帽投河舉世無人援手得竟隨殘夢入無何上堂庭院春深和風翠陰桃花簇錦柳線搖金無眼靈雲徒說悟一生埋沒祖師心上堂威音前咸淳後拈主丈一箇黑𥻘皴卓一下機發牢關透全身游戲生死園林信脚踏翻聖凡窠臼笑釋迦客夢未醒耻彌勒藩籬未剖左卓一下云客夢醒右卓一下云藩籬剖擲主丈貶入無何有乾會節上堂焚香書寫佛名經窗外幽禽報喜聲次補數中添一位太唐國裏聖人生因事上堂鑿透耳聾板夾背傴只要醫行不管人苦拈主丈主丈子不別時宜卓一下強行直路大地羊腸遶棘林喝一聲何處去三月半上堂萬物一體天地同根喝一喝清平世界切忌訛言拈主丈主丈子不是萬物喚什麼作一體天不能盖地不能載與什麼同根優游千聖外妙密洞無痕靠丈云三月懶行花下路一家閒閉雨中門無準和尚忌拈香玉几山前凌霄峰下熱喝嗔拳做人話犀牛扇颺向他方捋虎鬚攔胷便行一炷兜樓怨結成插香云貴買賤賣上堂浴乎沂舞雩歸天真自性不涉離微語底默底不是非語非默更非明眼衲僧會不得拍膝云落花深院靜愁聽子規啼上堂謝量田種樹落賴門風大家撑拄量田底量田種樹底種樹帶雨扶犂綠野畊和雲荷钁千峰去有甚心情管得南泉猫兒趙州狗子勘證平田婆連累周家女棘林中有通天路飽飯狂歌閒行幾步脚頭山色無重數上堂謝摘茶看筍寂子撼茶人貧智短老婆偷笋馬瘦毛長乳峰瞥轉一機不露槍旗睡魔退舍深藏頭角玉版書勳舌頭無骨人始解知真味雖然如是原溈山夢贈趙州掌是體是用舉起手者篾籃子是十五錢買得上堂桑疇雨過羅紈膩麥壟風來餅餌香揭示西來端的意好商量處錯商量鶯啼綠樹燕語雕梁費盡分疎人不會急隨蝴蝶過蕭墻浴佛上堂金輪王宅惡業無多不知何事生此妖魔打與狗噇頑不殺好將惡水劈頭澆壽崇節上堂布關睢化襲宮闈萬國人趍奉母儀壽結蟠桃千載實年年天仗宴瑤池乾會節上堂九曲黃河徹底清六龍乾會聖人生周行七步稱尊處山嶽齊呼萬歲聲上堂謝首座秉拂都寺幹齋遂府糖霜黃蓮未是苦天台風樂烏喙不多爭覰之眼睛枯嗅之腦門裂無端更加栗棘蓬吞不得吐不得百味完全如何咀嚼乳峰有箇肘後靈方普使諸人飫甞妙味舉拂子看看打圓相中間著品字三點畫一畫云會神麼農元不識喚作梵天書上堂共住不知名千聖亦不識無端平地生荊棘兄呼弟應與世同波笑獨醒人死汨羅恁麼也好不恁麼也好拍床云手拍闌干唱竹枝哩哩囉天涯望遠無人到上堂舉溈山臥次長蛇偃月勢難分仰山上問訊赤脚上刀梯溈山轉面向後綿𮖐蒺藜仰云某甲是和尚弟子何用形迹撩鉤搭索溈山作起勢利動君子仰便出黃蘗作驢鞦溈喚回云我適來得一夢你試為我原看滿口嚼冰霜仰將一盆水一手巾度與毒蛇須是乞兒捉溈便洗面刺腦入膠盆香嚴至更添一箇牙郎當溈云我適來與寂子做一上神通不同小小滿川龍虎轝猶自說平基嚴云我在下面一一知得分明不獨瞞人亦自瞞溈云試道看捉賊須見贓香嚴點一盃與之幽州猶自可最苦是新羅溈云二子神通過於鶖子誣人之罪以罪加之拈云細影密鋪金𤨏碎清聲微動玉玲瓏則不無溈仰父子點撿將來總是開眼做夢雖然洛陽花下路迷却幾多人聊呈一頌撮藥場中驗作家一枝手髂兩條蛇劉寄奴草雖靈驗已是遭它毒口來上堂舉藥山久不上堂古墓深深埋暗箭院主白云大眾久思示誨休將游艇子撩撥洞庭湖藥山云打鍾著皁旗閃閃陣雲橫院主打鍾火牛鞭起奪齊城眾才集藥山便歸方丈倒携無柄六合掃胡塵主云既許示誨因甚一言不措甲不開倉山云經有經師論有論師爭怪得老僧百花㡌子布纏腰拈云眾中盡道藥山閉門屋裏坐禍從天上來殊不知院主雖得一場榮刖却一雙足聊呈一頌九曲明珠久蘊藏走盤時見發寒光當陽拈出還収拾瞎眼波斯自著忙上堂旱地奔雷青天撒雨六戶不扄龍無龍句田地穩密底死汗迸流妙用縱橫底寒毛卓竪萬別千差透密機拈主丈撼動憨眠主丈子主丈子喏老老大大百念灰寒因甚被人唆使只向他道四皓出商山漢業歸明主功成依舊深藏去靠主丈上堂鑑在機先妙在轉處碧眼胡兒全無肯路行一步是一步信脚錯踏翻大地無寸土業風吹上乳竇山來點一盃茶徐徐向伊道提鞋去中夏上堂蒿籬關猛虎筆管養蒼龍穩帖帖藏牙伏爪黑漫漫怪雨顛風臨濟小𤺊兒驚心欲折豐干老凍膿睡思方濃山濛濛水溶溶乾坤無碧落収放絕行踪上堂幕掛春烟簟鋪秋水高枕橫眠鼻雷聒耳爍石流金總不知何須殿閣薰風至又誰管九十日種粟燒畬說甚麼十三番悟明自己灼然是箇無煩惱閻家倒退三千里其或未然拍床云莫道甕中常有米明覺祖師忌拈香洞庭七十二峰飛雪一千餘丈晨昏說法琅琅誰謂盧公已往元不往插香云在者裏優曇火裏開嗅著無香氣上堂三伏炎蒸汗流如雨一莖草上建瓊樓徹骨貧窮敵國富乳峰者裏乾嚗曝地滴水也無有甚汗臭氣雖然菩薩龍王行雨潤遮身直上九重雲上堂三界炎炎如火聚攪擾勞生困蒸煑邪見稠林蔽祖庭孰為臨濟陰凉樹拈主丈主丈子回避無門全身荷負東邊卓一下特立獨行西邊卓一下危分險布畫一畫掃除枝葉不留踪普覆大地人徹骨清凉去雖然如是趙婆酤醋靠主丈謝監収并祈雨上堂一雨潤枯焦大地承恩澤黃鋪畎畆雲青鎻郊原色刈禾鎌子疾如風收放全歸掌握中且道金鷄一粒粟又且如何拈掇切不得道供養十方羅漢僧何故噎殺人開山通禪師忌拈香未見岑大虫狐膽先驚破密室不通風家私狼籍了更說新開乳竇山插香云無端刻糞作旃檀解夏上堂正因二字得聞鼠糞汙一釜羮乳峰初無箇事飽噇飯了閑行松門雨霽苔逕雲橫隄防平地上著脚是深阬上堂謝新舊知事頭首并元東山玉乳巖花一花五葉新舊聯芳色香奇絕蹙紅皺碧奪天機琢雪鏤氷布林樾簇簇羣英臨風選折剛被東山野老知瘦䇿幽尋衝開碧嶂雲踏破青蘿月因事上堂寺踞千峰十方同聚家賊難防令人驚怖正法明王怒髮衝冠作如是言休驚怖拈主丈儂家自有降魔杵卓一下粉碎髑髏畫一畫裂開腸肚熱銕洋銅滿滿盛鼻繩牽入泥犂去佛子將謂出家行菩提路誰知反不如狼虎累及七代先靈生身父母號天血洎啼紅雨拍床云啞怨恨憑誰訴上堂有一物全機用塵勞之儔如來之種輕若鴻毛輕重若丘山重拈主丈乳峰信手拈來卓一下點破勞生塵夢剛被秋虫落葉知清聲戞玉寒翠色黃金弄雖然不直分文擲下主丈擲地金聲令人驚悚八月旦上堂一宿覺三擔土脚未跨門丰骨已露等閑舉一步危徑結寒花信采示一機斷崖飛瀑布雖然要跨乳峰門即易要入乳峰室即難何故鴻飛冥冥戈人何慕上堂舉馬祖百丈南泉西堂翫月次祖云正恁麼時如何藕絲絲牽動五須彌堂云正好供養過山尋蟻跡丈云正好修行渡水覔魚跡泉拂袖便行蝦跳不出斗祖云經入藏禪歸海惟有普願獨超物外渾家送上渡頭舟拈云馬師父子一等弄光影就中南泉較險何故拂迹成痕復成一頌百戲場中賽錦標蜜脾古馬舞兒多頭籌暗被奪將去行主喃喃強說呵上堂謝後堂寮元監寺并踏山地上翻瓢眉間掛劒古道雖微惡聲難掩窮則通通則變倒跨楊岐三脚驢踏破山前祖父田園一片兩片四五六七片丙寅九月初一退雪竇千丈懸崖弄險𡾟草鞋修整已多時秋風償盡皮毛債散步閑雲快活戲
