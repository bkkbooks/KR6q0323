body:
  text: 慶元府應夢名山雪竇資聖禪寺語錄侍者普和希革了舜惠洇編師於景定五年四月初八日入院三門千聖靈樞妙在轉處爍盡玄微更進一步喝一喝云莫來攔我毬門路佛殿殿成不必拆佛生何用打插香云燒炷兜樓香共說家私話何故以力假人者覇據室鴆鳥毛烏喙藥毒無醫休動著輕動著盡大地人皮膚脫落省劄震旦心宗竺乾正眼盡在大丞相國公筆頭點出烜赫光明輝天鑑地却煩維那分明揭示山門疏大覺無心九峰饒舌較短量長家私漏洩引惹平人入禍門金剛腦後抽生銕法座丈夫膝下有黃金爭肯與他人作禮驟步云須彌燈王脚頭脚底提綱略露險崖機千丈雪飛寒瀑全提活人句奩一錦簇春花眼無筋聽之則聾耳無竅覰之瞎隱潭龍不善吞吐穩臥碧淵深明覺老爭解品題虗名瀑布集見聞俱泯聲色純真兔角杖力探探之不窮須彌筆強描描之不就幽遠入聖人之夢分明示古佛之心松風蘿月助發玄機谷鳥山雲互分體用雖然如是猶是半提只如開堂祝聖全提一句又作麼生道擊拂云四海五湖龍世界九洲三島鶴乾坤舉本山明覺祖師示眾云莫有閙市出頭底麼良久云不如䇿杖歸山去長嘯一聲烟霧深拈云明覺老人文經武緯韜略雙全有八方受敵之謀千里折衝之策因甚歸華山馬放桃林牛只圖獨善其身不能兼善天下新乳峰雖能褒貶爭柰蹈入脚跡要知麼武陵溪路非秦境貪看桃花入洞天小參相逢不拈出舉意便知有早是斫額望鄉關白雲千萬里山僧四十年前在此六藏眾底語不動唇行不動塵佛眼覰不見四十年後濫尸此席通身泥水滿面塵埃無著慚惶處事不獲已隨分將牛溲馬渤狼毒砒霜阿魏水銀燈芯皂角開箇小小雜貨鋪子去也恐有舉意知有當場買賣底出來相見不作貴不作賤作麼生商量擊拂云無星秤子輕拈出輕若鴻毛重若山舉德山小參不答話頌云萬戟森嚴細柳營信威獨許漢將軍誰知袖隱屠龍手却把蒿枝箭策勳謝權管專使東臯留兩班洎同聚兄弟并天童監寺相送入院上堂妙攝化權使不辱命鶴唳東臯雲歸乳嶺拈丈云主丈子黑𥻘皴困臥壁根卓一下云聲前喚醒以主丈搖曳云舞蹈清風兩腋生靠主丈云安閑又入蘿窻定因甚如此賓主歷然頭正尾正結夏上堂謝蹈山管茶兄弟禁足護生剋期取證掘窖深埋不由情願乳峰自小不意秦法森嚴仁義道中別通一線飯餘石鼎奏松風山後山前踏斷黃雲一片兩片三片四五六七片也教知道草裏有人麥中有麵謝都寺幹齋首座藏主秉拂并謝燦首座仁庵主上堂南山燦燦白石爛爛覿當面機瞎人天眼拈主丈主丈子聞如是語從定而起向香積世界乳竇峰前卓一下轉法輪卓一下摶香飯聽之雙耳聾嗅之舌頭爛何似楊岐栗棘蓬秦時𨍏轢鑽啞仁義盡從貧處斷上堂雕梁燕語喬木鶯吟秋田水足麥嶺雲深聲色純真渾聲色無端花擘祖師心耳無輪眼無筋優游千聖外拍膝云閬蕩拾花針端午上堂大地藥除眾生病去文殊善財不須多事大家相聚喫盞菖蒲茶幾枚茭粽子向水邊林下目視雲霄嫌佛不肯做雖然如是不堪共語乳峰與麼道拈主丈云也是灸瘡瘢上重著艾炷卓一下上堂宿雨初晴嵐光翠滴瀑瀉懸崖雲籠怪石無位真人面門出入喝一喝云淨地上不許狼籍明覺祖師忌拈香乳竇翠峰何分彼此遂府糖霜口甜心苦滅却雲門一字宗斷崖飛瀑冤難訴上堂雪峰輥毬睦州擔板展轉神通搆得一半那一半良久戴嵩牛臥綠楊陰韓幹馬嘶芳草岸病中入城歸上堂醭醭紅塵炎炎火聚著脚無踪翻身有路去時山色慘愁容歸來幽鳥啼芳樹不涉去來如何吐露碧眼黃頭總不知拈主丈問訊𥻘皴主丈子卓一下云逢人不得錯舉祈雨上堂杲日流金旱苗渴雨投壑可期扣天無路衲僧家為法忘軀諸庄皆旱我總不憂佛性有無須明狗子隱潭龍王聞如是語身湧碧潭拏雲霧三日為霖遍九垓大田勃爾興禾黍飯抄雲子應無慮雖然放筯忘恩恒河沙數解制上堂山僧一夏與兄弟說黃道黑謗大般若今朝自恣勘驗蠟人五根完全一根爛壞且道還可救也無乃吐舌云阿爺阿爺謝新舊兩班上堂山無烟雲幽景不能發越樹無枝葉春風豈識敷榮乳竇乖崖飛雪枯木糝花向背卷舒燦然奪目美則美矣要識山中景則易要見境中人則難如何是景中人以手擘開面驢不成馬不是八月旦上堂八月秋何處熱盡大地一團銕衲僧家向南北東西草鞋跟踏得裂主杖頭挑得折驀劄相逢德山棒臨濟喝百怪千妖如何計結拍膝云噁邪法難扶搖手云莫說莫說上堂秋氣肅金秋暘鏖戰林間秋葉片片凋零砌下秋虫聲聲凄怨滿眼聽不聞滿耳覰不見聽得聞覰得見以拂擊床云聲前句後新羅箭中秋謝坤監寺上堂積癈未蘇連遭荒旱銕作心腸也須寸斷山僧自小不喜煎熬幸遇中秋何妨賞翫以拂子打圓相皓月流輝畫一畫云覺天雲散倒跨楊岐三脚驢深村荒草閑行看颺下拂子光境俱忘瞎乾坤眼九月一上堂水牯牛偏捩㑃酷暑雲林恣情𨁝跳山前祖父田園忍見離離荒草秋風正要及時畊脫落鞭繩無鼻竅去住自如収放在我牧笛聲聲送暮霞故家深入千峰杳嗚咿嗚咿拍禪床莫教忘却來時道重陽上堂并謝殿主古西堂東籬菊染黃秋浦茱凝翠古佛放光明助發實相義淵明有眼無筋錯認白衣人至金風剪剪玉露團團故人知此意拍禪床笑拍玉闌干為天童相訪上堂拈主丈隰州佛放光遠射千峰頂錦鏡冷交輝瀑花寒鬪影非虗非實非色非空舉世無人描邈得擲下主丈只憑這箇為流通十月半上堂花禁冷葉紅草滴虗嵐翠清淨盧舍那全身荊棘裏總饒伊眼裏著得須彌山耳裏盛得四海水裂斷千差到休歇地乳峰俯順人情向耳邊低聲道玄沙道底上堂謝翠山相訪舉拂子翳眼藥文武火點一點用得親撥云煨得過翠巖落盡眉毛眼愈明乳竇爛却皮膚骨將槁家醜分明說向誰握手松根忘汝我冷地思量誾誾而笑笑甚麼曾陷迷魂八陣圖夢中驚入夔門道上堂大眾問訊侍者燒香曲彔棚上說黑道黃七世冤憎同劫會泥犂舌自檐當何故麟鳳出時山總秀芝蘭生處草俱芳十一月旦上堂小春纔過冬至相催光陰駒過隙鬚𩯭雪成堆松根石上槁木寒灰凍膝擁深霜樹葉禪心清點野橋梅喚起來打更莫遲回蟄龍須奮躍何待禹門雷上堂拈主丈乾非上坤非下畫一畫一畫先天包含八卦推窮爻象凶吉不分說盡繫辭疑難未解卓一下吉凶分卓一下疑難解靠主丈阿魏無真水銀無假大行追嚴上堂統御金輪四十年拱垂衣化育黎元萬機休罷昇遐去四海無思不斷魂林間衲子感戴深恩以手合掌云合掌迎歸兜率院當來成佛補慈尊拈香六龍鞭御促歸釋梵之宮四海遏音哀慕唐虞之化上堂三度拂蒿枝秦時𨍏轢鑽拶得火星飛結得弓弦斷用盡自己心瞎却他人眼千里玄樞錯踏翻神駒十影無覊絆業風吹上乳竇峰前點一柸茶向伊道且緩緩上堂勸兄弟莫弄筆頭簇錦攢花光騰萬丈鏤氷琢雪筆掃千軍生死岸頭一點用不著豈不見辛州賣柴个老盧眼不識橫畫米不別精麤倩人書偈言無物却受它家一鉢盂拍膝云衲僧門下天地懸殊上堂天巧剪瑤花六出繽紛落二祖立腰酸楊岐嗟項縮爭似火爐頭柮榾高燒紙衾包却煖烘烘憨睡著不墮凝寒一色邊拍膝云錯錯冬夜堂前揭牓冬至上堂復見天地心舉世皆知有山意衝寒欲放梅岸容待臈將舒柳拈主丈惟有主丈子黑𥻘皴元依舊受霜凍不枯遇陽和不秀壁角落頭塊然拙守終日談玄口不開卓一下噴嚏也成獅子吼上堂謝兩首座秉拂都寺幹齋并施主王判院毛孔聞香眉間挂劒香積人歸梵天血濺美則美矣格外一機更須撥轉轉即不無眾中驀有箇耳不聽聲舌不甞味底又且如何擺撥良久云不願萬戶侯願識荊州面上堂謝大慈和尚相訪大慈苕菷生倒拈風颯颯掃盡大地塵趙州驚吐舌驀劄相逢玉乳峰殷勤為掃寒巖雪拈主丈主丈子愛客情深卓一下把火助熱卓破苔錢畫一畫畫斷雲放出寒梅南枝北枝一花兩花三四花疎影橫溪暗香浮月無端盡把春容泄清不徹惱碎心廣平似銕上堂道至無難惟嫌揀擇混俗通真騎聲蓋色近在口皮邊遠過河沙國慈明揭示借鬼𦘕桃符雪竇標題去猊懸白澤一見便見迅雷陶壁奮飛梭擬議尋思逆浪禹門遭點額佛成道上堂小小星邊深深雪裏骨凍將枯眼花難洗喫盡飢寒走出山滿面慚惶誰使你誑言大地一切眾生正覺成吽吽棒折也未上堂謝樵屋梨洲二西堂相訪樵屋雲深梨洲花褪仙實纍纍白茅剪剪鶴馭初閑趂負暄羲皇世上人希見好風吹上玉乳峰頭握手長歌春和滿面雖然世諦相見即得佛法向上千聖玄樞如何撥轉拈主丈沒機關卓一下通一線擲下云聲前句後新羅箭上堂發得一機活出得一言當萬里無片雲青天合喫棒不待春風著意吹暗香元在梅花上永明壽禪師忌拈香埜客吟殘中巖月落坐斷白雲死不再活只將宗鏡鑑惟心法眼重重添翳膜醫無藥光爍爍要識永明妙旨插香云更添香著上堂謝林閣主𦘕成道說法二相閬州人道無可成法無可說黃面瞿曇重重敗缺家醜豈容外泄剛被兒孫告訐圖形𦘕影與人看乳竇門風添煖熱彷彷彿彿一似閬州城南錦屏山子細看來却是鹿苑啣花竺峰積雪添得時人眼中屑上堂拈主丈作彎弓勢柳條弓蒿枝箭卓一下射中虗空成兩片狸奴白牯雷厲風行碧眼黃頭星飛電卷擬搆珠林嚙鏃機卓一下險正旦上堂咸淳更號立見昇平兩朝聖化四海歡聲乳竇家貧開宴用度非輕錦雲山瀑帽珠雪瀑懸纓步步寒花翠結關關幽鳥琴清排當不知因底事起身鞠躬云大眾萬福慶賀元正元宵上堂并謝藏主副寺塔主淨頭知庫寂寞萬峰頭佳節成虗度貧無一盞燈好有多般事洞山薑索價太穹無縫塔入門辨主廁籌子動地放光利市官招財滿庫不作佛法商量亦非世諦流布且道一大藏教還該著也無拂子打圓相云我見燈明佛本光瑞如此楓橋枯山訃音上堂半夜客船鍾漁火愁眠省不見老寒山淚濕吳雲冷幽鳥啼霜月影斜埜橋楓葉翻紅錦喚作聲得麼喚作色得麼拂子擊床云擊碎重關枯山未泯百丈忌拈香一喝三日聾大寂門風喪深掘陷人坑密布漫天網笑一上哭一上做盡死模活樣乳峰子細思量插香云沉本無香何須起謗上堂謝育王知客延慶座主春山青春水綠鳥弄笙簧梅飄香玉具足清白梵行之相聲色純真豈容攢簇聽不足觀不足一會靈山儼未分斷絃須是鸞膠續雖然爭柰育王通師公未肯點頭在何在鸚鵡喚人喫煎茶二月旦上堂并謝元白雲藏主坐斷白雲萬機𥨊息黃葉止啼總不消得閑倚危闌看瀑花縱乾伸眼清無極清無極自謂太平僧拍膝云豈知堯舜力上堂謝理兄舊住座主隣竹外湖頭知庫達磨眼睛天台骨髓鈎鎻連環提掇不起提得起湖頭春水綠成紋竹外清風來未已東土阿師即不問且道西天慧理三藏卓一下還識這个麼擬議尋思擲下劒去久矣上堂謝同山講師張制屬王判院天高地厚水闊山遙古今常理何用忉忉衲僧家脚跟下一段光明十日並照明察秋毫不揀候門射䇿何須華頂降魔孤迥迥冷蕭蕭拍床云無端翻黑月魑魅哭連宵佛涅槃上堂二月十五瞿曇滅度足示雙趺胷摩卍字山愁慘莫雲花淚啼紅雨去年一次今年一次明年一次輙莫明年更明年百千年年年一次狼籍涅槃心此恨憑誰訴拈主丈賴有𥻘皴主丈子卓一下牢記取上堂天地不仁以萬物為芻狗聖人不仁以百姓為芻狗拈主丈拄丈子不仁以三世諸佛歷代祖師四聖六凡為芻狗化育春陽煦嫗前摧殘霜雪憑陵後截鶴續鳧折衡剖斗靠主丈力盡神疲困壁根啞笑破他人口三月旦上堂春日晴春雨足玉龍怒噴懸崖瀑花簇簇錦簇簇滿山桃李嫌麤俗休揑目直饒伊向聲色堆頭密透重塵坐臥經行了無拘束拍床云砒霜未是毒啟建壽崇節上堂關睢頌德樛木垂陰八荒開壽域萬國奉君心亘古今為諸佛母曇花時現覺園春祝香世世與佛同生壽崇高嶽時時體堯為善德化坤維乾會節上堂黃河清聖人生體天行健濬哲文明率土更新堯舜化八荒無地著歡聲祝香大千沙界扇咸淳至化之風億萬斯年慶乾會誕彌之節三月半上堂并謝道舊錦鏡濃粧十樣花練拖寒瀑掛蒼崖無賓主句全機露見得分明眼著砂依亡妙盡猶隔天涯奪取黃梅無底鉢且教盧老去擔柴佛鑑禪師忌拈香父豩頑子惡毒熱血相噴嗔拳相𡎺如風吹水自成紋醫得耳聾成瞎禿冷地思量笑不成哭乳峰將底報深冤良久插香捩鼻木上堂活馬騮百十箇乳竇峰前追風跳竈楊岐三脚驢盡力跂步不前江西千里駒奮𩮻追踪不到更饒伊象頭檀特九十六種見鞭影而行蹶蹄不少未奏沙場汗血功便思嚼嚙天閑草好則甚好明覺老人笑須絕倒三月廿五上堂綠暗紅稀人家翠微杜䳌啼月紫燕㗸泥莫春者浴乎沂風乎舞雩詠而歸本是儒家閑戲劇剛言漏泄祖師機是不是非不非老倒乳峰那得知拈主丈松根憨睡足閑把瘦藤戲䇿杖下座侍者無事相隨四月初一上堂謝耆舊㘽松萬本青松後人標榜臨濟兒孫當機不讓千古清凉樹蔭人法門梁棟真堪賞初莫學黃梅道者貪傳破鉢盂連累周家女無地著渾身空惆悵拍床云藂林難免無根謗滿散壽崇節上堂仙苑蟠桃不老春三千年實薦芳新錫開王母瑤池宴滿簇金盤壽聖人雖云絕品未足為珍拂子打圓相云幸有菩提真妙果年年同献佛生辰祝香德配堯仁布母儀於天下心同舜善開壽域於坤維佛生日上堂無憂樹下風如箭九龍吐出水含毒涓滴沾身痛入心霎時吹面刀剜肉不知悉達為何因纔出母胎罹此酷後代兒孫忍見渠一年一度香湯浴浴即不無且道佛身無為不墮諸數向甚處下手以手作澆湯勢唱云我今灌沐諸如來淨智莊嚴功德聚拍禪床云只恐不是玉滿散乾會節上堂聞道金輪出母胎盡河沙界掃氛埃想應新整乾坤手多帶堯風舜日來普天率土壽域宏開拈主丈林下野人何祝献卓云一莖草上玉樓臺祝香以大椿八千歲仰祝堯齡窮華藏十三重張禹甸結夏上堂百二十日夏今朝始發頭飯杪雲子白羮煑菜香浮未問寒山子先看水牯牛山前千頃地信脚踏飜休上堂謝楊居士一口吸西江赤土塗牛嬭蕩盡聖凡情卓一下猶欠這一解丹霞馬祖眼見如盲靈照龐婆口說如啞驀劄相逢露一機驚翻巖瀑蒼龍掛雖然斫額望鄉關前頭大有路在煎笋上堂玉版阿師錦綳稚子頴脫藂林頭角呈露參透油煎石磉盤飽經鰲煉翻身去塞斷咽喉更須吞吐擊床云毗耶未識香來處端午上堂籜包角黍茶點菖蒲香浮毛孔清透肌膚肱枕梨床心醉月驅邪何用掛神符啞汨羅人去遠還有獨醒無上堂雲収麥壟水足秋田繭繰白雪鶯弄朱絃無象太平還有象蕢桴土皷樂堯年誰知聲色裏心印是渠傳上堂謝郡主汪令人同宅眷入山施財蓋佛殿建眾寮大哉力量人生極富貴家不被富貴惑廣修一切善智惠心為父慈悲性為母忠孝為兄弟貞良為姊妹正信為師友和柔為眷屬降神釋梵宮秀氣鍾玉葉非女示汝身助揚佛正化香湯沐金軀莊嚴功德聚法華誓流通俾令出火宅賜與制𢽟綾三車無少異凡可著力處悉皆善用心竭來玉乳峰萬選青銅施茂我旃檀林覆我覺王殿永除諸滲漏不嗅其餘香佛天展歡顏湖海蒙光賁舉手加額贊連聲道難消祝之以世壽盤石固難比祝之以世福滄海淺非肩世世願為諸佛母四生九有盡承恩上堂拈主丈捉象者全其力捉兔亦全其力用力既均厥功可奏山僧四十餘年周行大澤密透棘林架弩張弓只能自射今朝踞萬峰頂靈禽異獸雜陳乎前試放一箭看擲下主丈看看良久拍膝云比擬張麟兔亦不遇挂帳上堂活衲僧生銕鑄吐出銕心肝掛起銕面具蚊子上銕牛無你㗖處素紈搖月碧帳含烟或放或収皆在我長伸兩脚放憨眠灼然如是天地相懸開眼不知天大曉閻家催索水漿錢拍床一下閏月一日上堂能與諸魔外道戰鬪惟靜能令四大地眾生歸仰惟退能通三大藏人天講說惟默能與三世諸佛歷代祖師把手共行惟正過此四重關別有一條通天活路是汝諸人因甚望崖却步拈主丈忍俊不禁卓一下八字打開令箇箇到大休歇之地雖然如是靠主丈誰知雲外千峰秀更有靈踪在上方上堂因暴風率雨舉興化和尚云昨日赴箇村齋遇暴風卒雨向古廟裏軃得過拈云興化老兒人貧智短馬瘦毛長恁麼說話敢稱臨濟兒孫乳峰遇暴風卒雨亦不能軃避得整襟危坐瘦䇿閑嬉靜倚危闌看雪瀑懸空千丈玉龍飛拍床一下云不知誰薦截流機大慈環峰和尚訃音上堂一湖橫陳七峰環遶妙轉玄樞死生關破去何有偈流水渡百灘來本無言疾風號萬竅更問如何與若何珍重便行髑髏前失照斷猨哭月千林曉辭世頌來本無言去何有偈更問如何珍重珍重七月初一祈晴上堂薄福住山百無所取何以表勤惟誠為主祈晴便得晴祈雨便得雨忽有箇漢出來道長老如虫禦木偶爾成文又何必趙婆酤醋只向他道蒿枝箭解射紅心發機豈藉千鈞弩因事上堂乳竇相從幾弟兄忘形骸外又忘情炊香好甑和蘿飯鼠糞無端污却羮隣僧扣齒訴不平聲折筯何妨挑剔去壁根不到礙人行開山通禪師忌拈香虗空包不包大地壞不壞行脚不遇人出語無賴聊謾言密室不通風濕紙如何褁大虫上堂謝慧知客巴州人巴南巴西水流巴字古篆分明心畫顯著游泳江湖四十年與世同波無彼此朅來千丈岩前路截流機透險崖句辨龍蛇眼明今古